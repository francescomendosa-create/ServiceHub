<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ServiceHub — installazione</title>
  <meta name="theme-color" content="#307eb4" />
  <meta name="application-name" content="ServiceHub" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ServiceHub" />
  <link rel="manifest" href="manifest.json?v=op5" />
  <link rel="apple-touch-icon" href="../sh-touch.png?v=op5" />
  <link rel="icon" type="image/png" href="../sh-icon-192.png?v=op5" />
  <style>
    html, body { margin: 0; min-height: 100%; font-family: system-ui, sans-serif; }
    #splash-screen {
      position: fixed; inset: 0; z-index: 1; background: #000;
      display: flex; align-items: stretch; justify-content: stretch;
    }
    @media (orientation: portrait) { #splash-screen { background: #fff; } }
    #splash-wrap { position: relative; width: 100%; height: 100%; min-height: 100dvh; }
    #splash-wrap img {
      display: block; width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      pointer-events: none; -webkit-user-drag: none;
    }
    #splash-enter {
      position: absolute; z-index: 2; background: transparent; border: none;
      cursor: pointer; outline: none; border-radius: 14%;
    }
    @media (orientation: landscape) {
      #splash-enter { top: 8%; left: 32%; width: 36%; height: 70%; }
    }
    @media (orientation: portrait) {
      #splash-enter { top: 36%; left: 14%; width: 72%; height: 30%; }
    }
    #op-install-hint {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 3;
      padding: 10px 14px; background: rgba(15, 23, 42, 0.92);
      color: #e2e8f0; font: 600 12px/1.45 system-ui, sans-serif;
      border-top: 1px solid rgba(96, 165, 250, 0.45);
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div id="splash-wrap">
      <picture>
        <source media="(orientation: portrait)" srcset="../splash-mobile.png?v=op5" />
        <img src="../splash-pc.png?v=op5" alt="ServiceHub" />
      </picture>
      <button id="splash-enter" type="button" aria-label="Apri ServiceHub"></button>
    </div>
  </div>
  <div id="op-install-hint">
    <strong>ServiceHub (operatore):</strong> installa da qui (menu → Installa app).
    È un'app <em>separata</em> da Service Remote su <code>servicehub-18309.web.app</code>.
  </div>
  <script>
    (function () {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw-op.js?v=op5", { scope: "./" }).catch(function () {});
      }
      var btn = document.getElementById("splash-enter");
      function enter() {
        var u = new URL("../index.html", location.href);
        u.search = location.search;
        u.hash = location.hash;
        location.href = u.href;
      }
      if (btn) btn.addEventListener("click", enter);
      if (window.matchMedia("(display-mode: standalone)").matches) {
        enter();
      }
    })();
  </script>
</body>
</html>
