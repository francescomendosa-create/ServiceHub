<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <!-- Viewport semplice: come i siti normali. La corona e la barra indirizzi
       funzionano solo con scroll del DOCUMENTO, non di un div interno. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="disabled-adaptations" content="watch" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Service Watch</title>
  <meta name="theme-color" content="#307eb4" />
  <meta name="application-name" content="Service Watch" />
  <meta name="apple-mobile-web-app-title" content="Service Watch" />
  <link rel="manifest" href="watch-manifest.json?v=sw11" />
  <link rel="icon" type="image/png" href="sh-icon-192.png?v=sw11" id="sw-favicon" />
  <link rel="apple-touch-icon" href="sh-touch.png?v=sw11" id="sw-touch-icon" />
  <style>
    :root {
      --sw-bg-home: #1e5a82;
      --sw-bg-panel: #0f172a;
      --sw-tail-bg: #1e5a82;
      --sw-scroll-bottom: 112px;
      --sw-rail-w: 6px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    /* IMPORTANTE: niente overflow:hidden sul body — serve scroll nativo pagina */
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: var(--sw-tail-bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
      -webkit-overflow-scrolling: touch;
    }
    body.sw-bg-home { --sw-tail-bg: var(--sw-bg-home); background: var(--sw-bg-home); }
    body.sw-bg-panel { --sw-tail-bg: var(--sw-bg-panel); background: var(--sw-bg-panel); }

    #sw-page {
      min-height: calc(100dvh + var(--sw-scroll-bottom));
      background: var(--sw-tail-bg);
    }
    .sw-scroll-stage {
      min-height: 100dvh;
      background: var(--sw-tail-bg);
    }
    .sw-scroll-edge {
      padding: 10px 8px;
      padding-right: calc(var(--sw-rail-w) + 10px);
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.45;
      pointer-events: none;
      user-select: none;
      background: var(--sw-tail-bg);
    }
    .sw-scroll-below {
      min-height: var(--sw-scroll-bottom);
      color: rgba(255, 255, 255, 0.62);
    }
    body.sw-bg-panel .sw-scroll-below { color: #64748b; }

    #sw-scrollbar-rail {
      position: fixed;
      top: 10px;
      right: 4px;
      bottom: 10px;
      width: var(--sw-rail-w);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.2);
      z-index: 90;
      pointer-events: none;
    }
    body.sw-bg-panel #sw-scrollbar-rail { background: rgba(51, 65, 85, 0.85); }
    #sw-scrollbar-thumb {
      position: absolute;
      left: 0;
      width: 100%;
      min-height: 26px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.12);
    }
    body.sw-bg-panel #sw-scrollbar-thumb { background: rgba(148, 163, 184, 0.95); }

    .sw-view { width: 100%; min-height: 100dvh; }
    .sw-view--hidden { display: none !important; }
    #view-home {
      display: flex; align-items: center; justify-content: center;
      padding: max(28px, 10vh) max(10px, 4vw) max(12px, 5vh);
      cursor: pointer;
      background: var(--sw-bg-home);
    }
    #sw-icon-canvas {
      width: min(68vw, 68vh); height: min(68vw, 68vh);
      border-radius: 22%; box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    button, .sw-chem-cell { touch-action: manipulation; }
    .sw-panel {
      display: flex; flex-direction: column;
      min-height: 100dvh; background: var(--sw-bg-panel);
    }
    .sw-topbar {
      display: flex; align-items: center; gap: 8px;
      padding: max(10px, env(safe-area-inset-top, 0px)) 10px 8px;
      background: #1e293b; border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }
    .sw-back {
      border: none; background: #334155; color: #fff;
      font-weight: 800; font-size: 10px; text-transform: uppercase;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
    }
    .sw-top-title {
      flex: 1; text-align: center; font-size: 12px; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    #view-chemicals .sw-top-title {
      font-size: clamp(16px, 7vmin, 20px);
      letter-spacing: 0.1em;
    }
    .sw-top-spacer { width: 52px; }
    .sw-menu-body, .sw-empty-body { flex: 1; padding: 12px 10px; }
    .sw-chem-body {
      flex: 0 0 auto;
      padding: 8px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sw-menu-hint {
      margin: 0 0 12px; font-size: 9px; font-weight: 700;
      text-align: center; color: #94a3b8; text-transform: uppercase;
    }
    #sw-menu-list { display: flex; flex-direction: column; gap: 10px; }
    .sw-menu-btn {
      width: 100%; border: none; border-radius: 14px;
      padding: 18px 12px; font-size: 14px; font-weight: 900;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: #fff; cursor: pointer;
    }
    .sw-menu-btn--chem {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-bottom: 3px solid #4c1d95;
      font-size: clamp(17px, 7.5vmin, 22px);
      padding: 20px 12px;
      letter-spacing: 0.1em;
    }
    .sw-menu-btn:active { filter: brightness(0.92); }
    .sw-empty-msg {
      text-align: center; font-size: 11px; font-weight: 700;
      color: #94a3b8; line-height: 1.5; padding: 20px 8px;
    }
    .sw-chem-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .sw-chem-cell {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 6px; min-height: 98px;
      padding: 12px 8px; border: 2.5px solid #7c3aed; border-radius: 14px;
      background: #2e1065; cursor: pointer;
    }
    .sw-chem-cell:active { filter: brightness(0.95); }
    .sw-chem-lbl {
      font-size: clamp(12px, 4.8vmin, 14px);
      font-weight: 900; letter-spacing: 0.1em; color: #ddd6fe;
    }
    .sw-chem-val {
      font-size: clamp(36px, 14vmin, 42px);
      font-weight: 900; line-height: 1; color: #ede9fe; font-variant-numeric: tabular-nums;
    }
    .sw-chem-val--hp { font-size: clamp(40px, 15vmin, 46px); }
    .sw-chem-reset {
      width: 100%; border: none; border-radius: 14px;
      padding: 16px 12px; min-height: 48px;
      background: linear-gradient(180deg, #ef4444, #dc2626);
      color: #fff;
      font-size: clamp(14px, 6vmin, 18px);
      font-weight: 900; letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer;
      margin: 4px 0 0;
      box-shadow: 0 4px 0 #991b1b, 0 2px 10px rgba(220, 38, 38, 0.45);
    }
    .sw-chem-reset:active {
      filter: brightness(0.92);
      transform: translateY(2px);
      box-shadow: 0 2px 0 #991b1b, 0 1px 6px rgba(220, 38, 38, 0.35);
    }
    @media (max-width: 220px), (max-height: 260px) {
      :root { --sw-scroll-bottom: 92px; }
      .sw-chem-val { font-size: clamp(32px, 13vmin, 36px); }
      .sw-chem-val--hp { font-size: clamp(36px, 14vmin, 40px); }
      .sw-chem-cell { min-height: 86px; }
      .sw-chem-reset { min-height: 44px; padding: 14px 10px; font-size: clamp(13px, 5.5vmin, 16px); }
      .sw-menu-btn--chem { font-size: 16px; }
      #view-chemicals .sw-top-title { font-size: 15px; }
    }
  </style>
</head>
<body class="sw-bg-home">
  <script>window.SERVICE_WATCH_BUILD = '2026.06.05-service-watch-centered';</script>
  <div id="sw-scrollbar-rail" aria-hidden="true"><div id="sw-scrollbar-thumb"></div></div>

  <div id="sw-page">
    <div class="sw-scroll-stage">
      <section id="view-home" class="sw-view" aria-label="Service Watch home">
        <canvas id="sw-icon-canvas" aria-hidden="true"></canvas>
      </section>

      <section id="view-menu" class="sw-view sw-view--hidden sw-panel" aria-label="Schede">
        <div class="sw-topbar">
          <button type="button" class="sw-back" id="sw-back-menu">Indietro</button>
          <div class="sw-top-title">Schede</div>
          <div class="sw-top-spacer"></div>
        </div>
        <div class="sw-menu-body">
          <p class="sw-menu-hint">Tocca una scheda</p>
          <div id="sw-menu-list"></div>
          <p id="sw-menu-empty" class="sw-empty-msg sw-view--hidden">Nessuna scheda attiva.<br>Abilita Chemicals dalle impostazioni Watch sull'iPhone.</p>
        </div>
      </section>

      <section id="view-empty" class="sw-view sw-view--hidden sw-panel" aria-label="Nessuna scheda">
        <div class="sw-topbar">
          <button type="button" class="sw-back" id="sw-back-empty">Indietro</button>
          <div class="sw-top-title">Service Watch</div>
          <div class="sw-top-spacer"></div>
        </div>
        <div class="sw-empty-body">
          <p class="sw-empty-msg">Nessuna scheda attiva su Apple Watch.<br>Vai su ServiceHub → Impostazioni → Watch e abilita <strong>Chemicals</strong>.</p>
        </div>
      </section>

      <section id="view-chemicals" class="sw-view sw-view--hidden sw-panel" aria-label="Chemicals">
        <div class="sw-topbar">
          <button type="button" class="sw-back" id="sw-back-chem">Indietro</button>
          <div class="sw-top-title">Chemicals</div>
          <div class="sw-top-spacer"></div>
        </div>
        <div class="sw-chem-body">
          <div class="sw-chem-grid">
            <button type="button" class="sw-chem-cell" id="sw-btn-pass" aria-label="Incrementa PASS">
              <span class="sw-chem-lbl">PASS</span>
              <span class="sw-chem-val" id="sw-chem-pass">0</span>
            </button>
            <button type="button" class="sw-chem-cell" id="sw-btn-hp" aria-label="Incrementa HP">
              <span class="sw-chem-lbl">HP</span>
              <span class="sw-chem-val sw-chem-val--hp" id="sw-chem-hp">0</span>
            </button>
          </div>
          <button type="button" class="sw-chem-reset" id="sw-btn-reset">Reset</button>
        </div>
      </section>
    </div>

    <p class="sw-scroll-edge sw-scroll-below" id="sw-scroll-below" aria-hidden="true">↓ Scorri in basso</p>
  </div>

  <script>
    (function () {
      var BASE_ICON = 'sh-icon-512.png?v=sw11';
      var BASE_FALLBACK = 'sh-icon-192.png?v=sw11';
      var BUILD = window.SERVICE_WATCH_BUILD || 'dev';

      function getScrollTop() {
        return window.pageYOffset || document.documentElement.scrollTop || 0;
      }

      function getScrollMax() {
        var el = document.documentElement;
        return Math.max(0, el.scrollHeight - el.clientHeight);
      }

      function applyScrollLabels() {
        var below = document.getElementById('sw-scroll-below');
        if (below) {
          below.innerHTML = 'Service Watch<br>' + BUILD;
        }
      }

      function ensurePageHeight() {
        var page = document.getElementById('sw-page');
        if (!page) return;
        var bottom = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sw-scroll-bottom')) || 112;
        var minH = window.innerHeight + bottom + 8;
        page.style.minHeight = minH + 'px';
        if (window.swUpdateScrollbar) window.swUpdateScrollbar();
      }

      window.swUpdateScrollbar = function () {
        var rail = document.getElementById('sw-scrollbar-rail');
        var thumb = document.getElementById('sw-scrollbar-thumb');
        if (!rail || !thumb) return;
        var max = getScrollMax();
        var railH = rail.clientHeight;
        var scrollTop = getScrollTop();
        if (max <= 2 || railH <= 0) {
          thumb.style.height = Math.max(24, railH * 0.45) + 'px';
          thumb.style.top = '0px';
          rail.style.opacity = '1';
          return;
        }
        rail.style.opacity = '1';
        var ratio = window.innerHeight / document.documentElement.scrollHeight;
        var thumbH = Math.max(26, Math.round(railH * ratio));
        var top = Math.round((scrollTop / max) * (railH - thumbH));
        thumb.style.height = thumbH + 'px';
        thumb.style.top = top + 'px';
      };

      function blockPinchZoom() {
        document.addEventListener('touchstart', function (e) {
          if (e.touches && e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('gesturechange', function (e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('gestureend', function (e) { e.preventDefault(); }, { passive: false });
      }

      /* Niente listener wheel manuali: la corona deve gestire lo scroll NATIVO della pagina */
      window.swBindDocumentScroll = function () {
        window.addEventListener('scroll', function () {
          if (window.swUpdateScrollbar) window.swUpdateScrollbar();
        }, { passive: true });
      };

      function loadImage(src) {
        return new Promise(function (resolve, reject) {
          var im = new Image();
          im.onload = function () { resolve(im); };
          im.onerror = function () { reject(new Error('icon')); };
          im.src = src;
        });
      }
      function drawServiceWatchIcon(ctx, img, size) {
        ctx.drawImage(img, 0, 0, size, size);
        var bandTop = Math.round(size * 0.70);
        var grad = ctx.createLinearGradient(0, bandTop, 0, size);
        grad.addColorStop(0, 'rgba(42, 122, 176, 0.98)');
        grad.addColorStop(1, 'rgba(28, 88, 132, 1)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, bandTop, size, size - bandTop);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '900 ' + Math.round(size * 0.082) + 'px system-ui,sans-serif';
        ctx.fillText('Service', size / 2, size * 0.835);
        ctx.font = '900 ' + Math.round(size * 0.074) + 'px system-ui,sans-serif';
        ctx.fillText('Watch', size / 2, size * 0.925);
      }
      function paintIcon() {
        var canvas = document.getElementById('sw-icon-canvas');
        if (!canvas) return;
        var dpr = Math.min(window.devicePixelRatio || 1, 3);
        var vw = window.innerWidth || 320;
        var vh = window.innerHeight || 320;
        var iconPx = Math.round(Math.min(vw, vh) * 0.68);
        canvas.width = Math.round(iconPx * dpr);
        canvas.height = Math.round(iconPx * dpr);
        canvas.style.width = iconPx + 'px';
        canvas.style.height = iconPx + 'px';
        var ctx = canvas.getContext('2d');
        if (!ctx) return;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        loadImage(new URL(BASE_ICON, location.href).href)
          .catch(function () { return loadImage(new URL(BASE_FALLBACK, location.href).href); })
          .then(function (img) { drawServiceWatchIcon(ctx, img, iconPx); })
          .catch(function () {});
      }

      window.swSetInitialScroll = function () {
        window.scrollTo(0, 0);
      };

      blockPinchZoom();
      applyScrollLabels();
      ensurePageHeight();
      window.swBindDocumentScroll();
      requestAnimationFrame(function () {
        ensurePageHeight();
        window.swSetInitialScroll();
        if (window.swUpdateScrollbar) window.swUpdateScrollbar();
      });
      paintIcon();
      window.addEventListener('resize', function () {
        ensurePageHeight();
        paintIcon();
      });
    })();
  </script>
  <script type="module" src="watch-app.js?v=sw11"></script>
</body>
</html>
