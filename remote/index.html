  <script>
  (function () {
    var SK = "servicehub_remote_share_k";
    var SA = "servicehub_remote_app_id";
    var FB_ORIGIN = "https://servicehub-18309.web.app";
    window.SVCREMOTE_BUILD = "2026.06.14-v131";

    /** Vecchi link su GitHub → stesso remoto su Firebase. */
    (function redirectGithubToFirebase() {
      var host = (location.hostname || "").toLowerCase();
      if (host.indexOf("github.io") === -1 && host.indexOf("github.dev") === -1) return;
      var rMatch = (location.pathname || "").match(/\/r\/[^/?#]+/i);
      var path = rMatch ? rMatch[0] : "/index.html";
      if (!rMatch && (location.search || "").indexOf("k=") !== -1) {
        path = "/index.html";
      }
      location.replace(FB_ORIGIN + path + (location.search || "") + (location.hash || ""));
    })();

    function isGithubHost() {
      var host = (location.hostname || "").toLowerCase();
      return host.indexOf("github.io") !== -1 || host.indexOf("github.dev") !== -1;
    }

    function isStandalonePwa() {
      try {
        return (
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true
        );
      } catch (_) {
        return false;
      }
    }

    /** Chiave nel path /r/CHIAVE (meglio per condivisione web: WhatsApp non taglia il path). */
    function extractKeyFromPathname(pathname) {
      var p = String(pathname || location.pathname || "");
      var m = p.match(/\/r\/([^/?#]+)/i);
      if (m && m[1]) {
        try {
          return decodeURIComponent(String(m[1]).replace(/\+/g, " ")).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      return "";
    }

    function buildCanonicalRemoteUrl(k, a) {
      if (isGithubHost()) {
        var path = String(location.pathname || "/");
        var m = path.match(/^(.*\/remote)\/?/i);
        var basePath = m ? m[1] : path.replace(/\/[^/]*$/, "");
        var u = new URL(basePath + "/index.html", location.origin);
        u.searchParams.set("k", k);
        if (a) u.searchParams.set("app", a);
        try {
          if (new URLSearchParams(location.search).get("pc") === "1") {
            u.searchParams.set("pc", "1");
          }
        } catch (_) {}
        return u;
      }
      var u = new URL(location.origin + "/r/" + encodeURIComponent(k));
      if (a) u.searchParams.set("app", a);
      try {
        if (new URLSearchParams(location.search).get("pc") === "1") {
          u.searchParams.set("pc", "1");
        }
      } catch (_) {}
      return u;
    }

    /** Chiave da qualsiasi URL (/r/KEY, ?k=, &k=, #...?k=, anche K maiuscolo). */
    function extractKeyFromHref(href) {
      var search = "";
      var hash = "";
      var pathname = "";
      var full = String(href || location.href || "");
      try {
        var u = new URL(full.indexOf("://") > -1 ? full : "https://local.invalid/" + full.replace(/^\//, ""));
        search = u.search;
        hash = u.hash;
        pathname = u.pathname;
        full = u.href;
      } catch (_) {}
      var fromPath = extractKeyFromPathname(pathname);
      if (fromPath) return fromPath;
      function trySearch(qs) {
        if (!qs) return "";
        var q = qs.charAt(0) === "?" ? qs.slice(1) : qs;
        var p = new URLSearchParams(q);
        return (p.get("k") || p.get("K") || "").trim();
      }
      var k = trySearch(search);
      if (k) return k;
      var m = full.match(/[?&#](?:k|K)=([^&#\s]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(String(m[1]).replace(/\+/g, " ")).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      if (hash && hash.indexOf("?") !== -1) {
        k = trySearch("?" + hash.split("?").slice(1).join("?"));
        if (k) return k;
      }
      return "";
    }

    function extractAppFromHref(href) {
      var search = "";
      var full = String(href || location.href || "");
      try {
        var u = new URL(full.indexOf("://") > -1 ? full : "https://local.invalid/" + full.replace(/^\//, ""));
        search = u.search;
        full = u.href;
      } catch (_) {}
      var p = new URLSearchParams(search);
      var a = (p.get("app") || p.get("APP") || "").trim();
      if (a) return a;
      var m = full.match(/[?&#](?:app|APP)=([^&#\s]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(m[1]).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      return "";
    }

    window.__svcRemoteExtractKeyFromUrl = function () {
      return extractKeyFromHref(location.href);
    };
    window.__svcRemoteExtractAppFromUrl = function () {
      return extractAppFromHref(location.href);
    };
    window.__svcRemoteIsStandalone = isStandalonePwa;
    window.__svcRemoteParseLink = function (input) {
      return {
        k: extractKeyFromHref(input),
        app: extractAppFromHref(input)
      };
    };
    window.__svcRemoteApplyPastedLink = function (input) {
      var parsed = window.__svcRemoteParseLink(input);
      if (!parsed.k) return false;
      try {
        localStorage.setItem(SK, parsed.k);
        sessionStorage.setItem(SK, parsed.k);
        if (parsed.app) {
          localStorage.setItem(SA, parsed.app);
          sessionStorage.setItem(SA, parsed.app);
        }
      } catch (_) {}
      var u = buildCanonicalRemoteUrl(parsed.k, parsed.app || "");
      location.replace(u.href);
      return true;
    };

    function cleanStandaloneUrl() {
      try {
        history.replaceState(null, "", location.origin + "/index.html");
      } catch (_) {}
    }

    try {
      var k = extractKeyFromHref(location.href);
      var a = extractAppFromHref(location.href);
      var standalone = isStandalonePwa();
      if (k) {
        localStorage.setItem(SK, k);
        try {
          sessionStorage.setItem(SK, k);
        } catch (_) {}
        if (a) {
          localStorage.setItem(SA, a);
          try {
            sessionStorage.setItem(SA, a);
          } catch (_) {}
        }
        if (standalone) {
          cleanStandaloneUrl();
        } else if (!extractKeyFromPathname(location.pathname)) {
          if (isGithubHost()) {
            try {
              history.replaceState(null, "", buildCanonicalRemoteUrl(k, a).href);
            } catch (_) {}
          } else {
            location.replace(buildCanonicalRemoteUrl(k, a).href);
            return;
          }
        }
      } else {
        var sk = (localStorage.getItem(SK) || sessionStorage.getItem(SK) || "").trim();
        /** App installata: non mostrare /r/... nella barra titolo — chiave solo in memoria. */
        if (sk && standalone) {
          cleanStandaloneUrl();
        }
      }
    } catch (_) {}
    if (isStandalonePwa()) {
      try {
        document.documentElement.classList.add("svc-remote-standalone");
      } catch (_) {}
    }

    /** PWA Windows: alla riapertura Edge può servire HTML/JS in cache — confronta build di rete. */
    window.__svcRemoteMaybeReloadFreshBuild = function (opts) {
      opts = opts || {};
      try {
        if (!isStandalonePwa() && !opts.force) return;
        var freshTries = parseInt(sessionStorage.getItem("svc_remote_fresh_try") || "0", 10) || 0;
        if (/[?&]_fresh=\d+/.test(location.search || "")) {
          sessionStorage.setItem("svc_remote_fresh_try", String(freshTries + 1));
          if (freshTries > 2) {
            sessionStorage.removeItem("svc_remote_fresh_try");
            return;
          }
        } else if (!opts.keepFreshCounter) {
          sessionStorage.removeItem("svc_remote_fresh_try");
        }
        var localBuild = window.SVCREMOTE_BUILD || "";
        var href = location.href.split("#")[0].split("?")[0];
        if (!/\.html$/i.test(href)) href = href.replace(/\/?$/, "/") + "index.html";
        fetch(href + "?buildcheck=" + Date.now(), { cache: "no-store" })
          .then(function (r) { return r.ok ? r.text() : ""; })
          .then(function (html) {
            if (!html) return;
            var m = html.match(/SVCREMOTE_BUILD\s*=\s*["']([^"']+)["']/);
            var net = m && m[1] ? m[1] : "";
            if (!net || !localBuild || net === localBuild) return;
            var u = new URL(location.href.split("#")[0]);
            u.searchParams.set("_fresh", String(Date.now()));
            location.replace(u.href);
          })
          .catch(function () {});
      } catch (_) {}
    };
    if (isStandalonePwa()) window.__svcRemoteMaybeReloadFreshBuild();
  })();
  </script>

<body>
    <div id="svc-remote-ver" style="position:fixed;bottom:4px;right:8px;z-index:9999;font:700 10px monospace;color:rgba(255,255,255,0.35);pointer-events:none;"></div>

    <div id="digital-preview-container"><div class="remote-loading-pulse" style="padding:48px 20px;text-align:center;color:#93c5fd;font-weight:700;">Caricamento Digital Report…</div></div>
  <script type="module">
    import { initializeApp, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import {
      getFirestore,
      initializeFirestore,

      onSnapshot,
      getDoc,

    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const DEFAULT_FIREBASE_CONFIG = {
      apiKey: "AIzaSyASdslVw8q_1Bz9RbN7Q_Fg_PEsbPOSkjM",
      authDomain: "servicehub-18309.firebaseapp.com",
      projectId: "servicehub-18309",
      storageBucket: "servicehub-18309.firebasestorage.app",
      messagingSenderId: "844169156848",
      appId: "1:844169156848:web:91b6c4e08900a350078a35"
    };

    const REMOTE_SHARE_K_KEY = "servicehub_remote_share_k";
    const REMOTE_APP_ID_KEY = "servicehub_remote_app_id";

    /** Alcuni browser / condivisioni usano ?K= invece di ?k=; la query può anche stare dopo # */
    function extractShareKeyFromLocation() {
      let k = "";
      if (typeof window.__svcRemoteExtractKeyFromUrl === "function") {
        k = window.__svcRemoteExtractKeyFromUrl();
      } else {
        const trySearch = function (search) {
          if (!search) return "";
          const q = search.startsWith("?") ? search.slice(1) : search;
          const p = new URLSearchParams(q);
          return (p.get("k") || p.get("K") || "").trim();
        };
        k = trySearch(location.search);
        if (!k) {
          const href = location.href || "";
          const m = href.match(/[?&#](?:k|K)=([^&#]+)/);
          if (m && m[1]) {
            try {
              k = decodeURIComponent(m[1].replace(/\+/g, " ")).trim();
            } catch (_) {
              k = String(m[1]).trim();
            }
          }
        }
        if (!k && location.hash && location.hash.indexOf("?") !== -1) {
          k = trySearch("?" + location.hash.split("?").slice(1).join("?"));
        }
      }
      if (k) {
        try {
          localStorage.setItem(REMOTE_SHARE_K_KEY, k);
          sessionStorage.setItem(REMOTE_SHARE_K_KEY, k);
        } catch (_) {}
        return k;
      }
      var standalone = typeof window.__svcRemoteIsStandalone === "function" && window.__svcRemoteIsStandalone();
      if (standalone) {
        try {
          k = (localStorage.getItem(REMOTE_SHARE_K_KEY) || sessionStorage.getItem(REMOTE_SHARE_K_KEY) || "").trim();
          if (k) return k;
        } catch (_) {}
      }
      return "";
    }

    function extractAppIdFromLocation() {
      const p = new URLSearchParams(location.search);
      let a = (p.get("app") || p.get("APP") || "").trim();
      if (a) return a;
      const m = (location.href || "").match(/[?&#](?:app|APP)=([^&#]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(m[1]).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      try {
        a = (localStorage.getItem(REMOTE_APP_ID_KEY) || sessionStorage.getItem(REMOTE_APP_ID_KEY) || "").trim();
        if (a) return a;
      } catch (_) {}
      return "stabile-2026-v4";
    }

    const shareKey = extractShareKeyFromLocation();
    const appIdParam = extractAppIdFromLocation();
    if (shareKey) {
      try {
        localStorage.setItem(REMOTE_SHARE_K_KEY, shareKey);
        sessionStorage.setItem(REMOTE_SHARE_K_KEY, shareKey);
        if (appIdParam) {
          localStorage.setItem(REMOTE_APP_ID_KEY, appIdParam);
          sessionStorage.setItem(REMOTE_APP_ID_KEY, appIdParam);
        }
      } catch (_) {}
    }

    function reapplyRemoteDeviceLayout() {
      var root = document.getElementById("digital-preview-container");
      if (!root) return;
      applyDigitalPhoneLayoutIfNeeded(root);
      applyRemoteLayoutPrefs(root);
      updateRemoteLayoutResetUI();
    }

    window.addEventListener("resize", reapplyRemoteDeviceLayout);
    window.addEventListener("orientationchange", function () {
      setTimeout(reapplyRemoteDeviceLayout, 200);
    });
    window.addEventListener("pagehide", flushRemoteLayoutPrefsToStorage);

    const rootEl = document.getElementById("digital-preview-container");

    /** Solo smartphone stretto — tablet = layout PC identico al desktop. */
    function isDigitalRemotePhone() {
      var ua = navigator.userAgent || "";
      var minVp = Math.min(window.innerWidth || 0, window.innerHeight || 0);
      var maxVp = Math.max(window.innerWidth || 0, window.innerHeight || 0);
      var minSc = Math.min(window.screen.width || 0, window.screen.height || 0);
      var maxSc = Math.max(window.screen.width || 0, window.screen.height || 0);

      if (/iPad|Tablet|PlayBook|Silk|Kindle|SM-T|\bTab\b/i.test(ua)) return false;
      if (/iPhone|iPod/i.test(ua)) return true;
      if (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1) {
        if (minVp < 520 && maxVp < 920) return true;
      }
      if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1 && minVp >= 520) return false;

      if (/Android/i.test(ua)) {
        if (!/Mobile/i.test(ua)) return false;
        if (minSc >= 600 || maxSc >= 600) return false;
        if (maxVp >= 640) return false;
        try {
          if (window.matchMedia("(min-width: 600px)").matches) return false;
        } catch (_) {}
        return minVp < 520;
      }

      if (minSc >= 600 || maxVp >= 768) return false;
      return minVp < 520;
    }

    /** Tablet touch — layout attuale (2 colonne). Non usare su PC mouse/tastiera. */
    function isDigitalRemoteTablet() {
      if (isDigitalRemotePhone()) return false;
      var ua = navigator.userAgent || "";
      if (/iPad|Tablet|PlayBook|Silk|Kindle|SM-T|\bTab\b/i.test(ua)) return true;
      if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) return true;
      if (/Android/i.test(ua) && !/Mobile/i.test(ua)) return true;
      return false;
    }

    function clearDigitalPhoneInlineOverrides(root) {
      var grid = root.querySelector("#digital-cards-grid");
      if (grid) {
        ["display", "flex-direction", "align-items", "grid-template-columns", "width", "max-width", "margin", "padding", "gap", "overflow-x"].forEach(function (p) {
          grid.style.removeProperty(p);
        });
      }
      root.querySelectorAll(".digital-card").forEach(function (card) {
        ["width", "max-width", "margin-left", "margin-right"].forEach(function (p) {
          card.style.removeProperty(p);
        });
      });
    }

    /** Calcola metriche layout desktop-scaled per il display corrente (tablet, laptop, monitor). */
    function computeDigitalLayoutMetrics() {
      var vw = Math.max(window.innerWidth || 0, document.documentElement.clientWidth || 0);
      var vh = Math.max(window.innerHeight || 0, document.documentElement.clientHeight || 0);
      var vmin = Math.min(vw, vh);
      var vmax = Math.max(vw, vh);
      var refW = 1280;
      var scale = Math.min(1, Math.max(0.76, vw / refW));
      if (vmax >= 1500) scale = 1;

      var colMin;
      if (vw >= 1500) colMin = 450;
      else if (vw >= 1100) colMin = Math.round(Math.max(400, vw * 0.36));
      else if (vw >= 820) colMin = Math.round(Math.max(360, vw * 0.44));
      else colMin = Math.round(Math.max(300, vw * 0.46));

      var gridPad = Math.round(12 + scale * 16);
      var cardPx = Math.round(18 + scale * 10);
      var cardPy = Math.round(14 + scale * 6);
      var gap = Math.round(14 + scale * 14);
      var titleFs = Math.round(15 + scale * 4);
      var labelFs = Math.round(16 + scale * 7);
      var valueFs = Math.round(22 + scale * 12);

      var tier = "desktop";
      if (vmin < 700 || vw < 900) tier = "tablet";
      if (vw < 820) tier = "compact";

      return {
        scale: scale,
        colMin: colMin,
        gridPad: gridPad,
        cardPx: cardPx,
        cardPy: cardPy,
        gap: gap,
        titleFs: titleFs,
        labelFs: labelFs,
        valueFs: valueFs,
        tier: tier
      };
    }

    function clearRowInlineFonts(scope) {
      if (!scope) return;
      scope.querySelectorAll(
        ".digital-row-label, .digital-row-value, .digital-stocc-sigla, .digital-stocc-value, .digital-stocc-mid"
      ).forEach(function (el) {
        el.style.removeProperty("font-size");
        el.style.removeProperty("padding-left");
        el.style.removeProperty("white-space");
        el.style.removeProperty("overflow");
        el.style.removeProperty("text-overflow");
        el.style.removeProperty("text-align");
        el.style.removeProperty("flex");
      });
    }

    function fixStoccaggioCardLayout(root) {
      if (!root) return;
      var inFocus = root.classList.contains("digital-focus-active");
      root.querySelectorAll('.digital-card[data-module-id="sec-stoccaggio-interno"] .digital-card-surface').forEach(function (el) {
        el.style.setProperty("overflow-x", "hidden", "important");
        el.style.setProperty("overflow-y", inFocus ? "auto" : "visible", "important");
        el.style.setProperty("max-width", "100%", "important");
      });
      if (inFocus) return;
      root.querySelectorAll(".digital-stocc-row").forEach(function (row) {
        row.style.setProperty("max-width", "100%", "important");
        row.style.setProperty("overflow", "hidden", "important");
      });
    }

    /** Zoom Stoccaggio: forza TUTTA la catena di contenitori a piena larghezza pagina. */
    function enforceStoccFocusFullWidth(root) {
      root = root || document.getElementById("digital-preview-container");
      if (!root) return;
      if (!root.classList.contains("digital-focus-active") || !root.classList.contains("digital-focus-stocc")) return;
      var grid = root.querySelector("#digital-cards-grid");
      if (grid) {
        grid.style.setProperty("display", "block", "important");
        grid.style.setProperty("grid-template-columns", "none", "important");
        grid.style.setProperty("width", "100%", "important");
        grid.style.setProperty("max-width", "none", "important");
        grid.style.setProperty("margin", "0", "important");
        grid.style.setProperty("padding", "8px 0 24px", "important");
        grid.style.setProperty("background", "transparent", "important");
        grid.style.setProperty("backdrop-filter", "none", "important");
        grid.style.setProperty("box-sizing", "border-box", "important");
      }
      var card = root.querySelector(".digital-card--expanded");
      if (!card) return;
      card.style.setProperty("width", "100%", "important");
      card.style.setProperty("max-width", "none", "important");
      card.style.setProperty("margin", "0", "important");
      card.querySelectorAll(".digital-card-surface, .digital-card-zoom-cols, .digital-card-body-col, .digital-rows--stocc").forEach(function (el) {
        el.style.setProperty("width", "100%", "important");
        el.style.setProperty("max-width", "none", "important");
        el.style.setProperty("box-sizing", "border-box", "important");
      });
      card.querySelectorAll(".digital-card-surface").forEach(function (el) {
        el.style.setProperty("padding", "0", "important");
      });
    }

    function stripAdaptiveInlineFromCard(cardEl) {
      if (!cardEl) return;
      var props = [
        "font-size", "padding", "padding-top", "padding-bottom", "padding-left", "padding-right",
        "width", "max-width", "overflow", "overflow-x", "overflow-y", "flex", "text-align",
        "white-space", "text-overflow"
      ];
      cardEl.querySelectorAll(".digital-card-surface, .digital-card-title, .digital-row-label, .digital-row-value, .digital-stocc-sigla, .digital-stocc-value, .digital-stocc-mid, .digital-stocc-row, .status-cell-btn").forEach(function (el) {
        props.forEach(function (p) {
          el.style.removeProperty(p);
        });
      });
      props.forEach(function (p) {
        cardEl.style.removeProperty(p);
      });
    }

    function applyDigitalResponsiveLayout(root) {
      if (!root) return;
      if (root.classList.contains("digital-focus-active")) return;
      var m = computeDigitalLayoutMetrics();
      root.style.setProperty("--dr-col-min", m.colMin + "px");
      root.style.setProperty("--dr-grid-gap", m.gap + "px");
      root.style.setProperty("--dr-grid-pad", m.gridPad + "px");
      root.style.setProperty("--dr-card-px", m.cardPx + "px");
      root.style.setProperty("--dr-card-py", m.cardPy + "px");
      root.style.setProperty("--dr-title-fs", m.titleFs + "px");
      root.style.setProperty("--dr-label-fs", m.labelFs + "px");
      root.style.setProperty("--dr-value-fs", m.valueFs + "px");
      root.setAttribute("data-dr-tier", m.tier);
      root.setAttribute("data-dr-scale", m.scale.toFixed(2));

      root.style.setProperty("overflow-x", "hidden", "important");
      root.style.setProperty("touch-action", "pan-y", "important");

      var scroll = root.querySelector("#digital-preview-scroll");
      if (scroll) {
        scroll.style.setProperty("overflow-x", "hidden", "important");
        scroll.style.setProperty("overflow-y", "auto", "important");
        scroll.style.setProperty("touch-action", "pan-y", "important");
        scroll.style.setProperty("overscroll-behavior-x", "none", "important");
        scroll.style.setProperty("width", "100%", "important");
        scroll.style.setProperty("max-width", "100%", "important");
      }

      var grid = root.querySelector("#digital-cards-grid");
      if (grid) {
        grid.style.setProperty("display", "grid", "important");
        grid.style.setProperty("grid-template-columns", "repeat(auto-fit, minmax(" + m.colMin + "px, 1fr))", "important");
        grid.style.setProperty("gap", m.gap + "px", "important");
        grid.style.setProperty("padding", m.gridPad + "px", "important");
        grid.style.setProperty("overflow-x", "hidden", "important");
        grid.style.setProperty("width", "100%", "important");
        grid.style.setProperty("max-width", "100%", "important");
        grid.style.setProperty("margin", "0 auto", "important");
        grid.style.setProperty("justify-content", "center", "important");
        grid.style.setProperty("box-sizing", "border-box", "important");
      }

      root.querySelectorAll(".digital-card-surface").forEach(function (el) {
        el.style.setProperty("padding", m.cardPy + "px " + m.cardPx + "px " + (m.cardPy - 2) + "px", "important");
        el.style.setProperty("overflow-x", "hidden", "important");
        el.style.setProperty("max-width", "100%", "important");
        el.style.setProperty("box-sizing", "border-box", "important");
      });
      root.querySelectorAll(".digital-card-title").forEach(function (el) {
        el.style.setProperty("font-size", m.titleFs + "px", "important");
        el.style.setProperty("padding-left", "0.14em", "important");
        el.style.setProperty("padding-right", "0.08em", "important");
        el.style.setProperty("padding-top", "6px", "important");
        el.style.setProperty("padding-bottom", "12px", "important");
        el.style.setProperty("line-height", "1.45", "important");
        el.style.setProperty("overflow", "visible", "important");
        el.style.setProperty("text-align", "left", "important");

      root.querySelectorAll(".digital-row-label:not(.digital-stocc-sigla)").forEach(function (el) {
        el.style.setProperty("font-size", m.labelFs + "px", "important");
        el.style.setProperty("padding-left", "3px", "important");
      });
      root.querySelectorAll(".digital-row-value:not(.digital-stocc-value)").forEach(function (el) {
        if (el.classList.contains("digital-row-value--text")) {
          el.style.setProperty("font-size", Math.round(m.valueFs * 0.72) + "px", "important");
        } else {
          el.style.setProperty("font-size", m.valueFs + "px", "important");
        }
      });
      fixStoccaggioCardLayout(root);
      applyRemoteLayoutPrefs(root);
    }

    function clearAdaptiveLayoutInline(root) {
      if (!root) return;
      [
        "--dr-col-min", "--dr-grid-gap", "--dr-grid-pad", "--dr-card-px", "--dr-card-py",
        "--dr-title-fs", "--dr-label-fs", "--dr-value-fs"
      ].forEach(function (v) {
        root.style.removeProperty(v);
      });
      root.removeAttribute("data-dr-tier");
      root.removeAttribute("data-dr-scale");
      root.style.removeProperty("overflow-x");
      root.style.removeProperty("touch-action");
      var scroll = root.querySelector("#digital-preview-scroll");
      if (scroll) {
        [
          "overflow-x", "overflow-y", "touch-action", "overscroll-behavior-x",
          "width", "max-width", "padding"
        ].forEach(function (p) {
          scroll.style.removeProperty(p);
        });
      }
      var grid = root.querySelector("#digital-cards-grid");
      if (grid) {
        [
          "display", "grid-template-columns", "gap", "padding", "overflow-x",
          "width", "max-width", "margin", "justify-content", "box-sizing"
        ].forEach(function (p) {
          grid.style.removeProperty(p);
        });
      }
      clearRowInlineFonts(root);
      root.querySelectorAll(".digital-card-surface").forEach(function (el) {
        el.style.removeProperty("padding");
        el.style.removeProperty("overflow-x");
        el.style.removeProperty("max-width");
        el.style.removeProperty("box-sizing");
      });
      root.querySelectorAll(".digital-card-title").forEach(function (el) {
        [
          "font-size", "padding-left", "padding-right", "padding-top",
          "padding-bottom", "line-height", "overflow", "text-align"
        ].forEach(function (p) {
          el.style.removeProperty(p);
        });
      });
    }

    function updateRemoteSyncStatus() {
      var el = document.getElementById("digital-remote-sync-status");
      if (el && el.parentNode) el.parentNode.removeChild(el);
    }

    function applyPhoneTrendCompactLayout(root) {
      if (!root || !isDigitalRemotePhone()) return;
      root.querySelectorAll(".digital-trend-wrap").forEach(function (wrap) {
        wrap.querySelectorAll("style").forEach(function (st) {
          st.remove();
        });
      });
      root.querySelectorAll('.digital-card[data-module-id="TREND_SPECIAL"]').forEach(function (card) {
        card.style.setProperty("max-width", "100%", "important");
        card.style.setProperty("width", "100%", "important");
      });
      root.querySelectorAll(".digital-trend-grid").forEach(function (grid) {
        grid.style.setProperty("display", "grid", "important");
        grid.style.setProperty("grid-template-columns", "minmax(0,1.35fr) minmax(40px,0.8fr) minmax(40px,0.8fr) minmax(52px,0.95fr)", "important");
        grid.style.setProperty("column-gap", "5px", "important");
        grid.style.setProperty("width", "100%", "important");
        grid.style.setProperty("max-width", "100%", "important");
        grid.style.setProperty("white-space", "nowrap", "important");
      });
      var fontMap = [
        [".digital-trend-head__time", "9px"],
        [".digital-trend-head__dur", "8px"],
        [".digital-trend-row__name", "8px"],
        [".digital-trend-row__val", "11px"],
        [".digital-trend-row__delta", "9px"],
        [".digital-trend-row__tons", "7px"],
        [".digital-trend-section", "8px"]
      ];
      fontMap.forEach(function (pair) {
        root.querySelectorAll(pair[0]).forEach(function (el) {
          el.style.setProperty("font-size", pair[1], "important");
        });
      });
      root.querySelectorAll(".digital-trend-row").forEach(function (row) {
        row.style.setProperty("padding-top", "4px", "important");
        row.style.setProperty("padding-bottom", "4px", "important");
      });
    }

    function applyDigitalPhoneLayoutIfNeeded(root) {
      root = root || document.getElementById("digital-preview-container");
      if (!root) return;
      var isPhone = isDigitalRemotePhone();
      var isTablet = !isPhone && isDigitalRemoteTablet();
      root.classList.toggle("digital-phone-layout", isPhone);
      root.classList.toggle("digital-tablet-layout", isTablet);
      root.classList.toggle("digital-pc-layout", !isPhone && !isTablet);
      root.classList.toggle("digital-adaptive-layout", isTablet);
      if (isTablet) {
        clearDigitalPhoneInlineOverrides(root);
        applyDigitalResponsiveLayout(root);
        root.querySelectorAll(".digital-card").forEach(function (card) {
          card.style.setProperty("overflow", "hidden", "important");
        });
        applyRemoteLayoutPrefs(root);
        enforceStoccFocusFullWidth(root);
        return;
      }
      if (!isPhone) {
        clearDigitalPhoneInlineOverrides(root);
        clearAdaptiveLayoutInline(root);
        applyRemoteLayoutPrefs(root);
        enforceStoccFocusFullWidth(root);
        return;
      }
      var grid = root.querySelector("#digital-cards-grid");
      if (grid) {
        grid.style.setProperty("display", "flex", "important");
        grid.style.setProperty("flex-direction", "column", "important");
        grid.style.setProperty("align-items", "center", "important");
        grid.style.setProperty("grid-template-columns", "none", "important");
        grid.style.setProperty("width", "100%", "important");
        grid.style.setProperty("max-width", "100%", "important");
        grid.style.setProperty("margin", "0 auto", "important");
        grid.style.setProperty("padding", "8px 6px 16px", "important");
        grid.style.setProperty("gap", "14px", "important");
        grid.style.setProperty("overflow-x", "hidden", "important");
      }
      root.querySelectorAll(".digital-card").forEach(function (card) {
        card.style.setProperty("width", "100%", "important");
        card.style.setProperty("max-width", "min(100%, 360px)", "important");
        card.style.setProperty("margin-left", "auto", "important");
        card.style.setProperty("margin-right", "auto", "important");
      });
      applyRemoteLayoutPrefs(root);
      applyPhoneTrendCompactLayout(root);
      enforceStoccFocusFullWidth(root);
    }

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function wireRemotePasteLink() {
      const pasteBtn = document.getElementById("svc-remote-paste-go");
      const pasteTa = document.getElementById("svc-remote-paste-link");
      const pasteErr = document.getElementById("svc-remote-paste-err");
      if (!pasteBtn || !pasteTa) return;

    function getDefaultLayoutPrefs() {
      return {
        contenitoreV: 0,
        contenitoreH: 0,

        valori: 0,

    /** Impostazioni di fabbrica PC/tablet — preset originale concordato (non smartphone). */
    function getFactoryLayoutBuiltin() {
      return {
        global: cloneLayoutPrefs(getDefaultLayoutPrefs()),
        modules: {}
      };
    }

    function loadFactoryLayoutStore() {
      var builtin = getFactoryLayoutBuiltin();
      try {
        var raw = localStorage.getItem(SRL_FACTORY_STORAGE_KEY);
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && Number(parsed.v) === SRL_FACTORY_LAYOUT_REVISION) {
            var store = { global: cloneLayoutPrefs(builtin.global), modules: {} };
            if (parsed.global) {
              applyFlatLayoutPrefs(parsed.global, store.global);
              store.global = clampLayoutPrefs(store.global);
            }
            if (parsed.modules && typeof parsed.modules === "object") {
              Object.keys(parsed.modules).forEach(function (k) {
                store.modules[k] = clampLayoutPrefs(parsed.modules[k]);
              });
            }
            return store;
          }
        }
      } catch (_) {}
      try {
        localStorage.setItem(
          SRL_FACTORY_STORAGE_KEY,
          JSON.stringify({
            v: SRL_FACTORY_LAYOUT_REVISION,
            global: builtin.global,
            modules: builtin.modules
          })
        );
      } catch (_) {}
      return builtin;
    }

    function cloneLayoutPrefs(p) {
      var out = getDefaultLayoutPrefs();
      SRL_LAYOUT_KEYS.forEach(function (k) {
        if (p && typeof p[k] === "number" && !isNaN(p[k])) out[k] = p[k];
      });
      return out;
    }

    function clampLayoutPrefs(p) {
      var out = cloneLayoutPrefs(p || {});
      SRL_LAYOUT_KEYS.forEach(function (k) {
        var lim = SRL_LAYOUT_LIMITS[k];
        if (lim) out[k] = Math.max(lim.min, Math.min(lim.max, out[k]));
      });
      return out;
    }

    function applyFlatLayoutPrefs(src, dest) {
      if (!src || !dest) return;
      if (typeof src.contenitore === "number" && src.contenitoreV == null) {
        dest.contenitoreV = src.contenitore;
      }
      SRL_LAYOUT_KEYS.forEach(function (k) {
        if (typeof src[k] === "number" && !isNaN(src[k])) dest[k] = src[k];
      });
    }

    function normalizeRemoteLayoutStore(store) {
      if (!store) store = { global: getDefaultLayoutPrefs(), modules: {}, selectedTarget: SRL_LAYOUT_TARGET_ALL };
      store.global = clampLayoutPrefs(store.global);
      store.modules = store.modules && typeof store.modules === "object" ? store.modules : {};
      Object.keys(store.modules).forEach(function (k) {
        store.modules[k] = clampLayoutPrefs(store.modules[k]);
      });
      if (!store.selectedTarget) store.selectedTarget = SRL_LAYOUT_TARGET_ALL;
      return store;
    }

    function serializeRemoteLayoutStore(store) {
      store = normalizeRemoteLayoutStore(store);
      store.selectedTarget = __srlLayoutTarget || store.selectedTarget || SRL_LAYOUT_TARGET_ALL;
      return JSON.stringify({
        v: 3,
        global: store.global,
        modules: store.modules,
        selectedTarget: store.selectedTarget
      });
    }

    function loadRemoteLayoutStore() {
      var store = {
        global: getDefaultLayoutPrefs(),
        modules: {},
        selectedTarget: SRL_LAYOUT_TARGET_ALL
      };
      var migratedFromLegacy = false;
      try {
        var raw = localStorage.getItem(SRL_LAYOUT_STORAGE_KEY);
        if (!raw) {
          raw = localStorage.getItem("svc_remote_layout_prefs_v2");
          if (raw) migratedFromLegacy = true;
          if (!raw) {
            raw = localStorage.getItem("svc_remote_layout_prefs_v1");
            if (raw) migratedFromLegacy = true;
          }
        }
        if (!raw) {
          raw = sessionStorage.getItem(SRL_LAYOUT_STORAGE_KEY);
          if (!raw) raw = sessionStorage.getItem(SRL_LAYOUT_STORAGE_KEY + "_bak");
        }
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && parsed.global) {
            applyFlatLayoutPrefs(parsed.global, store.global);
            store.modules = parsed.modules && typeof parsed.modules === "object" ? parsed.modules : {};
            if (parsed.selectedTarget) store.selectedTarget = String(parsed.selectedTarget);
          } else {
            applyFlatLayoutPrefs(parsed, store.global);
          }
        }
      } catch (_) {}
      store = normalizeRemoteLayoutStore(store);
      if (migratedFromLegacy) saveRemoteLayoutStore(store);
      return store;
    }

    function saveRemoteLayoutStore(store) {
      var payload = serializeRemoteLayoutStore(store);
      try {
        localStorage.setItem(SRL_LAYOUT_STORAGE_KEY, payload);
        if (localStorage.getItem(SRL_LAYOUT_STORAGE_KEY) === payload) {
          try {
            sessionStorage.setItem(SRL_LAYOUT_STORAGE_KEY + "_bak", payload);
          } catch (_) {}
          return true;
        }
      } catch (_) {}
      try {
        sessionStorage.setItem(SRL_LAYOUT_STORAGE_KEY, payload);
        return true;
      } catch (_) {}
      return false;
    }

    function flushRemoteLayoutPrefsToStorage() {
      var store = loadRemoteLayoutStore();
      saveRemoteLayoutStore(store);
    }

    function loadRemoteLayoutPrefs() {
      return loadRemoteLayoutStore().global;
    }

    function getEffectiveModulePrefs(store, moduleId) {
      if (store.modules && store.modules[moduleId]) {
        return clampLayoutPrefs(store.modules[moduleId]);
      }
      return store.global;
    }

    function collectRemoteModules(root) {
      var seen = {};
      var out = [];
      if (!root) return out;
      root.querySelectorAll(".digital-card[data-module-id]").forEach(function (card) {
        var id = card.getAttribute("data-module-id");
        if (!id || seen[id]) return;
        seen[id] = true;
        var titleEl = card.querySelector(".digital-card-title");
        var title = titleEl ? String(titleEl.textContent || "").replace(/\s+/g, " ").trim() : "";
        out.push({ id: id, title: title || id });
      });
      return out;
    }

    function calcLayoutMetrics(p) {
      var basePy = 14;
      var basePx = 16;
      var baseTitle = 17;
      var baseSigla = 20;
      var baseValue = 28;
      var py = basePy + (p.contenitoreV || 0) * 4;
      var px = Math.max(0, basePx + (p.contenitoreH || 0) * 4);
      var rowPadY = 7 + (p.contenitoreV || 0) * 2;
      var titleFs = baseTitle + (p.titoli || 0) * 2;
      var siglaFs = baseSigla + (p.sigle || 0) * 2;
      var valueFs = baseValue + (p.valori || 0) * 3;
      return {
        py: py,
        px: px,
        rowPadY: rowPadY,
        titleFs: titleFs,
        siglaFs: siglaFs,
        valueFs: valueFs,
        valueTextFs: Math.round(valueFs * 0.72),
        valueShiftPx: (p.valoriH || 0) * 4,
        bordoPct: Math.max(50, Math.min(100, 100 + (p.contenitoreB || 0) * 4))
      };
    }

    function applyLayoutPrefsToCard(card, p) {
      if (!card || !p) return;
      var root = document.getElementById("digital-preview-container");
      var inFocus = !!(root && root.classList.contains("digital-focus-active"));
      var isExpanded = card.classList.contains("digital-card--expanded");
      var isStoccFocus =
        inFocus &&
        isExpanded &&
        root.classList.contains("digital-focus-stocc");
      var m = calcLayoutMetrics(p);
      if (isStoccFocus) {
        card.style.setProperty("width", "100%", "important");
        card.style.setProperty("max-width", "100%", "important");
        card.style.setProperty("margin", "0", "important");
        card.querySelectorAll(".digital-card-surface").forEach(function (el) {
          el.style.setProperty("padding", "0", "important");
          el.style.setProperty("width", "100%", "important");
          el.style.setProperty("max-width", "100%", "important");
        });
        card.querySelectorAll(".digital-stocc-sigla, .digital-stocc-value, .digital-stocc-mid").forEach(function (el) {
          el.style.removeProperty("font-size");
          el.style.removeProperty("transform");
          el.style.removeProperty("padding-left");
          el.style.removeProperty("padding-right");
        });
        card.querySelectorAll(".digital-stocc-row").forEach(function (el) {
          el.style.removeProperty("padding-top");
          el.style.removeProperty("padding-bottom");
        });
      } else {
        card.querySelectorAll(".digital-card-surface").forEach(function (el) {
          el.style.setProperty("padding", m.py + "px " + m.px + "px " + Math.max(8, m.py - 2) + "px", "important");
        });
        card.querySelectorAll(".digital-card-title").forEach(function (el) {
          el.style.setProperty("font-size", m.titleFs + "px", "important");
        });
        card.querySelectorAll(".digital-row-label, .digital-stocc-sigla").forEach(function (el) {
          el.style.setProperty("font-size", m.siglaFs + "px", "important");
        });
        card.querySelectorAll(".digital-row-value, .digital-stocc-value").forEach(function (el) {
          var fs = el.classList.contains("digital-row-value--text") ? m.valueTextFs : m.valueFs;
          el.style.setProperty("font-size", fs + "px", "important");
          if (m.valueShiftPx) {
            el.style.setProperty("transform", "translateX(" + m.valueShiftPx + "px)", "important");
          } else {
            el.style.removeProperty("transform");
          }
        });
        card.querySelectorAll(".digital-row--status .status-cell-btn").forEach(function (el) {
          el.style.removeProperty("font-size");
          if (m.valueShiftPx) {
            el.style.setProperty("transform", "translateX(" + m.valueShiftPx + "px)", "important");
          } else {
            el.style.removeProperty("transform");
          }
        });
        if (!isDigitalRemotePhone()) {
          card.querySelectorAll(".digital-trend-row__name").forEach(function (el) {
            el.style.setProperty("font-size", m.siglaFs + "px", "important");
          });
          card.querySelectorAll(".digital-trend-row__val").forEach(function (el) {
            el.style.setProperty("font-size", m.valueFs + "px", "important");

    function resetRemoteLayoutToFactory() {
      if (isDigitalRemotePhone()) return;
      var store = loadRemoteLayoutStore();
      var factory = loadFactoryLayoutStore();
      var target = __srlLayoutTarget || store.selectedTarget || SRL_LAYOUT_TARGET_ALL;
      if (target === SRL_LAYOUT_TARGET_ALL) {
        store.global = cloneLayoutPrefs(factory.global);
        store.modules = {};
        if (factory.modules && typeof factory.modules === "object") {
          Object.keys(factory.modules).forEach(function (mid) {
            store.modules[mid] = cloneLayoutPrefs(factory.modules[mid]);
          });
        }
      } else if (factory.modules && factory.modules[target]) {
        store.modules[target] = cloneLayoutPrefs(factory.modules[target]);
      } else {
        delete store.modules[target];
      }
      saveRemoteLayoutStore(store);
      applyRemoteLayoutPrefs();
      updateRemoteColonneLabel();
    }

    function bumpRemoteLayoutPref(key, delta) {
      if (!SRL_LAYOUT_KEYS.includes(key)) return;
      var store = loadRemoteLayoutStore();
      var target = __srlLayoutTarget || store.selectedTarget || SRL_LAYOUT_TARGET_ALL;
      if (key === "colonne" && target !== SRL_LAYOUT_TARGET_ALL) return;
      var prefs;
      if (target === SRL_LAYOUT_TARGET_ALL) {
        prefs = store.global;
      } else {
        if (!store.modules[target]) store.modules[target] = cloneLayoutPrefs(store.global);
        prefs = store.modules[target];
      }
      var lim = SRL_LAYOUT_LIMITS[key];
      prefs[key] = Math.max(lim.min, Math.min(lim.max, (prefs[key] || 0) + delta));
      saveRemoteLayoutStore(store);
      applyRemoteLayoutPrefs();
    }

    function positionRemoteSettingsPanel() {
      var gear = document.getElementById("btn-remote-settings");
      var panel = document.getElementById("srl-settings-panel");
      if (!gear || !panel) return;
      var r = gear.getBoundingClientRect();
      var panelW = panel.offsetWidth || 260;
      var top = r.bottom + 8;
      var left = r.right - panelW;
      if (left < 8) left = 8;
      if (left + panelW > window.innerWidth - 8) {
        left = Math.max(8, window.innerWidth - panelW - 8);
      }
      if (top + 120 > window.innerHeight - 8) {
        top = Math.max(8, r.top - 8 - (panel.offsetHeight || 180));
      }
      panel.style.top = top + "px";
      panel.style.left = left + "px";
      panel.style.right = "auto";
    }

    function setRemoteSettingsOpen(open) {
      if (!open && __srlSettingsPanelOpen) flushRemoteLayoutPrefsToStorage();
      __srlSettingsPanelOpen = !!open;

      var panel = document.getElementById("srl-settings-panel");

    function wireRemoteSettingsUI() {
      var gear = document.getElementById("btn-remote-settings");
      var panel = document.getElementById("srl-settings-panel");
      var editBtn = document.getElementById("srl-layout-edit-btn");
      var editor = document.getElementById("srl-layout-editor");
      if (!gear || !panel) return;

      var store = loadRemoteLayoutStore();
      __srlLayoutTarget = store.selectedTarget || SRL_LAYOUT_TARGET_ALL;

      restoreRemoteSettingsPanelState();
      updateRemoteLayoutTargetUI();
      updateRemoteLayoutResetUI();

      gear.onclick = function (e) {
        e.stopPropagation();
        setRemoteSettingsOpen(!__srlSettingsPanelOpen);
      };

      if (editBtn && editor) {
        editBtn.onclick = function (e) {
          e.stopPropagation();
          __srlLayoutEditorOpen = !__srlLayoutEditorOpen;
          editor.style.display = __srlLayoutEditorOpen ? "block" : "none";
          if (__srlLayoutEditorOpen) {
            refreshRemoteLayoutTargetList();
            updateRemoteLayoutTargetUI();
          }
          if (__srlSettingsPanelOpen) {
            requestAnimationFrame(function () {
              positionRemoteSettingsPanel();
            });
          }
        };
      }

      var targetToggle = document.getElementById("srl-layout-target-toggle");
      if (targetToggle) {
        targetToggle.onclick = function (e) {
          e.stopPropagation();
          var list = document.getElementById("srl-layout-target-list");
          if (!list) return;
          var open = list.style.display !== "none";
          list.style.display = open ? "none" : "block";
          targetToggle.setAttribute("aria-expanded", open ? "false" : "true");
          if (!open) refreshRemoteLayoutTargetList();
          if (__srlSettingsPanelOpen) {
            requestAnimationFrame(function () {
              positionRemoteSettingsPanel();
            });
          }
        };
      }

      panel.querySelectorAll("[data-srl-key][data-srl-dir]").forEach(function (btn) {
        btn.onclick = function (e) {
          e.stopPropagation();
          var key = btn.getAttribute("data-srl-key");
          var dir = parseInt(btn.getAttribute("data-srl-dir"), 10);
          if (!key || !dir) return;
          bumpRemoteLayoutPref(key, dir);
        };
      });

      var resetBtn = document.getElementById("srl-layout-reset-btn");
      if (resetBtn) {
        resetBtn.onclick = function (e) {
          e.stopPropagation();
          resetRemoteLayoutToFactory();
        };
      }

      updateRemoteColonneLabel();
    }

    function stoccaggioRowsSignature(rows) {
      if (!Array.isArray(rows) || !rows.length) return "";
      return rows
        .map(function (r) {
          return String(r.label || "") + ":" + String(r.val || "").replace(/<[^>]+>/g, "") + ":" + String(r.fillPct != null ? r.fillPct : "") +
            ":" + (r.drain ? "D" : "") + (r.acc ? "A" : "");
        })
        .join("|");
    }

    function tankStatusesSignature(ts) {
      if (!ts || typeof ts !== "object") return "";
      return Object.keys(ts)
        .sort()
        .map(function (k) {
          if (k.endsWith("_name")) return "";
          return k + ":" + String(ts[k] || "");
        })
        .filter(Boolean)
        .join("|");
    }

    function rowTankVisualFlags(r, tankStatuses) {
      if (r && (r.drain != null || r.acc != null)) {
        return { drain: !!r.drain, acc: !!r.acc };
      }
      if (r && r.tankDbKey && tankStatuses && typeof tankStatuses === "object") {
        const st = String(tankStatuses[r.tankDbKey] || "").toLowerCase();
        return { drain: st.includes("drenagg"), acc: st.includes("accumul") };
      }
      return { drain: false, acc: false };
    }

    function getStoccaggioTankFillPct(tankDbKey, levelRaw, fillPct) {
      if (fillPct != null && !isNaN(Number(fillPct))) {
        return Math.max(0, Math.min(100, Number(fillPct)));
      }
      const mm = parseFloat(String(levelRaw == null ? "" : levelRaw).replace(",", "."));
      if (isNaN(mm) || mm < 0) return 0;
      return Math.max(0, Math.min(100, (mm / 10000) * 100));
    }

    function parseStoccRowLevels(r) {
      var mm = r && r.levelMm != null ? Number(r.levelMm) : null;
      var tons = r && r.tons != null && String(r.tons) !== "" && !isNaN(Number(r.tons)) ? Number(r.tons) : null;
      var raw = String((r && r.val) || "").replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
      if (mm == null || isNaN(mm)) {
        var mmMatch = raw.match(/([\d.,]+)\s*mm/i);
        if (mmMatch) mm = parseFloat(String(mmMatch[1]).replace(",", "."));
      }
      if (tons == null) {
        var tonMatch = raw.match(/\(([\d.,]+)\s*t\)/i) || raw.match(/([\d.,]+)\s*t\b/i);
        if (tonMatch) tons = parseFloat(String(tonMatch[1]).replace(",", "."));
      }
      return { mm: mm, tons: tons };
    }

    function buildStoccLevelInfoHTML(r) {

    function patchStoccaggioInGrid(grid, d) {
