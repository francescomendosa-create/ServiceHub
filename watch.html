<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Service Watch</title>
  <meta name="theme-color" content="#307eb4" />
  <meta name="application-name" content="Service Watch" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Service Watch" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="watch-manifest.json?v=sw8" />
  <link rel="icon" type="image/png" href="sh-icon-192.png?v=sw8" id="sw-favicon" />
  <link rel="apple-touch-icon" href="sh-touch.png?v=sw8" id="sw-touch-icon" />
  <style>
    :root {
      --sw-bg-home: #1e5a82;
      --sw-bg-panel: #0f172a;
      --sw-tail-bg: #1e5a82;
      --sw-scroll-top: 72px;
      --sw-scroll-bottom: 96px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html {
      margin: 0; padding: 0; overflow: hidden;
      -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
    }
    body {
      margin: 0; padding: 0; overflow: hidden;
      background: var(--sw-tail-bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
    }
    body.sw-bg-home { --sw-tail-bg: var(--sw-bg-home); background: var(--sw-bg-home); }
    body.sw-bg-panel { --sw-tail-bg: var(--sw-bg-panel); background: var(--sw-bg-panel); }

    /* Contenitore scroll unico: corona, dito, barra laterale */
    #sw-scroll-root {
      height: 100dvh;
      overflow-x: hidden;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      background: var(--sw-tail-bg);
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.55) rgba(255, 255, 255, 0.12);
    }
    #sw-scroll-root::-webkit-scrollbar { width: 5px; }
    #sw-scroll-root::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
    }
    #sw-scroll-root::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.55);
      border-radius: 3px;
    }
    body.sw-bg-panel #sw-scroll-root {
      scrollbar-color: rgba(148, 163, 184, 0.7) rgba(15, 23, 42, 0.5);
    }
    body.sw-bg-panel #sw-scroll-root::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.75);
    }

    .sw-scroll-wrap {
      min-height: calc(100dvh + var(--sw-scroll-top) + var(--sw-scroll-bottom));
      background: var(--sw-tail-bg);
    }
    .sw-scroll-stage {
      min-height: 100dvh;
      background: var(--sw-tail-bg);
    }
    .sw-scroll-edge {
      padding: 10px 8px;
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.45;
      flex-shrink: 0;
      pointer-events: none;
      user-select: none;
      background: var(--sw-tail-bg);
    }
    .sw-scroll-above {
      min-height: var(--sw-scroll-top);
      color: rgba(255, 255, 255, 0.7);
    }
    body.sw-bg-panel .sw-scroll-above { color: #94a3b8; }
    .sw-scroll-below {
      min-height: var(--sw-scroll-bottom);
      color: rgba(255, 255, 255, 0.62);
    }
    body.sw-bg-panel .sw-scroll-below { color: #64748b; }

    .sw-view { width: 100%; min-height: 100dvh; }
    .sw-view--hidden { display: none !important; }
    #view-home {
      display: flex; align-items: center; justify-content: center;
      padding: max(28px, 10vh) max(10px, 4vw) max(12px, 5vh);
      cursor: pointer;
      background: var(--sw-bg-home);
    }
    #sw-icon-canvas {
      width: min(68vw, 68vh); height: min(68vw, 68vh);
      border-radius: 22%; box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    button, .sw-chem-cell { touch-action: manipulation; }
    .sw-panel {
      display: flex; flex-direction: column;
      min-height: 100dvh; background: var(--sw-bg-panel);
    }
    .sw-topbar {
      display: flex; align-items: center; gap: 8px;
      padding: max(10px, env(safe-area-inset-top, 0px)) 10px 8px;
      background: #1e293b; border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }
    .sw-back {
      border: none; background: #334155; color: #fff;
      font-weight: 800; font-size: 10px; text-transform: uppercase;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
    }
    .sw-top-title {
      flex: 1; text-align: center; font-size: 12px; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    #view-chemicals .sw-top-title {
      font-size: clamp(16px, 7vmin, 20px);
      letter-spacing: 0.1em;
    }
    .sw-top-spacer { width: 52px; }
    .sw-menu-body, .sw-empty-body { flex: 1; padding: 12px 10px; }
    .sw-chem-body {
      flex: 1; padding: 12px 10px 0;
      display: flex; flex-direction: column;
      min-height: calc(100dvh - 52px);
    }
    .sw-menu-hint {
      margin: 0 0 12px; font-size: 9px; font-weight: 700;
      text-align: center; color: #94a3b8; text-transform: uppercase;
    }
    #sw-menu-list { display: flex; flex-direction: column; gap: 10px; }
    .sw-menu-btn {
      width: 100%; border: none; border-radius: 14px;
      padding: 18px 12px; font-size: 14px; font-weight: 900;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: #fff; cursor: pointer;
    }
    .sw-menu-btn--chem {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-bottom: 3px solid #4c1d95;
      font-size: clamp(17px, 7.5vmin, 22px);
      padding: 20px 12px;
      letter-spacing: 0.1em;
    }
    .sw-menu-btn:active { filter: brightness(0.92); }
    .sw-empty-msg {
      text-align: center; font-size: 11px; font-weight: 700;
      color: #94a3b8; line-height: 1.5; padding: 20px 8px;
    }
    .sw-chem-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 10px;
    }
    .sw-chem-cell {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; min-height: 88px;
      padding: 10px 6px; border: 2px solid #6d28d9; border-radius: 12px;
      background: #2e1065; cursor: pointer;
    }
    .sw-chem-cell:active { filter: brightness(0.95); }
    .sw-chem-lbl { font-size: 11px; font-weight: 900; letter-spacing: 0.08em; color: #ddd6fe; }
    .sw-chem-val { font-size: 34px; font-weight: 900; line-height: 1; color: #ede9fe; font-variant-numeric: tabular-nums; }
    .sw-chem-val--hp { font-size: 38px; }
    .sw-chem-reset {
      width: 100%; border: none; border-radius: 10px;
      padding: 12px; background: #dc2626; color: #fff;
      font-size: 11px; font-weight: 900; letter-spacing: 0.06em;
      text-transform: uppercase; cursor: pointer;
      margin-top: auto;
      margin-bottom: 10px;
    }
    .sw-chem-reset:active { filter: brightness(0.9); }
    @media (max-width: 220px), (max-height: 260px) {
      :root { --sw-scroll-top: 60px; --sw-scroll-bottom: 80px; }
      .sw-chem-val { font-size: 28px; }
      .sw-chem-val--hp { font-size: 32px; }
      .sw-chem-cell { min-height: 72px; }
      .sw-menu-btn--chem { font-size: 16px; }
      #view-chemicals .sw-top-title { font-size: 15px; }
    }
  </style>
</head>
<body class="sw-bg-home">
  <script>window.SERVICE_WATCH_BUILD = '2026.06.05-service-watch-scroll-bar';</script>
  <div id="sw-scroll-root" tabindex="0" aria-label="Contenuto Service Watch">
    <div class="sw-scroll-wrap" id="sw-scroll-wrap">
      <p class="sw-scroll-edge sw-scroll-above" id="sw-scroll-above" aria-hidden="true">↑ Scorri con la corona</p>

      <div class="sw-scroll-stage">
        <section id="view-home" class="sw-view" aria-label="Service Watch home">
          <canvas id="sw-icon-canvas" aria-hidden="true"></canvas>
        </section>

        <section id="view-menu" class="sw-view sw-view--hidden sw-panel" aria-label="Schede">
          <div class="sw-topbar">
            <button type="button" class="sw-back" id="sw-back-menu">Indietro</button>
            <div class="sw-top-title">Schede</div>
            <div class="sw-top-spacer"></div>
          </div>
          <div class="sw-menu-body">
            <p class="sw-menu-hint">Tocca una scheda</p>
            <div id="sw-menu-list"></div>
            <p id="sw-menu-empty" class="sw-empty-msg sw-view--hidden">Nessuna scheda attiva.<br>Abilita Chemicals dalle impostazioni Watch sull'iPhone.</p>
          </div>
        </section>

        <section id="view-empty" class="sw-view sw-view--hidden sw-panel" aria-label="Nessuna scheda">
          <div class="sw-topbar">
            <button type="button" class="sw-back" id="sw-back-empty">Indietro</button>
            <div class="sw-top-title">Service Watch</div>
            <div class="sw-top-spacer"></div>
          </div>
          <div class="sw-empty-body">
            <p class="sw-empty-msg">Nessuna scheda attiva su Apple Watch.<br>Vai su ServiceHub → Impostazioni → Watch e abilita <strong>Chemicals</strong>.</p>
          </div>
        </section>

        <section id="view-chemicals" class="sw-view sw-view--hidden sw-panel" aria-label="Chemicals">
          <div class="sw-topbar">
            <button type="button" class="sw-back" id="sw-back-chem">Indietro</button>
            <div class="sw-top-title">Chemicals</div>
            <div class="sw-top-spacer"></div>
          </div>
          <div class="sw-chem-body">
            <div class="sw-chem-grid">
              <button type="button" class="sw-chem-cell" id="sw-btn-pass" aria-label="Incrementa PASS">
                <span class="sw-chem-lbl">PASS</span>
                <span class="sw-chem-val" id="sw-chem-pass">0</span>
              </button>
              <button type="button" class="sw-chem-cell" id="sw-btn-hp" aria-label="Incrementa HP">
                <span class="sw-chem-lbl">HP</span>
                <span class="sw-chem-val sw-chem-val--hp" id="sw-chem-hp">0</span>
              </button>
            </div>
            <button type="button" class="sw-chem-reset" id="sw-btn-reset">Reset</button>
          </div>
        </section>
      </div>

      <p class="sw-scroll-edge sw-scroll-below" id="sw-scroll-below" aria-hidden="true">↓ Scorri in basso</p>
    </div>
  </div>

  <script>
    (function () {
      var BASE_ICON = 'sh-icon-512.png?v=sw8';
      var BASE_FALLBACK = 'sh-icon-192.png?v=sw8';
      var BUILD = window.SERVICE_WATCH_BUILD || 'dev';

      function applyScrollLabels() {
        var above = document.getElementById('sw-scroll-above');
        var below = document.getElementById('sw-scroll-below');
        if (above) {
          above.innerHTML = '↑ Scorri con la corona<br>Service Watch<br>' + BUILD;
        }
        if (below) {
          below.innerHTML = 'Service Watch<br>' + BUILD + '<br>↓ Scorri in basso';
        }
      }

      function ensureScrollOverflow() {
        var root = document.getElementById('sw-scroll-root');
        var wrap = document.getElementById('sw-scroll-wrap');
        if (!root || !wrap) return;
        var top = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sw-scroll-top')) || 72;
        var bottom = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sw-scroll-bottom')) || 96;
        var minH = root.clientHeight + top + bottom + 2;
        wrap.style.minHeight = minH + 'px';
      }

      function blockPinchZoom() {
        document.addEventListener('touchstart', function (e) {
          if (e.touches && e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('gesturechange', function (e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('gestureend', function (e) { e.preventDefault(); }, { passive: false });
      }

      window.swBindCrownScroll = function () {
        var root = document.getElementById('sw-scroll-root');
        if (!root) return;

        function scrollByWheel(deltaY) {
          if (!deltaY) return;
          var max = root.scrollHeight - root.clientHeight;
          if (max <= 0) return;
          root.scrollTop = Math.max(0, Math.min(max, root.scrollTop + deltaY));
        }

        function onWheel(e) {
          scrollByWheel(e.deltaY);
        }

        root.addEventListener('wheel', onWheel, { passive: true });
        document.addEventListener('wheel', onWheel, { passive: true, capture: true });
        window.addEventListener('wheel', onWheel, { passive: true, capture: true });

        try { root.focus({ preventScroll: true }); } catch (_) { root.focus(); }
      };

      function loadImage(src) {
        return new Promise(function (resolve, reject) {
          var im = new Image();
          im.onload = function () { resolve(im); };
          im.onerror = function () { reject(new Error('icon')); };
          im.src = src;
        });
      }
      function drawServiceWatchIcon(ctx, img, size) {
        ctx.drawImage(img, 0, 0, size, size);
        var bandTop = Math.round(size * 0.70);
        var grad = ctx.createLinearGradient(0, bandTop, 0, size);
        grad.addColorStop(0, 'rgba(42, 122, 176, 0.98)');
        grad.addColorStop(1, 'rgba(28, 88, 132, 1)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, bandTop, size, size - bandTop);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '900 ' + Math.round(size * 0.082) + 'px system-ui,sans-serif';
        ctx.fillText('Service', size / 2, size * 0.835);
        ctx.font = '900 ' + Math.round(size * 0.074) + 'px system-ui,sans-serif';
        ctx.fillText('Watch', size / 2, size * 0.925);
      }
      function paintIcon() {
        var canvas = document.getElementById('sw-icon-canvas');
        if (!canvas) return;
        var dpr = Math.min(window.devicePixelRatio || 1, 3);
        var vw = window.innerWidth || 320;
        var vh = window.innerHeight || 320;
        var iconPx = Math.round(Math.min(vw, vh) * 0.68);
        canvas.width = Math.round(iconPx * dpr);
        canvas.height = Math.round(iconPx * dpr);
        canvas.style.width = iconPx + 'px';
        canvas.style.height = iconPx + 'px';
        var ctx = canvas.getContext('2d');
        if (!ctx) return;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        loadImage(new URL(BASE_ICON, location.href).href)
          .catch(function () { return loadImage(new URL(BASE_FALLBACK, location.href).href); })
          .then(function (img) { drawServiceWatchIcon(ctx, img, iconPx); })
          .catch(function () {});
      }

      function setInitialScrollPosition() {
        var root = document.getElementById('sw-scroll-root');
        if (!root) return;
        var top = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sw-scroll-top')) || 72;
        root.scrollTop = top;
      }

      blockPinchZoom();
      applyScrollLabels();
      ensureScrollOverflow();
      window.swBindCrownScroll();
      requestAnimationFrame(function () {
        ensureScrollOverflow();
        setInitialScrollPosition();
      });
      paintIcon();
      window.addEventListener('resize', function () {
        ensureScrollOverflow();
        paintIcon();
      });
    })();
  </script>
  <script type="module" src="watch-app.js?v=sw8"></script>
</body>
</html>
