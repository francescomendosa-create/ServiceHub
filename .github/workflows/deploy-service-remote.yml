name: Deploy Service Remote (Firebase)

on:
  push:
    branches: [main]
    paths:
      - "remote/**"
      - "digital-remote.css"
      - "sh-remote-*.png"
      - "splash-remote-*.png"
      - "remote-host/**"
      - "index.html"
      - "firestore.rules"
      - "firebase.json"
      - "_sync-remote-host.ps1"
      - "_deploy-remote-firebase.ps1"
      - ".github/workflows/deploy-service-remote.yml"

jobs:
  deploy-remote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build remote-host
        shell: pwsh
        run: ./_sync-remote-host.ps1

      - name: Deploy Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN mancante. Esegui _setup-auto-remote.ps1 e aggiungi il secret su GitHub."
            exit 1
          fi
          firebase deploy --only hosting --project servicehub-18309 --non-interactive --token "$FIREBASE_TOKEN"

      - name: Summary
        run: |
          echo "Service Remote pubblicato: https://servicehub-18309.web.app"
          echo "Commit: ${{ github.sha }}"
