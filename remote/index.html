    function tankDetailMetaSignature(meta) {
      if (!meta || typeof meta !== "object") return "";
      return Object.keys(meta).sort().join("|");
    }

    function fmtTankMm(n) {
      if (!Number.isFinite(n)) return "—";
      return String(Math.round(n * 10) / 10).replace(/\.0$/, "");
    }

    function fmtTankTons(n) {
      if (n == null || n === "" || isNaN(Number(n))) return "—";
      return String(Number(n).toFixed(1)).replace(/\.0$/, "");
    }

    function parseStatusArr(tankStatuses, tankDbKey) {
      if (!tankDbKey || !tankStatuses) return [];
      var raw = String(tankStatuses[tankDbKey] || "");
      if (!raw) return [];
      return raw.split("+").map(function (s) {
        s = String(s || "").trim();
        if (/accumul/i.test(s)) return "Accumulo";
        if (/drenagg/i.test(s)) return "Drenaggio";
        if (/parallelo/i.test(s)) return "Parallelo";
        return s;
      }).filter(Boolean);
    }

    function buildRemoteTrendSeries(series, info) {
      series = (series || []).slice();
      info = info || {};
      if (series.length >= 2) return series;
      if (!info.fieldId || !Number.isFinite(info.levelMm)) return series;
      var arch = getRemoteArchiveSeries(series);
      if (!arch.length) return series;
      var ts = resolveRemoteCurrentLevelTs(info.fieldId, series, info);
      var out = arch.slice();
      var last = out[out.length - 1];
      if (!last || Math.abs(last.mm - info.levelMm) > 0.05 || ts > last.ts) {
        out.push({ ts: ts, mm: info.levelMm, label: "Livello attuale", live: true });
      }
      return out.length >= 2 ? out : series;
    }

    function buildTankDetailTrendChartSVG(series, maxMm, info) {
      series = buildRemoteTrendSeries(series, info);
      if (!series || series.length < 2) {
        return '<div class="tank-detail-chart-empty">Servono almeno 2 punti per il grafico trend.</div>';
      }
      var w = 640, h = 220, pad = { l: 52, r: 18, t: 18, b: 40 };
      var plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;
      var mmVals = series.map(function (p) { return p.mm; });
      var yMax = maxMm && maxMm > 0 ? maxMm : Math.max.apply(null, mmVals.concat([1])) * 1.08;
      var tMin = series[0].ts, tMax = series[series.length - 1].ts;
      if (tMax <= tMin) tMax = tMin + 3600000;
      var toX = function (ts) { return pad.l + plotW * ((ts - tMin) / (tMax - tMin)); };
      var toY = function (mm) { return pad.t + plotH - (plotH * (mm / yMax)); };
      var pts = series.map(function (p) { return { x: toX(p.ts), y: toY(p.mm), p: p }; });
      var linePath = pts.map(function (pt, i) {
        return (i === 0 ? "M" : "L") + pt.x.toFixed(1) + "," + pt.y.toFixed(1);
      }).join(" ");
      var areaPath = linePath + " L" + pts[pts.length - 1].x.toFixed(1) + "," + (pad.t + plotH) +
        " L" + pts[0].x.toFixed(1) + "," + (pad.t + plotH) + " Z";
      var uid = "tdc" + Math.random().toString(36).slice(2, 8);
      var dots = pts.map(function (pt) {
        var fill = pt.p.live ? "#fbbf24" : "#38bdf8";
        return '<circle cx="' + pt.x.toFixed(1) + '" cy="' + pt.y.toFixed(1) + '" r="4.5" fill="' + fill + '"/>';
      }).join("");
      return '<svg class="tank-detail-chart-svg" viewBox="0 0 ' + w + " " + h + '" preserveAspectRatio="xMidYMid meet">' +
        '<defs><linearGradient id="' + uid + 'g" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0%" stop-color="rgba(56,189,248,0.35)"/><stop offset="100%" stop-color="rgba(56,189,248,0.02)"/></linearGradient></defs>' +
        '<path d="' + areaPath + '" fill="url(#' + uid + 'g)"/>' +
        '<path d="' + linePath + '" fill="none" stroke="#38bdf8" stroke-width="2.5"/>' + dots + "</svg>";
    }

    function buildTankDetailStatusHTML(info) {
      var html = "";
      (info.statusArr || []).forEach(function (st) {
        var cls = st === "Accumulo" ? "tank-detail-badge--acc" : st === "Drenaggio" ? "tank-detail-badge--dren" : "tank-detail-badge--par";
        html += '<span class="tank-detail-badge ' + cls + '">' + esc(st) + "</span>";
      });
      if (!html && (info.vis.acc || info.vis.drain)) {
        if (info.vis.acc) html += '<span class="tank-detail-badge tank-detail-badge--acc">Accumulo</span>';
        if (info.vis.drain) html += '<span class="tank-detail-badge tank-detail-badge--dren">Drenaggio</span>';
      }
      if (!html) html = '<span class="tank-detail-badge tank-detail-badge--neutral">Nessuno stato A/D/P</span>';
      return html;
    }

    function buildTankDetailHistoryTableHTML(series) {
      if (!series || !series.length) {
        return '<div class="tank-detail-history-empty">Nessun salvataggio storico.</div>';
      }
      var rows = series.slice().reverse().map(function (p) {
        var meta = [p.date, p.shift].filter(Boolean).join(" · ");
        return "<tr><td>" + esc(p.label) + "</td><td>" + esc(meta) + '</td><td class="tank-detail-num">' +
          fmtTankMm(p.mm) + ' mm</td><td class="tank-detail-num">' + fmtTankTons(p.tons) + " t</td></tr>";
      }).join("");
      return '<table class="tank-detail-history-table"><thead><tr><th>Ora</th><th>Turno</th><th>Livello</th><th>Tonn.</th></tr></thead><tbody>' +
        rows + "</tbody></table>";
    }

    function parseTankLevelMmRemote(raw) {
      if (raw == null || raw === "") return NaN;
      var s = String(raw).trim().replace(/\s/g, "").replace(/\s*mm\s*$/i, "");
      if (!s) return NaN;
      var itThousands = s.match(/^(\d{1,3})[.,](\d{3})$/);
      if (itThousands) return parseFloat(itThousands[1] + itThousands[2]);
      if (/^\d{1,3}(\.\d{3})+$/.test(s)) return parseFloat(s.replace(/\./g, ""));
      if (/^\d{1,3}(,\d{3})+$/.test(s)) return parseFloat(s.replace(/,/g, ""));
      if (/^\d+,\d+$/.test(s) && !/,\d{3}$/.test(s)) s = s.replace(",", ".");
      var n = parseFloat(s.replace(/[^\d.-]/g, ""));
      return Number.isFinite(n) ? n : NaN;
    }

    function readRemoteTankRowFromDom(fieldId) {
      if (!fieldId) return null;
      var row = rootEl.querySelector('.digital-stocc-row[data-field-id="' + fieldId + '"]');
      if (!row) return null;
      var val = String(row.querySelector(".digital-stocc-value")?.textContent || "").trim();
      var label = String(row.querySelector(".digital-stocc-sigla")?.textContent || "").trim();
      var tankDbKey = row.getAttribute("data-tank-db") || "";
      var parsed = parseStoccRowLevels({ val: val, tankDbKey: tankDbKey });
      if ((!parsed.mm || isNaN(parsed.mm)) && val) {
        parsed.mm = parseTankLevelMmRemote(val);
      }
      return {
        fieldId: fieldId,
        label: label,
        val: val,
        levelMm: parsed.mm,
        tons: parsed.tons,
        tankDbKey: tankDbKey
      };
    }

    function resolveRemoteTankDetailInfo(fieldId, payload, navCtx) {
      payload = payload || window.__remoteDigitalPayload || {};
      navCtx = navCtx || {};
      var meta = (payload.tankDetailMeta && payload.tankDetailMeta[fieldId]) || {};
      var row = (payload.stoccaggioRows || []).find(function (r) { return r.fieldId === fieldId; });
      if (!row && payload.stoccaggioRows) {
        row = payload.stoccaggioRows.find(function (r) {
          return String(r.tankDbKey || "") === String(meta.tankDbKey || "");
        });
      }
      if (!row || row.levelMm == null) {
        var domRow = readRemoteTankRowFromDom(fieldId);
        if (domRow) row = Object.assign({}, domRow, row || {});
      }
      var levelMm = row && row.levelMm != null ? Number(row.levelMm) : NaN;
      if (!Number.isFinite(levelMm) && navCtx.levelRaw) {
        levelMm = parseTankLevelMmRemote(navCtx.levelRaw);
      }
      if (!Number.isFinite(levelMm) && row && row.val) {
        levelMm = parseTankLevelMmRemote(row.val);
        if (!Number.isFinite(levelMm)) {
          var m = String(row.val).match(/([\d.,]+)\s*mm/i);
          if (m) levelMm = parseFloat(String(m[1]).replace(",", "."));
        }
      }
      var livMax = meta.livMax != null ? Number(meta.livMax) : null;
      var fillPct = row && row.fillPct != null ? Number(row.fillPct) : null;
      if (fillPct == null && livMax && Number.isFinite(levelMm)) {
        fillPct = Math.max(0, (levelMm / livMax) * 100);
      }
      var tankDbKey = meta.tankDbKey || (row && row.tankDbKey) || "";
      var vis = rowTankVisualFlags(row || { tankDbKey: tankDbKey }, payload.tankStatuses);
      var currentTons = row && row.tons != null ? row.tons : null;
      if (currentTons == null && row && row.val) {
        var tm = String(row.val).match(/\(([\d.,]+)\s*t\)/i);
        if (tm) currentTons = parseFloat(String(tm[1]).replace(",", "."));
      }
      return {
        fieldId: fieldId,
        label: meta.label || (row && row.label) || fieldId,
        description: meta.description || "",
        livMax: livMax,
        levelMm: Number.isFinite(levelMm) ? levelMm : null,
        currentTons: currentTons,
        maxTons: meta.maxTons,
        fillPct: fillPct != null ? fillPct : 0,
        fillPctOfMax: livMax && Number.isFinite(levelMm) ? Math.round((levelMm / livMax) * 1000) / 10 : null,
        vis: vis,
        statusArr: parseStatusArr(payload.tankStatuses, tankDbKey),
        tankDbKey: tankDbKey
      };
    }

    var TANK_TIMELINE_PREDICT_H = 24;

    function getRemoteArchiveSeries(series) {
      return (series || []).filter(function (p) { return p && !p.live; })
        .slice().sort(function (a, b) { return a.ts - b.ts; });
    }

    function getRemoteTimelineInitialPoint(series) {
      var arch = getRemoteArchiveSeries(series);
      return arch.length ? arch[0] : null;
    }

    function computeRemoteTimelineRate(series, info) {
      info = info || {};
      series = series || [];
      var initial = getRemoteTimelineInitialPoint(series);
      var currentTs = resolveRemoteCurrentLevelTs(info.fieldId, series, info);
      var currentMm = Number.isFinite(info.levelMm) ? info.levelMm
        : (series.length ? series[series.length - 1].mm : NaN);
      if (initial && Number.isFinite(currentTs) && Number.isFinite(currentMm)) {
        var dtInitH = (currentTs - initial.ts) / 3600000;
        if (dtInitH >= 0.08) return (currentMm - initial.mm) / dtInitH;
      }
      if (series && series.length >= 2) {
        var a = series[series.length - 2], b = series[series.length - 1];
        var dtH = (b.ts - a.ts) / 3600000;
        if (dtH >= 0.08) return (b.mm - a.mm) / dtH;
        a = series[0]; b = series[series.length - 1];
        dtH = (b.ts - a.ts) / 3600000;
        if (dtH >= 0.08) return (b.mm - a.mm) / dtH;
      }
      return 0;
    }

    function tagRemoteSeriesInitialLevel(series) {
      if (!series || !series.length) return series;
      for (var i = 0; i < series.length; i++) {
        if (!series[i].live) {
          series[i].label = "Livello iniziale";
          break;
        }
      }
      return series;
    }

    function resolveRemoteCurrentLevelTs(fieldId, series, info) {
      info = info || {};
      var inputAt = (window.__remoteDigitalPayload && window.__remoteDigitalPayload.tankLevelInputAt) || {};
      var ts = Number(inputAt[fieldId]);
      if (!Number.isFinite(ts) || ts <= 0) ts = Number(info.levelInputTs);
      if (Number.isFinite(ts) && ts > 0) return ts;
      if (series && series.length) {
        var last = series[series.length - 1];
        if (last && last.live && Number.isFinite(last.ts)) return last.ts;
      }
      if (getRemoteArchiveSeries(series).length > 0 && Number.isFinite(info.levelMm)) return Date.now();
      return series && series.length ? series[series.length - 1].ts : Date.now();
    }

    function appendRemoteLiveLevel(series, fieldId, liveMm, inputAt) {
      series = series || [];
      if (!Number.isFinite(liveMm) || liveMm <= 0) return series;
      inputAt = inputAt || {};
      var hasArchive = getRemoteArchiveSeries(series).length > 0;
      var ts = Number(inputAt[fieldId]);
      if ((!Number.isFinite(ts) || ts <= 0) && hasArchive) ts = Date.now();
      if (!Number.isFinite(ts) || ts <= 0) return series;
      var livePt = {
        ts: ts,
        mm: liveMm,
        label: fmtTimelineClock(ts),
        live: true
      };
      while (series.length && series[series.length - 1].live) series.pop();
      var last = series.length ? series[series.length - 1] : null;
      if (!last) {
        series.push(livePt);
        return series;
      }
      if (Math.abs(last.mm - liveMm) > 0.05 || livePt.ts > last.ts) {
        series.push(livePt);
      } else if (hasArchive && !last.live && livePt.ts >= last.ts) {
        series.push(livePt);
      }
      return series;
    }

    function buildRemoteTimelineModel(series, info) {
      series = (series || []).filter(function (p) { return p && Number.isFinite(p.ts) && Number.isFinite(p.mm); })
        .slice().sort(function (a, b) { return a.ts - b.ts; });
      tagRemoteSeriesInitialLevel(series);
      if (!series.length && info && Number.isFinite(info.levelMm)) {
        var bootTs = resolveRemoteCurrentLevelTs(info.fieldId, series, info);
        series = [{ ts: bootTs, mm: info.levelMm, label: "Livello attuale", live: true }];
      }
      var rate = computeRemoteTimelineRate(series, info);
      var nowMm = Number.isFinite(info.levelMm) ? info.levelMm : (series.length ? series[series.length - 1].mm : 0);
      var actualTs = resolveRemoteCurrentLevelTs(info.fieldId, series, info);
      var nowTs = actualTs;
      var initialPt = getRemoteTimelineInitialPoint(series);
      if (!initialPt && info && info.fieldId) {
        var archOnly = getRemoteArchiveSeries(series);
        if (archOnly.length) initialPt = archOnly[0];
      }
      var tStart = initialPt ? initialPt.ts
        : (series.length ? series[0].ts : nowTs - 3600000);
      var tEnd = nowTs + TANK_TIMELINE_PREDICT_H * 3600000;
      if (tEnd <= tStart) tEnd = tStart + TANK_TIMELINE_PREDICT_H * 3600000;
      return { series: series, rateMmH: rate, nowTs: nowTs, actualTs: actualTs, nowMm: nowMm, initialPt: initialPt, tStart: tStart, tEnd: tEnd, livMax: info.livMax, tankDbKey: info.tankDbKey, fieldId: info.fieldId };
    }

    function predictRemoteLevelAt(model, targetTs) {
      var dtH = (targetTs - model.nowTs) / 3600000;
      var mm = model.nowMm + (model.rateMmH || 0) * dtH;
      if (model.livMax && model.livMax > 0) mm = Math.min(mm, model.livMax * 1.15);
      return Math.max(0, mm);
    }

    function fmtTimelineClock(ts) {
      try { return new Date(ts).toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" }); }
      catch (_) { return "--:--"; }
    }

    function fmtTimelineAhead(h) {
      if (h <= 0.05) return "Adesso";
      if (h < 1) return "+" + Math.round(h * 60) + " min";
      return "+" + String(Math.round(h * 10) / 10).replace(".", ",") + " h";
    }

    function buildRemoteTimelineHTML(series, info) {
      var model = buildRemoteTimelineModel(series, info);
      var rateSign = model.rateMmH > 0 ? "+" : "";
      var rateCls = model.rateMmH > 0.05 ? "up" : model.rateMmH < -0.05 ? "down" : "flat";
      var startPt = model.initialPt
        || (model.series.length ? model.series[0] : { ts: model.nowTs, mm: model.nowMm });
      var siglaTxt = info && info.label ? String(info.label).trim() : "";
      var timelineTitle = "Timeline livello · previsione" + (siglaTxt ? " · " + esc(siglaTxt) : "");
      return '<div class="tank-detail-timeline-block" data-tank-timeline="1">' +
        '<div class="tank-detail-section-title">' + timelineTitle + "</div>" +
        '<div class="tank-detail-timeline-rate tank-detail-timeline-rate--' + rateCls + '">Velocità trend: <b>' +
        esc(rateSign + fmtTankMm(model.rateMmH) + " mm/h") + "</b></div>" +
        '<div class="tank-detail-timeline-canvas-wrap" data-tl-interactive="1">' +
        '<div class="tank-detail-timeline-band tank-detail-timeline-band--top">' +
        '<div class="tank-detail-timeline-levels-row">' +
        '<div class="tank-detail-timeline-float tank-detail-timeline-float--start" data-tl-metric-start style="left:12%">' +
        '<div class="tank-detail-timeline-metric-lbl tank-detail-timeline-metric-lbl--start">Livello iniziale</div>' +
        '<div class="tank-detail-timeline-metric-mm" data-tl-start-mm>' + fmtTankMm(startPt.mm) + " mm</div>" +
        "</div>" +
        '<div class="tank-detail-timeline-float tank-detail-timeline-float--pred" data-tl-metric-pred style="left:50%">' +
        '<div class="tank-detail-timeline-metric-lbl tank-detail-timeline-metric-lbl--pred">Previsione</div>' +
        '<div class="tank-detail-timeline-metric-mm tank-detail-timeline-pred-mm" data-tl-pred-mm>' + fmtTankMm(model.nowMm) + " mm</div>" +
        "</div></div>" +
        '<div class="tank-detail-timeline-times-row">' +
        '<div class="tank-detail-timeline-time-slot tank-detail-timeline-time-slot--start" data-tl-time-start style="left:12%">' +
        '<span data-tl-start-time>' + fmtTimelineClock(startPt.ts) + "</span></div>" +
        '<div class="tank-detail-timeline-time-slot tank-detail-timeline-time-slot--pred" data-tl-time-pred style="left:50%">' +
        '<span data-tl-pred-time>' + fmtTimelineClock(model.nowTs) + "</span></div>" +
        "</div></div>" +
        '<svg class="tank-detail-timeline-svg" data-tl-svg viewBox="0 0 800 68" preserveAspectRatio="none" aria-hidden="true"></svg>' +
        '<div class="tank-detail-timeline-band tank-detail-timeline-band--bottom">' +
        '<div class="tank-detail-timeline-float tank-detail-timeline-float--actual" data-tl-metric-actual style="left:50%">' +
        '<div class="tank-detail-timeline-time-slot tank-detail-timeline-time-slot--actual" data-tl-time-actual>' +
        fmtTimelineClock(model.actualTs != null ? model.actualTs : model.nowTs) + "</div>" +
        '<div class="tank-detail-timeline-metric-lbl">Livello attuale</div>' +
        '<div class="tank-detail-timeline-metric-mm" data-tl-actual-mm>' + fmtTankMm(model.nowMm) + " mm</div>" +
        "</div></div>" +
        "</div>" +
        '<div class="tank-detail-timeline-legend"><span class="tank-detail-timeline-legend-item tank-detail-timeline-legend-item--hist">■ Storico / adesso</span>' +
        '<span class="tank-detail-timeline-legend-item tank-detail-timeline-legend-item--pred">■ Zona previsione</span></div></div>';
    }

    function renderRemoteTimelineSvg(svgEl, model) {
      if (!svgEl || !model) return;
      var w = 800, h = 68, pad = { l: 48, r: 24, t: 6, b: 14 }, plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;
      var zoneTop = pad.t, zoneBottom = pad.t + plotH;
      var tSpan = model.tEnd - model.tStart || 3600000;
      var toX = function (ts) { return pad.l + plotW * ((ts - model.tStart) / tSpan); };
      var mmVals = model.series.map(function (p) { return p.mm; });
      if (Number.isFinite(model.nowMm)) mmVals.push(model.nowMm);
      var predEndMm = predictRemoteLevelAt(model, model.tEnd);
      if (Number.isFinite(predEndMm)) mmVals.push(predEndMm);
      var yMin = Math.min.apply(null, mmVals.concat([0]));
      var yMax = Math.max.apply(null, mmVals.concat([1]));
      if (model.livMax && model.livMax > 0) yMax = Math.max(yMax, model.livMax);
      var yPad = (yMax - yMin) * 0.12 || 100;
      yMin = Math.max(0, yMin - yPad);
      yMax = yMax + yPad;
      var toY = function (mm) { return pad.t + plotH - (plotH * ((mm - yMin) / (yMax - yMin))); };
      var nowX = toX(model.nowTs);
      var nowY = toY(model.nowMm);
      var histPts = model.series.map(function (p) { return { x: toX(p.ts), y: toY(p.mm), p: p }; });
      var lastHist = histPts.length ? histPts[histPts.length - 1] : null;
      if (!lastHist || Math.abs(lastHist.x - nowX) > 1.5 || Math.abs(lastHist.y - nowY) > 1.5) {
        histPts.push({
          x: nowX,
          y: nowY,
          p: { ts: model.nowTs, mm: model.nowMm, label: "Livello attuale", live: true }
        });
      }
      var histPath = histPts.map(function (pt, i) { return (i ? "L" : "M") + pt.x.toFixed(1) + "," + pt.y.toFixed(1); }).join(" ");
      var predPath = "M" + nowX.toFixed(1) + "," + toY(model.nowMm).toFixed(1);
      for (var i = 1; i <= 24; i++) {
        var ts = model.nowTs + (model.tEnd - model.nowTs) * (i / 24);
        predPath += " L" + toX(ts).toFixed(1) + "," + toY(predictRemoteLevelAt(model, ts)).toFixed(1);
      }
      var dots = histPts.map(function (pt) {
        var fill = pt.p.live ? "#fbbf24" : "#38bdf8";
        var dot = '<circle cx="' + pt.x.toFixed(1) + '" cy="' + pt.y.toFixed(1) + '" r="5" fill="' + fill + '" stroke="#0f172a" stroke-width="1.2">' +
          '<title>' + esc(String(pt.p.label || fmtTimelineClock(pt.p.ts))) + ": " + fmtTankMm(pt.p.mm) + " mm</title></circle>";
        if (pt.p.live) return dot;
        return dot;
      }).join("");
      var scrubber = '<line class="tank-detail-timeline-scrub-line" data-tl-scrub x1="' + nowX.toFixed(1) +
        '" y1="' + zoneTop.toFixed(1) + '" x2="' + nowX.toFixed(1) + '" y2="' + nowY.toFixed(1) +
        '" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" pointer-events="none"/>' +
        '<circle class="tank-detail-timeline-scrub-knob" data-tl-knob cx="' + nowX.toFixed(1) +
        '" cy="' + nowY.toFixed(1) + '" r="8" fill="#fbbf24" stroke="#0f172a" stroke-width="1.5" style="cursor:grab"/>' +
        '<circle data-tl-drag-hit cx="' + nowX.toFixed(1) + '" cy="' + ((zoneTop + zoneBottom) / 2).toFixed(1) +
        '" r="28" fill="transparent" style="cursor:grab;touch-action:none"/>';
      var zonePredLight = '<rect data-tl-zone-light x="' + nowX.toFixed(1) + '" y="' + pad.t + '" width="' + (w - pad.r - nowX).toFixed(1) +
        '" height="' + plotH + '" fill="rgba(167,139,250,0.025)" />';
      var zonePredDark = '<rect data-tl-zone-dark x="' + nowX.toFixed(1) + '" y="' + pad.t + '" width="0" height="' + plotH +
        '" fill="rgba(91,33,182,0.42)" />';
      var nowLine = '<line data-tl-now-line x1="' + nowX.toFixed(1) + '" y1="' + zoneTop.toFixed(1) + '" x2="' + nowX.toFixed(1) +
        '" y2="' + zoneBottom.toFixed(1) + '" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>';
      svgEl.innerHTML = '<rect x="' + pad.l + '" y="' + pad.t + '" width="' + (nowX - pad.l).toFixed(1) + '" height="' + plotH + '" fill="rgba(56,189,248,0.06)"/>' +
        zonePredDark + zonePredLight +
        (histPath ? '<path d="' + histPath + '" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linejoin="round"/>' : "") +
        '<path d="' + predPath + '" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="8 5" stroke-linejoin="round"/>' + dots + nowLine + scrubber;
      svgEl.__tlModel = model;
      svgEl.__tlGeom = { w: w, h: h, pad: pad, plotW: plotW, plotH: plotH, tSpan: tSpan, yMin: yMin, yMax: yMax, nowX: nowX, toX: toX, toY: toY, nowTs: model.nowTs, tEnd: model.tEnd, zoneTop: zoneTop, zoneBottom: zoneBottom };
    }

    function timelineScrubHoursFromSvgX(geom, model, svgX) {
      if (!geom || !model) return 0;
      var ts = model.tStart + ((svgX - geom.pad.l) / geom.plotW) * geom.tSpan;
      if (ts < model.nowTs) ts = model.nowTs;
      if (ts > model.tEnd) ts = model.tEnd;
      return (ts - model.nowTs) / 3600000;
    }

    function timelineFloatLeftPct(geom, svgX) {
      if (!geom || !geom.w) return 50;
      var pct = (svgX / geom.w) * 100;
      if (pct < 10) return Math.max(pct, 10);
      if (pct > 90) return Math.min(pct, 90);
      return pct;
    }

    function positionRemoteTimelineMetrics(block, geom, model, scrubX, targetTs, predMm) {
      if (!block || !geom || !model) return;
      var nowX = geom.nowX;
      var initialPt = model.initialPt;
      var startPt = initialPt || (model.series.length ? model.series[0] : { ts: model.nowTs, mm: model.nowMm });
      var startX = geom.toX(startPt.ts);
      var showStart = !!initialPt;
      function setLeft(sel, svgX) {
        var el = block.querySelector(sel);
        if (el) el.style.left = timelineFloatLeftPct(geom, svgX).toFixed(2) + "%";
      }
      if (showStart) {
        setLeft("[data-tl-metric-start]", startX);
        setLeft("[data-tl-time-start]", startX);
      }
      var mStart = block.querySelector("[data-tl-metric-start]");
      var tStart = block.querySelector("[data-tl-time-start]");
      if (mStart) mStart.style.display = showStart ? "" : "none";
      if (tStart) tStart.style.display = showStart ? "" : "none";
      setLeft("[data-tl-metric-actual]", nowX);
      setLeft("[data-tl-metric-pred]", scrubX);
      setLeft("[data-tl-time-pred]", scrubX);
      var startMmEl = block.querySelector("[data-tl-start-mm]");
      var startTimeEl = block.querySelector("[data-tl-start-time]");
      var actualMmEl = block.querySelector("[data-tl-actual-mm]");
      var actualTimeEl = block.querySelector("[data-tl-actual-time]");
      var predMmEl = block.querySelector("[data-tl-pred-mm]");
      var predTimeEl = block.querySelector("[data-tl-pred-time]");
      if (startMmEl) startMmEl.textContent = fmtTankMm(startPt.mm) + " mm";
      if (startTimeEl) startTimeEl.textContent = fmtTimelineClock(startPt.ts);
      if (actualMmEl) actualMmEl.textContent = fmtTankMm(model.nowMm) + " mm";
      if (actualTimeEl) actualTimeEl.textContent = fmtTimelineClock(model.actualTs != null ? model.actualTs : model.nowTs);
      if (predMmEl) predMmEl.textContent = fmtTankMm(predMm) + " mm";
      if (predTimeEl) predTimeEl.textContent = fmtTimelineClock(targetTs);
    }

    function updateRemoteTimelineScrub(block, hoursAhead) {
      var svg = block.querySelector("[data-tl-svg]");
      var model = svg && svg.__tlModel;
      var geom = svg && svg.__tlGeom;
      if (!model || !geom) return;
      hoursAhead = Math.max(0, Math.min(TANK_TIMELINE_PREDICT_H, Number(hoursAhead) || 0));
      var targetTs = model.nowTs + hoursAhead * 3600000;
      var predMm = predictRemoteLevelAt(model, targetTs);
      var x = geom.toX(targetTs), y = geom.toY(predMm);
      var scrub = svg.querySelector("[data-tl-scrub]");
      var knob = svg.querySelector("[data-tl-knob]");
      var hit = svg.querySelector("[data-tl-drag-hit]");
      if (scrub) {
        scrub.setAttribute("x1", x.toFixed(1));
        scrub.setAttribute("x2", x.toFixed(1));
        scrub.setAttribute("y1", String(geom.zoneTop != null ? geom.zoneTop : geom.pad.t));
        scrub.setAttribute("y2", y.toFixed(1));
      }
      if (knob) { knob.setAttribute("cx", x.toFixed(1)); knob.setAttribute("cy", y.toFixed(1)); }
      if (hit) {
        hit.setAttribute("cx", x.toFixed(1));
        hit.setAttribute("cy", (((geom.zoneTop != null ? geom.zoneTop : geom.pad.t) + (geom.zoneBottom != null ? geom.zoneBottom : geom.pad.t + geom.plotH)) / 2).toFixed(1));
      }
      var nowX = geom.nowX;
      var zoneDark = svg.querySelector("[data-tl-zone-dark]");
      var zoneLight = svg.querySelector("[data-tl-zone-light]");
      if (zoneDark) {
        if (x > nowX + 1) {
          zoneDark.setAttribute("x", nowX.toFixed(1));
          zoneDark.setAttribute("width", (x - nowX).toFixed(1));
          zoneDark.style.display = "";
        } else {
          zoneDark.setAttribute("width", "0");
        }
      }
      if (zoneLight) {
        zoneLight.setAttribute("x", x.toFixed(1));
        zoneLight.setAttribute("width", Math.max(0, geom.w - geom.pad.r - x).toFixed(1));
      }
      var isPred = hoursAhead > 0.05;
      positionRemoteTimelineMetrics(block, geom, model, x, targetTs, predMm);
      if (block.__tlInfo) {
        var page = block.closest(".tank-detail-page");
        if (page) updateRemoteTankGaugePred(page, block.__tlInfo, predMm);
      }
      block.classList.toggle("tank-detail-timeline-block--pred", isPred);
      block.__tlHoursAhead = hoursAhead;
    }

    function wireRemoteTankTimeline(container, series, info) {
      var block = container && container.querySelector("[data-tank-timeline]");
      if (!block) return;
      var model = buildRemoteTimelineModel(series, info);
      var svg = block.querySelector("[data-tl-svg]");
      var wrap = block.querySelector("[data-tl-interactive]");
      renderRemoteTimelineSvg(svg, model);
      if (!svg || !wrap) return;
      block.__tlInfo = info;

      var dragging = false;

      function svgXFromEvent(ev) {
        var rect = svg.getBoundingClientRect();
        var clientX = ev.touches && ev.touches.length ? ev.touches[0].clientX : ev.clientX;
        return ((clientX - rect.left) / rect.width) * (svg.__tlGeom ? svg.__tlGeom.w : 800);
      }

      function onPointerMove(ev) {
        if (!dragging) return;
        ev.preventDefault();
        var h = timelineScrubHoursFromSvgX(svg.__tlGeom, svg.__tlModel, svgXFromEvent(ev));
        updateRemoteTimelineScrub(block, h);
      }

      function onPointerUp() {
        dragging = false;
        var hit = svg.querySelector("[data-tl-drag-hit]");
        if (hit) hit.style.cursor = "grab";
      }

      function startDrag(ev) {
        dragging = true;
        var hit = svg.querySelector("[data-tl-drag-hit]");
        if (hit) hit.style.cursor = "grabbing";
        onPointerMove(ev);
      }

      svg.addEventListener("mousedown", function (ev) {
        var geom = svg.__tlGeom;
        if (!geom) return;
        var sx = svgXFromEvent(ev);
        if (sx >= geom.nowX - 8) startDrag(ev);
      });
      svg.addEventListener("touchstart", function (ev) {
        var geom = svg.__tlGeom;
        if (!geom || !ev.touches.length) return;
        var sx = svgXFromEvent(ev);
        if (sx >= geom.nowX - 8) startDrag(ev);
      }, { passive: false });
      window.addEventListener("mousemove", onPointerMove);
      window.addEventListener("mouseup", onPointerUp);
      window.addEventListener("touchmove", onPointerMove, { passive: false });
      window.addEventListener("touchend", onPointerUp);

      updateRemoteTimelineScrub(block, 0);
    }

    function buildRemoteTankDetailPageHTML(info, series) {
      var pct = Math.max(0, Math.min(100, Number(info.fillPct) || 0));
      var gauge = buildDigitalTankGaugeSVG(pct, info.label || "", { drain: info.vis.drain, acc: info.vis.acc, detail: true, predFillPct: pct });
      var chart = buildTankDetailTrendChartSVG(series, info.livMax, info);
      var desc = info.description
        ? '<div class="tank-detail-desc-chip">' + esc(info.description) + "</div>"
        : "";
      return '<div class="tank-detail-page">' +
        '<div class="tank-detail-header"><div class="tank-detail-title">' + esc(info.label) + "</div>" + desc + "</div>" +
        '<div class="tank-detail-layout"><div class="tank-detail-hero">' +
        '<div class="tank-detail-gauge-wrap">' + gauge + "</div>" +
        '<div class="tank-detail-status-row">' + buildTankDetailStatusHTML(info) + "</div></div>" +
        '<div class="tank-detail-stats">' +
        '<div class="tank-detail-stat"><span class="tank-detail-stat-label">Livello attuale</span><span class="tank-detail-stat-val">' +
        fmtTankMm(info.levelMm) + ' <small>mm</small></span></div>' +
        '<div class="tank-detail-stat"><span class="tank-detail-stat-label">Tonnellate attuali</span><span class="tank-detail-stat-val">' +
        fmtTankTons(info.currentTons) + ' <small>t</small></span></div>' +
        '<div class="tank-detail-stat"><span class="tank-detail-stat-label">Livello massimo</span><span class="tank-detail-stat-val">' +
        fmtTankMm(info.livMax) + ' <small>mm</small></span></div>' +
        '<div class="tank-detail-stat"><span class="tank-detail-stat-label">Tonnellate max</span><span class="tank-detail-stat-val">' +
        fmtTankTons(info.maxTons) + ' <small>t</small></span></div>' +
        '<div class="tank-detail-stat"><span class="tank-detail-stat-label">Riempimento</span><span class="tank-detail-stat-val">' +
        (info.fillPctOfMax != null ? info.fillPctOfMax + " <small>%</small>" : "—") + "</span></div></div></div>" +
        buildRemoteTimelineHTML(series, info) +
        '<div class="tank-detail-trend-block"><div class="tank-detail-section-title">Trend livello</div>' +
        '<div class="tank-detail-chart-wrap">' + chart + "</div></div>" +
        '<div class="tank-detail-history-block"><div class="tank-detail-section-title">Storico salvataggi</div>' +
        buildTankDetailHistoryTableHTML(series) + "</div></div>";
    }

    function renderRemoteTankDetailBody(fieldId, navCtx) {
      if (!fieldId) return;
      navCtx = navCtx || {};
      var payload = window.__remoteDigitalPayload || {};
      var info = resolveRemoteTankDetailInfo(fieldId, payload, navCtx);
      var series = ((payload.tankLevelHistory && payload.tankLevelHistory[fieldId]) || []).slice();
      tagRemoteSeriesInitialLevel(series);
      if (Number.isFinite(info.levelMm)) {
        series = appendRemoteLiveLevel(series, fieldId, info.levelMm, payload.tankLevelInputAt || {});
        info.levelInputTs = resolveRemoteCurrentLevelTs(fieldId, series, info);
      }
      var overlay = ensureRemoteTankDetailOverlay();
      var content = overlay.querySelector("#tank-detail-content");
      content.innerHTML = buildRemoteTankDetailPageHTML(info, series);
      wireRemoteTankTimeline(content, series, info);
      var backBtn = overlay.querySelector("#tank-detail-back-btn");
      if (backBtn) backBtn.textContent = "← " + (navCtx.backLabel || "Indietro");
      return overlay;
    }

    function ensureRemoteTankDetailOverlay() {
      var el = document.getElementById("tank-detail-overlay");
      if (el) {
        wireRemoteTankDetailToolbar(el);
        return el;
      }
      el = document.createElement("div");
      el.id = "tank-detail-overlay";
      el.className = "tank-detail-overlay";
      el.innerHTML =
        '<div class="tank-detail-shell">' +
        '<div class="tank-detail-topbar">' +
        '<button type="button" class="tank-detail-back" id="tank-detail-back-btn">← Indietro</button>' +
        '<button type="button" class="tank-detail-refresh" id="tank-detail-refresh-btn">AGGIORNA</button>' +
        "</div>" +
        '<div id="tank-detail-content"></div></div>';
      document.body.appendChild(el);
      wireRemoteTankDetailToolbar(el);
      if (!window.__remoteTankDetailEscBound) {
        window.__remoteTankDetailEscBound = true;
        document.addEventListener("keydown", function (e) {
          if (e.key !== "Escape") return;
          var ov = document.getElementById("tank-detail-overlay");
          if (ov && ov.classList.contains("active")) {
            e.preventDefault();
            window.closeRemoteTankDetailPage();
          }
        });
      }
      return el;
    }

    function wireRemoteTankDetailToolbar(overlay) {
      if (!overlay || overlay.getAttribute("data-tl-toolbar-wired") === "1") return;
      overlay.setAttribute("data-tl-toolbar-wired", "1");
      var backBtn = overlay.querySelector("#tank-detail-back-btn");
      if (backBtn) backBtn.onclick = function () { window.closeRemoteTankDetailPage(); };
      var refBtn = overlay.querySelector("#tank-detail-refresh-btn");
      if (refBtn) refBtn.onclick = function () { window.refreshRemoteTankDetailPage(); };
    }

    window.__rerenderRemoteTankDetailIfOpen = function () {
      var ctx = window.__remoteTankDetailCtx;
      if (!ctx || !ctx.fieldId) return;
      var ov = document.getElementById("tank-detail-overlay");
      if (!ov || !ov.classList.contains("active")) return;
      renderRemoteTankDetailBody(ctx.fieldId, ctx.navCtx || {});
    };

    window.refreshRemoteTankDetailPage = async function () {
      if (window.__remoteTankDetailRefreshInFlight) return;
      var btn = document.getElementById("tank-detail-refresh-btn");
      var prev = btn ? btn.textContent : "";
      if (btn) {
        btn.disabled = true;
        btn.textContent = "…";
      }
      window.__remoteTankDetailRefreshInFlight = true;
      try {
        if (typeof window.__remoteRefreshHandler === "function") {
          await window.__remoteRefreshHandler();
        }
        if (typeof window.__rerenderRemoteTankDetailIfOpen === "function") {
          window.__rerenderRemoteTankDetailIfOpen();
        }
        if (btn) {
          btn.textContent = "OK ✓";
          setTimeout(function () {
            if (btn) btn.textContent = prev || "AGGIORNA";
          }, 900);
        }
      } catch (err) {
        console.warn("[SvcRemote] refreshRemoteTankDetailPage:", err && err.message);
        if (btn) btn.textContent = "!";
        setTimeout(function () {
          if (btn) btn.textContent = prev || "AGGIORNA";
        }, 1200);
      } finally {
        window.__remoteTankDetailRefreshInFlight = false;
        if (btn) btn.disabled = false;
      }
    };

    window.openRemoteTankDetailPage = function (fieldId, navCtx) {
      if (!fieldId) return;
      navCtx = navCtx || {};
      window.__remoteTankDetailCtx = { fieldId: fieldId, navCtx: navCtx };
      var overlay = renderRemoteTankDetailBody(fieldId, navCtx);
      overlay.classList.add("active");
      document.body.classList.add("tank-detail-open");
    };

    window.closeRemoteTankDetailPage = function () {
      var ov = document.getElementById("tank-detail-overlay");

    function ensureCardZoomDelegates() {
      if (window.__svcRemoteCardZoomWired) return;
      window.__svcRemoteCardZoomWired = true;
      document.addEventListener("click", function (e) {
        const root = document.getElementById("digital-preview-container");
        if (!root || !root.contains(e.target)) return;
        const grid = root.querySelector("#digital-cards-grid");
        if (!grid || !grid.contains(e.target)) return;
        const tankRow = e.target.closest(".digital-stocc-row[data-field-id]");
        if (tankRow && grid.contains(tankRow)) {
          const card = tankRow.closest(".digital-card");
          const isExpandedFocus = root.classList.contains("digital-focus-active") &&
            card && card.classList.contains("digital-card--expanded");
          if (isExpandedFocus) {
            e.preventDefault();
            e.stopPropagation();
            const fieldId = tankRow.getAttribute("data-field-id");
            if (!fieldId) return;
            const moduleTitle = card
              ? String(card.querySelector(".digital-card-title")?.textContent || "").replace(/\s+/g, " ").trim()
              : "Digital HD";
            var levelRaw = String(tankRow.querySelector(".digital-stocc-value")?.textContent || "").trim();
            if (!levelRaw) {
              var lm = String(tankRow.querySelector(".digital-stocc-level-line")?.textContent || "")
                .match(/([\d.\s,]+)\s*mm/i);
              if (lm && lm[1]) levelRaw = lm[1].trim();
            }
            window.openRemoteTankDetailPage(fieldId, { backLabel: moduleTitle || "Digital HD", levelRaw: levelRaw });
            return;
          }
        }
        const card = e.target.closest(".digital-card");
        if (!card || !grid.contains(card)) return;
        if (root.classList.contains("digital-focus-active") && card.classList.contains("digital-card--expanded")) return;
        window.expandDigitalModule(card);
      }, true);
      document.addEventListener("keydown", function (e) {
        const root = document.getElementById("digital-preview-container");
        if (!root) return;
        if (e.key !== "Escape") return;
        const tankOv = document.getElementById("tank-detail-overlay");
        if (tankOv && tankOv.classList.contains("active")) {
          e.preventDefault();
          window.closeRemoteTankDetailPage();
          return;
        }
        if (!root.classList.contains("digital-focus-active")) return;
        e.preventDefault();
        window.closeDigitalModuleFocus();
      }, true);
    }

    /** Evita re-render identici (onSnapshot / metadata). */

      if (!d) return false;

      return ts >= __lastRenderedUpdatedAt;

    function captureRemoteFocusState(root) {
      const inFocus = !!(root && root.classList.contains("digital-focus-active"));
      const state = { inFocus: inFocus, moduleId: "", scrollTop: 0, title: "" };
      if (!inFocus) return state;
      const exp = root.querySelector(".digital-card--expanded");
      if (exp) state.moduleId = String(exp.getAttribute("data-module-id") || "");
      const scroll = root.querySelector("#digital-preview-scroll");
      if (scroll) state.scrollTop = scroll.scrollTop;
      const tt = root.querySelector("#digital-focus-title");
      if (tt) state.title = String(tt.textContent || "").replace(/\s+/g, " ").trim();
      return state;
    }

    function restoreRemoteFocusState(root, grid, focusState) {
      if (!root || !grid || !focusState || !focusState.inFocus) return;
      root.classList.add("digital-remote--silent-patch");
      let matched = null;
      if (focusState.moduleId) {
        matched = grid.querySelector('.digital-card[data-module-id="' + focusState.moduleId + '"]');
      }
      if (!matched && focusState.title) {
        grid.querySelectorAll(".digital-card").forEach(function (c) {
          const titleNode = c.querySelector(".digital-card-title");
          const t = titleNode ? String(titleNode.textContent || "").replace(/\s+/g, " ").trim() : "";
          if (t === focusState.title) matched = c;
        });
      }
      if (matched) window.expandDigitalModule(matched);
      const scroll = root.querySelector("#digital-preview-scroll");
      if (scroll) scroll.scrollTop = focusState.scrollTop;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          root.classList.remove("digital-remote--silent-patch");
        });
      });
    }

    /**
     * @param {object} d dati publicDigital
     * @param {{ fullRefresh?: boolean }} opts fullRefresh=true solo da pulsante AGGIORNA (animazione / DOM completo)
     */
    function renderFromData(d, opts) {
      const o = opts || {};
      const forceFull = o.fullRefresh === true;
      window.__remoteDigitalPayload = d || {};
      const root = document.getElementById("digital-preview-container");
      const existingGrid = rootEl.querySelector("#digital-cards-grid");
      const canSilent =
        !forceFull &&
        existingGrid &&
        d &&
        typeof d.cardsHTML === "string" &&
        !String(rootEl.innerHTML || "").includes("remote-error-banner");

      if (canSilent) {
        const sig = digitalRemoteSig(d);
        if (sig === __lastDigitalRemoteSig) return;
        __lastDigitalRemoteSig = sig;

        const focusState = captureRemoteFocusState(root);

        updateRemoteMetaStrip(d);
        applyDigitalGridContent(existingGrid, d);
        applyDigitalPhoneLayoutIfNeeded(root);
        applyRemoteLayoutPrefs(root);
        restoreRemoteFocusState(root, existingGrid, focusState);
        markRemotePayloadRendered(d);
        if (typeof window.__rerenderRemoteTankDetailIfOpen === "function") {
          window.__rerenderRemoteTankDetailIfOpen();
        }
        return;
      }

      __lastDigitalRemoteSig = digitalRemoteSig(d || {});
      root.classList.remove("digital-focus-active", "digital-focus-stocc");
      rootEl.innerHTML = buildMainMarkup(d || {});
      const freshGrid = rootEl.querySelector("#digital-cards-grid");
      if (freshGrid) patchStoccaggioInGrid(freshGrid, d || {});
      wireButtons();
      bindCardZoomOnce();
      applyDigitalPhoneLayoutIfNeeded(root);
      var ip = document.getElementById("svc-remote-install-panel");
      if (ip) ip.style.display = "none";
    }

    function initRemoteDb(appName) {
      let app;
      try {
        app = getApp(appName);
      } catch (_) {
        app = initializeApp(DEFAULT_FIREBASE_CONFIG, appName);
      }
      try {
        return initializeFirestore(app, {
          localCache: memoryLocalCache(),
          experimentalForceLongPolling: true
        });
      } catch (_) {
        return getFirestore(app);
      }
    }

    /** Ultimo report sul cloud: prima __latest, poi scan collection. */
    async function fetchLatestPublicDigital(appId) {
      const db = initRemoteDb("digital-remote-bootstrap");
      try {
        const latestSnap = await getDocFromServer(
          doc(db, "artifacts", appId, "publicDigital", "__latest")
        );
        if (latestSnap.exists()) {
          const sk = String((latestSnap.data() || {}).shareKey || "").trim();
          if (sk) {
            const dataSnap = await getDocFromServer(
              doc(db, "artifacts", appId, "publicDigital", sk)
            );
            if (dataSnap.exists()) {
              const d = dataSnap.data() || {};
              if (String(d.cardsHTML || "").trim().length >= 40) {
                return { shareKey: sk, data: d };
              }
            }
          }
        }
      } catch (err) {
        console.warn("[SvcRemote] read __latest:", err && err.message);
      }
      try {
        const snap = await getDocsFromServer(collection(db, "artifacts", appId, "publicDigital"));
        let best = null;
        snap.forEach(function (docSnap) {
          if (docSnap.id === "__latest") return;
          const d = docSnap.data() || {};
          const html = String(d.cardsHTML || "");
          if (html.length < 40) return;
          if (!best || String(d.updatedAt || "") > String(best.data.updatedAt || "")) {
            best = { shareKey: docSnap.id, data: d };
          }
        });
        return best;
      } catch (err) {
        console.warn("[SvcRemote] scan publicDigital:", err && err.message);
        return null;
      }
    }

    async function fetchLatestShareKeyFromCloud(appId) {
      const hit = await fetchLatestPublicDigital(appId);
      return hit && hit.shareKey ? String(hit.shareKey).trim() : "";
    }

    async function remoteBootstrap() {
      let activeKey = shareKey;
      let preloaded = null;

      rootEl.innerHTML = buildLoadingShell("Caricamento Digital Report…");

      /** Sempre __latest dal cloud: tablet PWA non deve restare su chiave locale vecchia. */
      const latest = await fetchLatestPublicDigital(appIdParam);
      if (latest && latest.shareKey && latest.data && String(latest.data.cardsHTML || "").trim().length >= 40) {
        activeKey = latest.shareKey;
        preloaded = latest.data;
        try {
          localStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
          sessionStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
          localStorage.setItem(REMOTE_APP_ID_KEY, appIdParam);
        } catch (_) {}
        try {
          if (!shareKey || shareKey !== activeKey) {
            history.replaceState(null, "", buildCanonicalRemoteUrl(activeKey, appIdParam).href);
          }
        } catch (_) {}
      } else if (activeKey) {
        try {
          const db = initRemoteDb("digital-remote-bootstrap-key");
          const snap = await getDocFromServer(
            doc(db, "artifacts", appIdParam, "publicDigital", activeKey)
          );
          if (snap.exists()) {
            const d = snap.data() || {};
            if (String(d.cardsHTML || "").trim().length >= 40) preloaded = d;
          }
        } catch (err) {
          console.warn("[SvcRemote] bootstrap fallback key:", err && err.message);
        }
      }

      if (!activeKey || !preloaded) {
        if (!latest && !activeKey) {
          rootEl.innerHTML = buildErrorShell(
            "<strong>Report non ancora pubblicato.</strong><p style=\"margin:12px 0 0;color:#fecaca;\">Da ServiceHub: apri Digital Report HD (con le card), poi LINK REMOTO.</p>" +
            "<p style=\"margin:10px 0 0;color:#fde047;font-size:12px;\">Su tablet/WhatsApp: tocca <strong>Apri link</strong> (non restare nell'anteprima).</p>"
          );
        } else {
          rootEl.innerHTML = buildErrorShell(
            "<strong>Report non trovato.</strong><p style=\"margin:12px 0 0;color:#fecaca;\">Ripeti LINK REMOTO da ServiceHub con il Digital Report aperto.</p>" +
            "<p style=\"margin:10px 0 0;color:#fde047;font-size:12px;\">Verifica che il link contenga <code>/r/</code> e un codice lungo.</p>"
          );
        }
        return;
      }

      (async function initRemoteDigital() {
        const isStandaloneApp =
          typeof window.__svcRemoteIsStandalone === "function" && window.__svcRemoteIsStandalone();
        let __remoteAutoRetryCount = 0;
        const MAX_AUTO_RETRY = 20;

        let app;
        try {
          app = getApp("digital-remote-viewer");
        } catch (_) {
          app = initializeApp(DEFAULT_FIREBASE_CONFIG, "digital-remote-viewer");
        }
        const db = (function initRemoteFirestore() {
          try {
            return initializeFirestore(app, {
              localCache: memoryLocalCache(),
              experimentalForceLongPolling: true
            });
          } catch (err) {
            console.warn("[Digital remoto] Firestore init:", err && err.message);
            return getFirestore(app);
          }
        })();
        prefRef = doc(db, "artifacts", appIdParam, "publicDigital", activeKey);

        function wireRetryFetchButton() {
          const retryBtn = document.getElementById("svc-remote-retry-fetch");
          if (!retryBtn) return;
          retryBtn.addEventListener("click", function () {
            retryBtn.disabled = true;
            retryBtn.textContent = "…";
            pullLatestFromCloud({ fullRefresh: true, userInitiated: true }).finally(function () {
              retryBtn.disabled = false;
              retryBtn.textContent = "Riprova";
            });
          });
        }

        /**
         * Legge l ultimo Digital Report pubblicato sul cloud (scan + chiave corrente).
         * @param {{ fullRefresh?: boolean, userInitiated?: boolean }} opts
         */
        async function pullLatestFromCloud(opts) {
          const o = opts || {};
          const forceFull = o.fullRefresh !== false;
          const userInitiated = !!o.userInitiated;
          clearRemoteSnapshotDebounce();

          let hit = await fetchLatestPublicDigital(appIdParam);

          if ((!hit || !hit.data) && prefRef) {
            try {
              const snap = await getDocFromServer(prefRef);
              if (snap.exists()) {
                const d = snap.data();
                if (String(d.cardsHTML || "").trim().length >= 40) {
                  hit = { shareKey: activeKey, data: d };
                }
              }
            } catch (err) {
              console.warn("[SvcRemote] pullLatest prefRef:", err && err.message);
            }
          }

          if (!hit || !hit.data || String(hit.data.cardsHTML || "").trim().length < 40) {
            if (!userInitiated && __remoteAutoRetryCount < MAX_AUTO_RETRY) {
              __remoteAutoRetryCount++;
              rootEl.innerHTML = buildLoadingShell(
                "Sincronizzazione cloud… (" + __remoteAutoRetryCount + "/" + MAX_AUTO_RETRY + ")"
              );
              await new Promise(function (resolve) {
                setTimeout(resolve, 1500);
              });
              return pullLatestFromCloud(opts);
            }
            __lastDigitalRemoteSig = "";
            __lastRenderedUpdatedAt = "";
            if (userInitiated) {
              updateRemoteSyncStatus();
              rootEl.innerHTML = buildErrorShell(
                "<strong>Nessun report sul cloud.</strong>" +
                  '<p style="margin:12px 0 0;color:#fecaca;">Da ServiceHub: Digital Report → <strong>AGGIORNA</strong> o <strong>LINK REMOTO</strong> (LED verde).</p>' +
                  '<button type="button" id="svc-remote-retry-fetch" style="cursor:pointer;margin-top:14px;padding:10px 16px;border-radius:10px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-weight:800;font-size:13px;">Riprova</button>'
              );
              wireButtons();
              wireRetryFetchButton();
            }
            return { ok: false, reason: "missing" };
          }

          const incomingSig = digitalRemoteSig(hit.data);
          const unchangedOnScreen = !!(__lastDigitalRemoteSig && incomingSig === __lastDigitalRemoteSig);

          if (hit.shareKey !== activeKey) {
            activeKey = hit.shareKey;
            prefRef = doc(db, "artifacts", appIdParam, "publicDigital", activeKey);
            try {
              localStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
              sessionStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
            } catch (_) {}
            if (typeof bindCloudPushListener === "function") bindCloudPushListener();
          }

          var curGridBefore = rootEl.querySelector("#digital-cards-grid");
          var curCardCount = curGridBefore ? curGridBefore.querySelectorAll(".digital-card[data-module-id]").length : 0;
          var newCardCount = countDigitalCards(hit.data.cardsHTML);
          if (userInitiated && curCardCount > 0 && newCardCount > 0 && newCardCount < curCardCount - 1) {
            console.warn("[SvcRemote] AGGIORNA: cloud incompleto (" + newCardCount + " moduli vs " + curCardCount + " a schermo)");
            return { ok: false, reason: "incomplete-cloud", updatedAt: hit.data.updatedAt };
          }

          if (!userInitiated && unchangedOnScreen) {
            return { ok: true, reason: "stale-skipped" };
          }

          __lastDigitalRemoteSig = "";
          renderFromData(hit.data, { fullRefresh: forceFull });
          markRemotePayloadRendered(hit.data);
          __lastDigitalRemoteSig = digitalRemoteSig(hit.data);
          wireButtons();
          bindCardZoomOnce();
          applyDigitalPhoneLayoutIfNeeded(document.getElementById("digital-preview-container"));

          var when = hit.data.updatedAt
            ? new Date(hit.data.updatedAt).toLocaleString("it-IT")
            : "—";
          if (userInitiated && unchangedOnScreen) {
            updateRemoteSyncStatus();
            return { ok: true, reason: "unchanged", updatedAt: hit.data.updatedAt };
          }
          updateRemoteSyncStatus();
          return { ok: true, reason: "rendered", updatedAt: hit.data.updatedAt };
        }

        async function fetchAndRenderPublicDigital(opts) {
          return pullLatestFromCloud(opts || {});
        }

        refreshHandler = async function () {
          if (__remoteRefreshInFlight) return;
          const btn = document.getElementById("btn-remote-refresh");
          if (btn) {
            btn.disabled = true;
            btn.textContent = "…";
          }
          __remoteRefreshInFlight = true;
          try {
            const root = document.getElementById("digital-preview-container");
            const inFocus = !!(root && root.classList.contains("digital-focus-active"));
            const tankDetailOpen = !!(document.getElementById("tank-detail-overlay") &&
              document.getElementById("tank-detail-overlay").classList.contains("active"));
            const result = await pullLatestFromCloud({
              fullRefresh: !inFocus && !tankDetailOpen,
              userInitiated: true
            });
            if (typeof window.__rerenderRemoteTankDetailIfOpen === "function") {
              window.__rerenderRemoteTankDetailIfOpen();
            }
            if (btn && result && result.ok) {
              btn.textContent = result.reason === "unchanged" ? "OK ✓" : "OK";
              setTimeout(function () {
                if (btn) btn.textContent = "AGGIORNA";
              }, 1100);
            } else if (btn && result && result.reason === "incomplete-cloud") {
              btn.textContent = "!";
              setTimeout(function () {
                if (btn) btn.textContent = "AGGIORNA";
              }, 1800);
            }
          } catch (err) {
            __lastDigitalRemoteSig = "";
            updateRemoteSyncStatus();
            rootEl.innerHTML = buildErrorShell(
              "Aggiornamento non riuscito: " +
                esc(err && err.message) +
                ". Controlla la connessione e riprova."
            );
            wireButtons();
          } finally {
            __remoteRefreshInFlight = false;
            const b = document.getElementById("btn-remote-refresh");
            if (b) {
              b.disabled = false;
              if (b.textContent === "…") b.textContent = "AGGIORNA";
            }
          }
        };

        window.__remoteRefreshHandler = refreshHandler;

        function countDigitalCards(html) {
          return (String(html || "").match(/data-module-id="/g) || []).length;
        }

        let unsubPrefSnapshot = null;
        let __prefSnapServerTimer = null;

        function applyRemoteCloudPayload(d) {
          if (__remoteRefreshInFlight) return;
          if (!d || String(d.cardsHTML || "").trim().length < 40) return;
          var root = document.getElementById("digital-preview-container");
          var sig = digitalRemoteSig(d);
          if (sig === __lastDigitalRemoteSig) return;
          renderFromData(d, { fullRefresh: false });
          __lastDigitalRemoteSig = sig;
          wireButtons();
          bindCardZoomOnce();
          applyDigitalPhoneLayoutIfNeeded(root);
          if (typeof window.__rerenderRemoteTankDetailIfOpen === "function") {
            window.__rerenderRemoteTankDetailIfOpen();
          }
        }

        function bindCloudPushListener() {
          if (typeof unsubPrefSnapshot === "function") {
            try {
              unsubPrefSnapshot();
            } catch (_) {}
          }
          if (__prefSnapServerTimer) {
            clearTimeout(__prefSnapServerTimer);
            __prefSnapServerTimer = null;
          }
          unsubPrefSnapshot = onSnapshot(
            prefRef,
            function () {
              if (__prefSnapServerTimer) clearTimeout(__prefSnapServerTimer);
              __prefSnapServerTimer = setTimeout(function () {
                __prefSnapServerTimer = null;
                if (!prefRef) return;
                getDocFromServer(prefRef)
                  .then(function (srv) {
                    if (srv.exists()) applyRemoteCloudPayload(srv.data() || {});
                  })
                  .catch(function () {
                    getDoc(prefRef)
                      .then(function (loc) {
                        if (loc.exists()) applyRemoteCloudPayload(loc.data() || {});
                      })
                      .catch(function () {});
                  });
              }, 20);
            },
            function (err) {
              console.warn("[SvcRemote] cloud listener:", err && err.message);
            }
          );
        }

        /** Caricamento iniziale + AGGIORNA manuale + sync quando ServiceHub pubblica sul cloud. */
        await pullLatestFromCloud({ fullRefresh: true, userInitiated: false }).catch(function () {});

        bindCloudPushListener();

        var latestPtrRef = doc(db, "artifacts", appIdParam, "publicDigital", "__latest");
        onSnapshot(
          latestPtrRef,
          function (snap) {
            if (__remoteRefreshInFlight || !snap.exists()) return;
            var sk = String((snap.data() || {}).shareKey || "").trim();
            if (sk && sk !== activeKey) {
              activeKey = sk;
              prefRef = doc(db, "artifacts", appIdParam, "publicDigital", activeKey);
              try {
                localStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
                sessionStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
              } catch (_) {}
              bindCloudPushListener();
            }
            pullLatestFromCloud({ fullRefresh: false, userInitiated: false }).catch(function () {});
          },
          function (err) {
            console.warn("[SvcRemote] __latest listener:", err && err.message);
          }
        );
      })();
    }

    ensureCardZoomDelegates();
    remoteBootstrap();
  </script>
  <script src="install-help.js?v=v19"></script>
  <script>
    if (window.__svcRemoteInstallHelp && !window.__svcRemoteExtractKeyFromUrl()) {
      var onInstall = /\/install\.html$/i.test(String(location.pathname || ""));
      if (onInstall) window.__svcRemoteInstallHelp.init({ timeoutMs: 2200 });
    }
  </script>
</body>
