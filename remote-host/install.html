<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Service Remote — installazione</title>
  <meta name="theme-color" content="#307eb4" />
  <meta name="application-name" content="Service Remote" />
  <link rel="manifest" href="manifest.json?v=fb4" />
  <link rel="apple-touch-icon" href="sh-remote-touch.png?v=fb4" />
  <link rel="icon" type="image/png" href="sh-remote-favicon.png?v=fb4" />
  <style>
    html, body { margin: 0; min-height: 100%; font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 520px; margin: 0 auto; padding: 28px 20px 100px; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    p { line-height: 1.55; color: #94a3b8; margin: 0 0 14px; }
    .btn {
      display: inline-block; margin: 8px 8px 0 0; padding: 12px 18px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #2563eb, #4f46e5); color: #fff; font-weight: 800;
      font-size: 14px; cursor: pointer; text-decoration: none;
    }
    .btn--ghost { background: rgba(51,65,85,0.9); border: 1px solid rgba(148,163,184,0.35); }
    #svc-remote-install-panel { display: flex; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Service Remote · Digital HD</h1>
    <p>Seconda app <strong>separata</strong> da ServiceHub (stesso PC o altro dispositivo).</p>
    <a class="btn" href="./index.html">Apri Digital Report</a>
  </div>
  <div id="svc-remote-install-panel" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9998;padding:10px 14px;background:rgba(15,23,42,0.96);border-top:1px solid rgba(96,165,250,0.45);color:#e2e8f0;font:600 12px/1.45 system-ui,sans-serif;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
    <span id="svc-remote-install-msg" style="flex:1;min-width:200px;">Controllo installazione…</span>
    <button type="button" id="svc-remote-install-btn" style="display:none;flex-shrink:0;padding:8px 16px;border-radius:10px;border:none;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;font-weight:800;font-size:12px;cursor:pointer;">Installa</button>
  </div>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js?v=fb4", { scope: "./" }).catch(function () {});
    }
    if (window.matchMedia("(display-mode: standalone)").matches) {
      location.replace("./index.html");
    }
  </script>
  <script src="install-help.js?v=v14"></script>
  <script>
    if (window.__svcRemoteInstallHelp) window.__svcRemoteInstallHelp.init({ timeoutMs: 1200 });
  </script>
</body>
</html>
