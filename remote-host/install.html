<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Service Remote — installazione</title>
  <meta name="theme-color" content="#307eb4" />
  <meta name="application-name" content="Service Remote" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SvcRemote" />
  <link rel="manifest" href="manifest.json?v=fb3" />
  <link rel="apple-touch-icon" href="sh-remote-touch.png?v=fb3" />
  <link rel="icon" type="image/png" href="sh-remote-favicon.png?v=fb3" />
  <style>
    html, body { margin: 0; min-height: 100%; font-family: system-ui, sans-serif; }
    #splash-screen {
      position: fixed; inset: 0; z-index: 1; background: #000;
      display: flex; align-items: stretch; justify-content: stretch;
    }
    @media (orientation: portrait) { #splash-screen { background: #fff; } }
    #splash-wrap { position: relative; width: 100%; height: 100%; min-height: 100dvh; }
    #splash-wrap img {
      display: block; width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      pointer-events: none; -webkit-user-drag: none;
    }
    #splash-enter {
      position: absolute; z-index: 2; background: transparent; border: none;
      cursor: pointer; outline: none; border-radius: 14%;
    }
    @media (orientation: landscape) {
      #splash-enter { top: 8%; left: 32%; width: 36%; height: 70%; }
    }
    @media (orientation: portrait) {
      #splash-enter { top: 36%; left: 14%; width: 72%; height: 30%; }
    }
    #remote-install-hint {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 3;
      padding: 10px 14px; background: rgba(15, 23, 42, 0.92);
      color: #e2e8f0; font: 600 12px/1.45 system-ui, sans-serif;
      border-top: 1px solid rgba(96, 165, 250, 0.45);
    }
    #remote-install-btn {
      display: none; position: fixed; bottom: 72px; right: 18px; z-index: 4;
      padding: 12px 18px; border-radius: 24px; border: none;
      background: linear-gradient(135deg, #2563eb, #4f46e5); color: #fff;
      font-weight: 800; font-size: 13px; cursor: pointer;
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.45);
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div id="splash-wrap">
      <picture>
        <source media="(orientation: portrait)" srcset="splash-remote-mobile.png?v=fb3" />
        <img src="splash-remote-pc.png?v=fb3" alt="Service Remote" />
      </picture>
      <button id="splash-enter" type="button" aria-label="Apri Service Remote"></button>
    </div>
  </div>
  <button id="remote-install-btn" type="button">Installa Service Remote</button>
  <div id="remote-install-hint">
    <strong>Service Remote (lettura Digital HD):</strong> app <em>separata</em> da ServiceHub operatore.
    Su PC: menu Chrome/Edge → <strong>Installa app</strong> oppure il pulsante blu qui sopra.
  </div>
  <script>
    (function () {
      var deferredPrompt = null;
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js?v=fb3", { scope: "./" }).catch(function () {});
      }
      var btn = document.getElementById("splash-enter");
      function enter() {
        location.href = "./index.html" + (location.search || "") + (location.hash || "");
      }
      if (btn) btn.addEventListener("click", enter);
      if (window.matchMedia("(display-mode: standalone)").matches) {
        enter();
      }
      var installBtn = document.getElementById("remote-install-btn");
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        deferredPrompt = e;
        if (installBtn) installBtn.style.display = "block";
      });
      if (installBtn) {
        installBtn.addEventListener("click", async function () {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          try { await deferredPrompt.userChoice; } catch (_) {}
          deferredPrompt = null;
          installBtn.style.display = "none";
        });
      }
    })();
  </script>
</body>
</html>
