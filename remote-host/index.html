  <script>
  (function () {
    var SK = "servicehub_remote_share_k";
    var SA = "servicehub_remote_app_id";
    var FB_ORIGIN = "https://servicehub-18309.web.app";
    window.SVCREMOTE_BUILD = "2026.06.08-v48";

    /** Vecchi link su GitHub → stesso remoto su Firebase. */
    (function redirectGithubToFirebase() {
      var host = (location.hostname || "").toLowerCase();
      if (host.indexOf("github.io") === -1 && host.indexOf("github.dev") === -1) return;
      var rMatch = (location.pathname || "").match(/\/r\/[^/?#]+/i);
      var path = rMatch ? rMatch[0] : "/index.html";
      if (!rMatch && (location.search || "").indexOf("k=") !== -1) {
        path = "/index.html";
      }
      location.replace(FB_ORIGIN + path + (location.search || "") + (location.hash || ""));
    })();

    function isGithubHost() {
      var host = (location.hostname || "").toLowerCase();
      return host.indexOf("github.io") !== -1 || host.indexOf("github.dev") !== -1;
    }

    function isStandalonePwa() {
      try {
        return (
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true
        );
      } catch (_) {
        return false;
      }
    }

    /** Chiave nel path /r/CHIAVE (meglio per condivisione web: WhatsApp non taglia il path). */
    function extractKeyFromPathname(pathname) {
      var p = String(pathname || location.pathname || "");
      var m = p.match(/\/r\/([^/?#]+)/i);
      if (m && m[1]) {
        try {
          return decodeURIComponent(String(m[1]).replace(/\+/g, " ")).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      return "";
    }

    function buildCanonicalRemoteUrl(k, a) {
      if (isGithubHost()) {
        var path = String(location.pathname || "/");
        var m = path.match(/^(.*\/remote)\/?/i);
        var basePath = m ? m[1] : path.replace(/\/[^/]*$/, "");
        var u = new URL(basePath + "/index.html", location.origin);
        u.searchParams.set("k", k);
        if (a) u.searchParams.set("app", a);
        try {
          if (new URLSearchParams(location.search).get("pc") === "1") {
            u.searchParams.set("pc", "1");
          }
        } catch (_) {}
        return u;
      }
      var u = new URL(location.origin + "/r/" + encodeURIComponent(k));
      if (a) u.searchParams.set("app", a);
      try {
        if (new URLSearchParams(location.search).get("pc") === "1") {
          u.searchParams.set("pc", "1");
        }
      } catch (_) {}
      return u;
    }

    /** Chiave da qualsiasi URL (/r/KEY, ?k=, &k=, #...?k=, anche K maiuscolo). */
    function extractKeyFromHref(href) {
      var search = "";
      var hash = "";
      var pathname = "";
      var full = String(href || location.href || "");
      try {
        var u = new URL(full.indexOf("://") > -1 ? full : "https://local.invalid/" + full.replace(/^\//, ""));
        search = u.search;
        hash = u.hash;
        pathname = u.pathname;
        full = u.href;
      } catch (_) {}
      var fromPath = extractKeyFromPathname(pathname);
      if (fromPath) return fromPath;
      function trySearch(qs) {
        if (!qs) return "";
        var q = qs.charAt(0) === "?" ? qs.slice(1) : qs;
        var p = new URLSearchParams(q);
        return (p.get("k") || p.get("K") || "").trim();
      }
      var k = trySearch(search);
      if (k) return k;
      var m = full.match(/[?&#](?:k|K)=([^&#\s]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(String(m[1]).replace(/\+/g, " ")).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      if (hash && hash.indexOf("?") !== -1) {
        k = trySearch("?" + hash.split("?").slice(1).join("?"));
        if (k) return k;
      }
      return "";
    }

    function extractAppFromHref(href) {
      var search = "";
      var full = String(href || location.href || "");
      try {
        var u = new URL(full.indexOf("://") > -1 ? full : "https://local.invalid/" + full.replace(/^\//, ""));
        search = u.search;
        full = u.href;
      } catch (_) {}
      var p = new URLSearchParams(search);
      var a = (p.get("app") || p.get("APP") || "").trim();
      if (a) return a;
      var m = full.match(/[?&#](?:app|APP)=([^&#\s]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(m[1]).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      return "";
    }

    window.__svcRemoteExtractKeyFromUrl = function () {
      return extractKeyFromHref(location.href);
    };
    window.__svcRemoteExtractAppFromUrl = function () {
      return extractAppFromHref(location.href);
    };
    window.__svcRemoteIsStandalone = isStandalonePwa;
    window.__svcRemoteParseLink = function (input) {
      return {
        k: extractKeyFromHref(input),
        app: extractAppFromHref(input)
      };
    };
    window.__svcRemoteApplyPastedLink = function (input) {
      var parsed = window.__svcRemoteParseLink(input);
      if (!parsed.k) return false;
      try {
        localStorage.setItem(SK, parsed.k);
        sessionStorage.setItem(SK, parsed.k);
        if (parsed.app) {
          localStorage.setItem(SA, parsed.app);
          sessionStorage.setItem(SA, parsed.app);
        }
      } catch (_) {}
      var u = buildCanonicalRemoteUrl(parsed.k, parsed.app || "");
      location.replace(u.href);
      return true;
    };

    function cleanStandaloneUrl() {
      try {
        history.replaceState(null, "", location.origin + "/index.html");
      } catch (_) {}
    }

    try {
      var k = extractKeyFromHref(location.href);
      var a = extractAppFromHref(location.href);
      var standalone = isStandalonePwa();
      if (k) {
        localStorage.setItem(SK, k);
        try {
          sessionStorage.setItem(SK, k);
        } catch (_) {}
        if (a) {
          localStorage.setItem(SA, a);
          try {
            sessionStorage.setItem(SA, a);
          } catch (_) {}
        }
        if (standalone) {
          cleanStandaloneUrl();
        } else if (!extractKeyFromPathname(location.pathname)) {
          if (isGithubHost()) {
            try {
              history.replaceState(null, "", buildCanonicalRemoteUrl(k, a).href);
            } catch (_) {}
          } else {
            location.replace(buildCanonicalRemoteUrl(k, a).href);
            return;
          }
        }
      } else {
        var sk = (localStorage.getItem(SK) || sessionStorage.getItem(SK) || "").trim();
        /** App installata: non mostrare /r/... nella barra titolo — chiave solo in memoria. */
        if (sk && standalone) {
          cleanStandaloneUrl();
        }
      }
    } catch (_) {}
    if (isStandalonePwa()) {
      try {
        document.documentElement.classList.add("svc-remote-standalone");
      } catch (_) {}
    }
  })();

    /** Alcuni browser / condivisioni usano ?K= invece di ?k=; la query può anche stare dopo # */
    function extractShareKeyFromLocation() {
      let k = "";
      if (typeof window.__svcRemoteExtractKeyFromUrl === "function") {
        k = window.__svcRemoteExtractKeyFromUrl();
      } else {
        const trySearch = function (search) {
          if (!search) return "";
          const q = search.startsWith("?") ? search.slice(1) : search;
          const p = new URLSearchParams(q);
          return (p.get("k") || p.get("K") || "").trim();
        };
        k = trySearch(location.search);
        if (!k) {
          const href = location.href || "";
          const m = href.match(/[?&#](?:k|K)=([^&#]+)/);
          if (m && m[1]) {
            try {
              k = decodeURIComponent(m[1].replace(/\+/g, " ")).trim();
            } catch (_) {
              k = String(m[1]).trim();
            }
          }
        }
        if (!k && location.hash && location.hash.indexOf("?") !== -1) {
          k = trySearch("?" + location.hash.split("?").slice(1).join("?"));
        }
      }
      if (k) {
        try {
          localStorage.setItem(REMOTE_SHARE_K_KEY, k);
          sessionStorage.setItem(REMOTE_SHARE_K_KEY, k);
        } catch (_) {}
        return k;
      }
      var standalone = typeof window.__svcRemoteIsStandalone === "function" && window.__svcRemoteIsStandalone();
      if (standalone) {
        try {
          k = (localStorage.getItem(REMOTE_SHARE_K_KEY) || sessionStorage.getItem(REMOTE_SHARE_K_KEY) || "").trim();
          if (k) return k;
        } catch (_) {}
      }
      return "";
    }

    function extractAppIdFromLocation() {
      const p = new URLSearchParams(location.search);
      let a = (p.get("app") || p.get("APP") || "").trim();
      if (a) return a;
      const m = (location.href || "").match(/[?&#](?:app|APP)=([^&#]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(m[1]).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      try {
        a = (localStorage.getItem(REMOTE_APP_ID_KEY) || sessionStorage.getItem(REMOTE_APP_ID_KEY) || "").trim();
        if (a) return a;
      } catch (_) {}
      return "stabile-2026-v4";
    }

    const shareKey = extractShareKeyFromLocation();
    const appIdParam = extractAppIdFromLocation();
    if (shareKey) {
      try {
        localStorage.setItem(REMOTE_SHARE_K_KEY, shareKey);
        sessionStorage.setItem(REMOTE_SHARE_K_KEY, shareKey);
        if (appIdParam) {

    /** Solo smartphone stretto — tablet = layout PC identico al desktop. */
    function isDigitalRemotePhone() {
      var ua = navigator.userAgent || "";
      var minVp = Math.min(window.innerWidth || 0, window.innerHeight || 0);
      var maxVp = Math.max(window.innerWidth || 0, window.innerHeight || 0);
      var minSc = Math.min(window.screen.width || 0, window.screen.height || 0);
      var maxSc = Math.max(window.screen.width || 0, window.screen.height || 0);

      if (/iPad|Tablet|PlayBook|Silk|Kindle|SM-T|\bTab\b/i.test(ua)) return false;
      if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) return false;
      if (/iPhone|iPod/i.test(ua)) return true;

      if (/Android/i.test(ua)) {
        if (!/Mobile/i.test(ua)) return false;
        if (minSc >= 600 || maxSc >= 600) return false;
        if (maxVp >= 640) return false;
        try {
          if (window.matchMedia("(min-width: 600px)").matches) return false;
        } catch (_) {}
        return minVp < 520;
      }

      if (minSc >= 600 || maxVp >= 768) return false;
      return minVp < 520;
    }

    /** Tablet touch — layout attuale (2 colonne). Non usare su PC mouse/tastiera. */
    function isDigitalRemoteTablet() {
      if (isDigitalRemotePhone()) return false;
      var ua = navigator.userAgent || "";
      if (/iPad|Tablet|PlayBook|Silk|Kindle|SM-T|\bTab\b/i.test(ua)) return true;
      if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) return true;
      if (/Android/i.test(ua) && !/Mobile/i.test(ua)) return true;
      return false;
    }

    /** Calcola metriche layout desktop-scaled per il display corrente (tablet, laptop, monitor). */
    function computeDigitalLayoutMetrics() {
      var vw = Math.max(window.innerWidth || 0, document.documentElement.clientWidth || 0);
      var vh = Math.max(window.innerHeight || 0, document.documentElement.clientHeight || 0);
      var vmin = Math.min(vw, vh);
      var vmax = Math.max(vw, vh);
      var refW = 1280;
      var scale = Math.min(1, Math.max(0.76, vw / refW));
      if (vmax >= 1500) scale = 1;

      var colMin;
      if (vw >= 1500) colMin = 450;
      else if (vw >= 1100) colMin = Math.round(Math.max(400, vw * 0.36));
      else if (vw >= 820) colMin = Math.round(Math.max(360, vw * 0.44));
      else colMin = Math.round(Math.max(300, vw * 0.46));

      var gridPad = Math.round(12 + scale * 16);
      var cardPx = Math.round(18 + scale * 10);
      var cardPy = Math.round(14 + scale * 6);
      var gap = Math.round(14 + scale * 14);
      var titleFs = Math.round(15 + scale * 4);
      var labelFs = Math.round(16 + scale * 7);
      var valueFs = Math.round(22 + scale * 12);

      var tier = "desktop";
      if (vmin < 700 || vw < 900) tier = "tablet";
      if (vw < 820) tier = "compact";

      return {
        scale: scale,
        colMin: colMin,
        gridPad: gridPad,
        cardPx: cardPx,
        cardPy: cardPy,
        gap: gap,
        titleFs: titleFs,
        labelFs: labelFs,
        valueFs: valueFs,
        tier: tier
      };
    }

    function applyDigitalResponsiveLayout(root) {

      var m = computeDigitalLayoutMetrics();
      root.style.setProperty("--dr-col-min", m.colMin + "px");
      root.style.setProperty("--dr-grid-gap", m.gap + "px");

      root.style.setProperty("--dr-card-px", m.cardPx + "px");
      root.style.setProperty("--dr-card-py", m.cardPy + "px");
      root.style.setProperty("--dr-title-fs", m.titleFs + "px");
      root.style.setProperty("--dr-label-fs", m.labelFs + "px");

      root.style.setProperty("overflow-x", "hidden", "important");

      var scroll = root.querySelector("#digital-preview-scroll");

      var grid = root.querySelector("#digital-cards-grid");
      if (grid) {
        grid.style.setProperty("display", "grid", "important");
        grid.style.setProperty("grid-template-columns", "repeat(auto-fit, minmax(" + m.colMin + "px, 1fr))", "important");
        grid.style.setProperty("gap", m.gap + "px", "important");
        grid.style.setProperty("padding", m.gridPad + "px", "important");
        grid.style.setProperty("overflow-x", "hidden", "important");
        grid.style.setProperty("width", "100%", "important");

      }

      root.querySelectorAll(".digital-card-surface").forEach(function (el) {
        el.style.setProperty("padding", m.cardPy + "px " + m.cardPx + "px " + (m.cardPy - 2) + "px", "important");

        el.style.setProperty("max-width", "100%", "important");
        el.style.setProperty("box-sizing", "border-box", "important");

        el.style.setProperty("line-height", "1.45", "important");
        el.style.setProperty("overflow", "visible", "important");
        el.style.setProperty("text-align", "left", "important");
      });
      root.querySelectorAll(".digital-row-label:not(.digital-stocc-sigla)").forEach(function (el) {
        el.style.setProperty("font-size", m.labelFs + "px", "important");
        el.style.setProperty("padding-left", "3px", "important");
      });
      root.querySelectorAll(".digital-row-value:not(.digital-stocc-value)").forEach(function (el) {
        if (el.classList.contains("digital-row-value--text")) {

        } else {
          el.style.setProperty("font-size", m.valueFs + "px", "important");
        }
      });
      fixStoccaggioCardLayout(root);
      applyRemoteLayoutPrefs(root);
    }

    function getDefaultLayoutPrefs() {
      return {
        contenitoreV: 0,
        contenitoreH: 0,
        contenitoreB: 0,
        titoli: 0,
        sigle: 0,
        valori: 0,
        valoriH: 0,
        colonne: 2
      };
    }

    function cloneLayoutPrefs(p) {
      var out = getDefaultLayoutPrefs();
      SRL_LAYOUT_KEYS.forEach(function (k) {
        if (p && typeof p[k] === "number" && !isNaN(p[k])) out[k] = p[k];
      });
      return out;
    }

    function clampLayoutPrefs(p) {
      var out = cloneLayoutPrefs(p || {});
      SRL_LAYOUT_KEYS.forEach(function (k) {
        var lim = SRL_LAYOUT_LIMITS[k];
        if (lim) out[k] = Math.max(lim.min, Math.min(lim.max, out[k]));
      });
      return out;
    }

    function applyFlatLayoutPrefs(src, dest) {
      if (!src || !dest) return;
      if (typeof src.contenitore === "number" && src.contenitoreV == null) {
        dest.contenitoreV = src.contenitore;
      }
      SRL_LAYOUT_KEYS.forEach(function (k) {
        if (typeof src[k] === "number" && !isNaN(src[k])) dest[k] = src[k];
      });
    }

    function loadRemoteLayoutStore() {
      var store = {
        global: getDefaultLayoutPrefs(),
        modules: {},
        selectedTarget: SRL_LAYOUT_TARGET_ALL
      };
      try {
        var raw = localStorage.getItem(SRL_LAYOUT_STORAGE_KEY);
        if (!raw) {
          raw = localStorage.getItem("svc_remote_layout_prefs_v2");
          if (!raw) raw = localStorage.getItem("svc_remote_layout_prefs_v1");
        }
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && parsed.global) {
            applyFlatLayoutPrefs(parsed.global, store.global);
            store.modules = parsed.modules && typeof parsed.modules === "object" ? parsed.modules : {};
            if (parsed.selectedTarget) store.selectedTarget = String(parsed.selectedTarget);
          } else {
            applyFlatLayoutPrefs(parsed, store.global);
          }
        }
      } catch (_) {}
      store.global = clampLayoutPrefs(store.global);
      Object.keys(store.modules).forEach(function (k) {
        store.modules[k] = clampLayoutPrefs(store.modules[k]);
      });
      if (!store.selectedTarget) store.selectedTarget = SRL_LAYOUT_TARGET_ALL;
      return store;
    }

    function saveRemoteLayoutStore(store) {
      store.selectedTarget = __srlLayoutTarget || store.selectedTarget || SRL_LAYOUT_TARGET_ALL;
      try {
        localStorage.setItem(SRL_LAYOUT_STORAGE_KEY, JSON.stringify(store));
      } catch (_) {}
    }

    function loadRemoteLayoutPrefs() {
      return loadRemoteLayoutStore().global;
    }

    function getEffectiveModulePrefs(store, moduleId) {
      if (store.modules && store.modules[moduleId]) {
        return clampLayoutPrefs(store.modules[moduleId]);
      }
      return store.global;
    }

    function collectRemoteModules(root) {
      var seen = {};
      var out = [];
      if (!root) return out;
      root.querySelectorAll(".digital-card[data-module-id]").forEach(function (card) {
        var id = card.getAttribute("data-module-id");
        if (!id || seen[id]) return;
        seen[id] = true;
        var titleEl = card.querySelector(".digital-card-title");
        var title = titleEl ? String(titleEl.textContent || "").replace(/\s+/g, " ").trim() : "";
        out.push({ id: id, title: title || id });
      });
      return out;
    }

    function getRemoteLayoutTargetLabel(target) {
      if (target === SRL_LAYOUT_TARGET_ALL) return "Tutti";
      var root = document.getElementById("digital-preview-container");
      if (root) {
        var card = root.querySelector('.digital-card[data-module-id="' + target + '"]');
        if (card) {
          var t = card.querySelector(".digital-card-title");
          if (t) return String(t.textContent || "").replace(/\s+/g, " ").trim() || target;
        }
      }
      return target;
    }

    function updateRemoteLayoutTargetUI() {
      var colonneRow = document.querySelector(".srl-layout-row--colonne");
      var isAll = __srlLayoutTarget === SRL_LAYOUT_TARGET_ALL;

      var currentEl = document.getElementById("srl-layout-target-current");
      if (currentEl) currentEl.textContent = getRemoteLayoutTargetLabel(__srlLayoutTarget);
    }

    function setRemoteLayoutTarget(target) {
      __srlLayoutTarget = target || SRL_LAYOUT_TARGET_ALL;
      var store = loadRemoteLayoutStore();
      store.selectedTarget = __srlLayoutTarget;
      saveRemoteLayoutStore(store);
      updateRemoteLayoutTargetUI();
      var listEl = document.getElementById("srl-layout-target-list");
      if (listEl) {
        listEl.querySelectorAll(".srl-layout-target-item").forEach(function (btn) {
          btn.classList.toggle("is-active", btn.getAttribute("data-srl-target") === __srlLayoutTarget);
        });

    }

    function refreshRemoteLayoutTargetList(root) {
      root = root || document.getElementById("digital-preview-container");
      var listEl = document.getElementById("srl-layout-target-list");
      if (!listEl) return;
      var modules = collectRemoteModules(root);
      var html =
        '<button type="button" class="srl-layout-target-item' +
        (__srlLayoutTarget === SRL_LAYOUT_TARGET_ALL ? " is-active" : "") +

          '" data-srl-target="' +

      });
      listEl.innerHTML = html;

    function updateRemoteColonneLabel() {
      var el = document.getElementById("srl-colonne-value");
      if (!el) return;
      var n = loadRemoteLayoutPrefs().colonne;
      el.textContent = n === 1 ? "1 colonna" : n + " colonne";
    }

    function calcLayoutMetrics(p) {
      var basePy = 14;
      var basePx = 16;
      var baseTitle = 17;
      var baseSigla = 20;
      var baseValue = 28;
      var py = basePy + (p.contenitoreV || 0) * 4;
      var px = Math.max(0, basePx + (p.contenitoreH || 0) * 4);
      var rowPadY = 7 + (p.contenitoreV || 0) * 2;
      var titleFs = baseTitle + (p.titoli || 0) * 2;
      var siglaFs = baseSigla + (p.sigle || 0) * 2;
      var valueFs = baseValue + (p.valori || 0) * 3;
      return {
        py: py,
        px: px,
        rowPadY: rowPadY,
        titleFs: titleFs,
        siglaFs: siglaFs,
        valueFs: valueFs,
        valueTextFs: Math.round(valueFs * 0.72),
        valueShiftPx: (p.valoriH || 0) * 4,
        bordoPct: Math.max(50, Math.min(100, 100 + (p.contenitoreB || 0) * 4))
      };
    }

    function applyLayoutPrefsToCard(card, p) {
      if (!card || !p) return;
      var m = calcLayoutMetrics(p);
      card.querySelectorAll(".digital-card-surface").forEach(function (el) {
        el.style.setProperty("padding", m.py + "px " + m.px + "px " + Math.max(8, m.py - 2) + "px", "important");
      });
      card.querySelectorAll(".digital-card-title").forEach(function (el) {
        el.style.setProperty("font-size", m.titleFs + "px", "important");
      });
      card.querySelectorAll(".digital-row-label, .digital-stocc-sigla").forEach(function (el) {
        el.style.setProperty("font-size", m.siglaFs + "px", "important");
      });
      card.querySelectorAll(".digital-row-value, .digital-stocc-value").forEach(function (el) {
        var fs = el.classList.contains("digital-row-value--text") ? m.valueTextFs : m.valueFs;
        el.style.setProperty("font-size", fs + "px", "important");
        if (m.valueShiftPx) {
          el.style.setProperty("transform", "translateX(" + m.valueShiftPx + "px)", "important");
        } else {
          el.style.removeProperty("transform");
        }
      });
      card.querySelectorAll(".digital-row").forEach(function (el) {
        el.style.setProperty("padding-top", m.rowPadY + "px", "important");
        el.style.setProperty("padding-bottom", m.rowPadY + "px", "important");
      });
      card.querySelectorAll(".digital-stocc-row").forEach(function (el) {
        el.style.setProperty("padding-top", m.rowPadY + "px", "important");
        el.style.setProperty("padding-bottom", m.rowPadY + "px", "important");
      });
      card.querySelectorAll(".digital-card-surface").forEach(function (el) {
        if (!p.contenitoreB) {
          el.style.removeProperty("--srl-bordo-pct");
          el.style.removeProperty("width");
          el.style.removeProperty("max-width");
          el.style.removeProperty("margin-left");
          el.style.removeProperty("margin-right");
          el.style.removeProperty("overflow");
          el.style.removeProperty("border-radius");
        } else {
          el.style.setProperty("--srl-bordo-pct", m.bordoPct + "%");
          el.style.setProperty("width", m.bordoPct + "%", "important");
          el.style.setProperty("max-width", m.bordoPct + "%", "important");
          el.style.setProperty("margin-left", "auto", "important");
          el.style.setProperty("margin-right", "auto", "important");
          el.style.setProperty("border-radius", "16px", "important");
          el.style.setProperty("overflow", "hidden", "important");
        }
      });
      if (!p.contenitoreB) {
        card.classList.remove("srl-bordo-active");
        card.style.removeProperty("--srl-bordo-pct");
        card.style.removeProperty("max-width");
        card.style.removeProperty("width");
        card.style.removeProperty("margin-left");
        card.style.removeProperty("margin-right");
        card.style.removeProperty("justify-self");
        card.style.removeProperty("overflow");
      } else {
        card.classList.add("srl-bordo-active");
        card.style.setProperty("--srl-bordo-pct", m.bordoPct + "%");
        card.style.removeProperty("width");
        card.style.removeProperty("max-width");
        card.style.removeProperty("margin-left");
        card.style.removeProperty("margin-right");
        card.style.removeProperty("overflow");
        card.style.setProperty("justify-self", "center", "important");
      }
    }

    function applyRemoteLayoutPrefs(root) {
      root = root || document.getElementById("digital-preview-container");
      if (!root) return;
      var store = loadRemoteLayoutStore();
      var globalP = store.global;
      var gm = calcLayoutMetrics(globalP);
      root.style.setProperty("--srl-container-py", gm.py + "px");
      root.style.setProperty("--srl-container-px", gm.px + "px");
      root.style.setProperty("--srl-row-pad-y", gm.rowPadY + "px");
      root.style.setProperty("--srl-title-fs", gm.titleFs + "px");
      root.style.setProperty("--srl-sigla-fs", gm.siglaFs + "px");
      root.style.setProperty("--srl-value-fs", gm.valueFs + "px");
      root.classList.add("srl-layout-custom");
      root.querySelectorAll(".digital-card[data-module-id]").forEach(function (card) {
        var moduleId = card.getAttribute("data-module-id");
        applyLayoutPrefsToCard(card, getEffectiveModulePrefs(store, moduleId));
      });
      root.querySelectorAll(".digital-card:not([data-module-id])").forEach(function (card) {
        applyLayoutPrefsToCard(card, globalP);
      });
      applyRemoteGridColumns(root, globalP);
      updateRemoteColonneLabel();
      if (__srlLayoutEditorOpen) refreshRemoteLayoutTargetList(root);
    }

    function applyRemoteGridColumns(root, p) {
      if (!root) return;
      var grid = root.querySelector("#digital-cards-grid");
      if (!grid) return;
      if (root.classList.contains("digital-phone-layout")) {
        grid.style.setProperty("grid-template-columns", "none", "important");
        return;
      }
      var n = Math.max(1, Math.min(4, (p && p.colonne) || 2));
      var colMin = 280;
      if (n >= 3) colMin = 240;
      if (n >= 4) colMin = 200;
      grid.style.setProperty(
        "grid-template-columns",
        "repeat(" + n + ", minmax(" + colMin + "px, 1fr))",
        "important"
      );
      grid.style.setProperty("display", "grid", "important");
    }

    function bumpRemoteLayoutPref(key, delta) {
      if (!SRL_LAYOUT_KEYS.includes(key)) return;
      var store = loadRemoteLayoutStore();
      var target = __srlLayoutTarget || store.selectedTarget || SRL_LAYOUT_TARGET_ALL;
      if (key === "colonne" && target !== SRL_LAYOUT_TARGET_ALL) return;
      var prefs;
      if (target === SRL_LAYOUT_TARGET_ALL) {
        prefs = store.global;
      } else {
        if (!store.modules[target]) store.modules[target] = cloneLayoutPrefs(store.global);
        prefs = store.modules[target];
      }
      var lim = SRL_LAYOUT_LIMITS[key];
      prefs[key] = Math.max(lim.min, Math.min(lim.max, (prefs[key] || 0) + delta));
      saveRemoteLayoutStore(store);
      applyRemoteLayoutPrefs();
    }

    function positionRemoteSettingsPanel() {
      var gear = document.getElementById("btn-remote-settings");
      var panel = document.getElementById("srl-settings-panel");
      if (!gear || !panel) return;
      var r = gear.getBoundingClientRect();
      var panelW = panel.offsetWidth || 260;
      var top = r.bottom + 8;
      var left = r.right - panelW;
      if (left < 8) left = 8;
      if (left + panelW > window.innerWidth - 8) {
        left = Math.max(8, window.innerWidth - panelW - 8);
      }
      if (top + 120 > window.innerHeight - 8) {
        top = Math.max(8, r.top - 8 - (panel.offsetHeight || 180));
      }
      panel.style.top = top + "px";
      panel.style.left = left + "px";
      panel.style.right = "auto";
    }

    function setRemoteSettingsOpen(open) {
      __srlSettingsPanelOpen = !!open;
      if (!open) __srlLayoutEditorOpen = false;
      var panel = document.getElementById("srl-settings-panel");
      var backdrop = document.getElementById("srl-settings-backdrop");
      var editor = document.getElementById("srl-layout-editor");
      if (panel) {
        panel.classList.toggle("is-open", __srlSettingsPanelOpen);
        if (__srlSettingsPanelOpen) {
          positionRemoteSettingsPanel();
        }
      }
      if (backdrop) {
        backdrop.classList.toggle("is-open", __srlSettingsPanelOpen);
        backdrop.setAttribute("aria-hidden", __srlSettingsPanelOpen ? "false" : "true");
      }
      if (editor) editor.style.display = __srlLayoutEditorOpen ? "block" : "none";
    }

    function restoreRemoteSettingsPanelState() {
      setRemoteSettingsOpen(__srlSettingsPanelOpen);
    }

    function wireRemoteSettingsUI() {
      var gear = document.getElementById("btn-remote-settings");
      var panel = document.getElementById("srl-settings-panel");
      var editBtn = document.getElementById("srl-layout-edit-btn");
      var editor = document.getElementById("srl-layout-editor");
      if (!gear || !panel) return;

      var store = loadRemoteLayoutStore();
      __srlLayoutTarget = store.selectedTarget || SRL_LAYOUT_TARGET_ALL;

      restoreRemoteSettingsPanelState();
      updateRemoteLayoutTargetUI();

      gear.onclick = function (e) {
        e.stopPropagation();
        setRemoteSettingsOpen(!__srlSettingsPanelOpen);
      };

      if (editBtn && editor) {
        editBtn.onclick = function (e) {
          e.stopPropagation();
          __srlLayoutEditorOpen = !__srlLayoutEditorOpen;
          editor.style.display = __srlLayoutEditorOpen ? "block" : "none";
          if (__srlLayoutEditorOpen) {
            refreshRemoteLayoutTargetList();
            updateRemoteLayoutTargetUI();
          }
          if (__srlSettingsPanelOpen) {
            requestAnimationFrame(function () {
              positionRemoteSettingsPanel();
            });
          }
        };
      }

      var targetToggle = document.getElementById("srl-layout-target-toggle");
      if (targetToggle) {
        targetToggle.onclick = function (e) {
          e.stopPropagation();
          var list = document.getElementById("srl-layout-target-list");
          if (!list) return;
          var open = list.style.display !== "none";
          list.style.display = open ? "none" : "block";
          targetToggle.setAttribute("aria-expanded", open ? "false" : "true");
          if (!open) refreshRemoteLayoutTargetList();
          if (__srlSettingsPanelOpen) {
            requestAnimationFrame(function () {
              positionRemoteSettingsPanel();
            });
          }
        };
      }

      panel.querySelectorAll("[data-srl-key][data-srl-dir]").forEach(function (btn) {
        btn.onclick = function (e) {
          e.stopPropagation();
          var key = btn.getAttribute("data-srl-key");
          var dir = parseInt(btn.getAttribute("data-srl-dir"), 10);
          if (!key || !dir) return;
          bumpRemoteLayoutPref(key, dir);
        };
      });
      updateRemoteColonneLabel();
    }

    if (!window.__srlSettingsOutsideClickBound) {
      window.__srlSettingsOutsideClickBound = true;
      document.addEventListener("click", function (e) {
        if (!__srlSettingsPanelOpen) return;
        var panel = document.getElementById("srl-settings-panel");
        var gear = document.getElementById("btn-remote-settings");
        var t = e.target;
        if (panel && panel.contains(t)) return;
        if (gear && gear.contains(t)) return;
        setRemoteSettingsOpen(false);
      });
      window.addEventListener("resize", function () {
        if (__srlSettingsPanelOpen) positionRemoteSettingsPanel();
      });
      window.addEventListener("orientationchange", function () {
        setTimeout(function () {
          if (__srlSettingsPanelOpen) positionRemoteSettingsPanel();
        }, 200);
      });
    }

    window.closeDigitalModuleFocus = function () {
      const root = document.getElementById("digital-preview-container");

    function getStoccaggioTankFillPct(tankDbKey, levelRaw, fillPct) {
      if (fillPct != null && !isNaN(Number(fillPct))) {

      }
      const mm = parseFloat(String(levelRaw == null ? "" : levelRaw).replace(",", "."));
      if (isNaN(mm) || mm < 0) return 0;
      return Math.max(0, Math.min(100, (mm / 10000) * 100));

    function buildDigitalTankGaugeSVG(fillPct) {
      const pct = Math.max(0, Math.min(100, Number(fillPct) || 0));
      const uid = "dtk" + Math.random().toString(36).slice(2, 9);
      const bodyH = 56;
      const fillH = Math.max(0, (pct / 100) * bodyH);
      const fillY = 8 + bodyH - fillH;
      return (
        '<svg class="digital-tank-gauge" viewBox="0 0 52 80" width="52" height="80" aria-hidden="true" focusable="false">' +
        "<defs>" +
        '<clipPath id="' + uid + 'c"><rect x="8" y="8" width="36" height="' + bodyH + '" rx="7"/></clipPath>' +
        '<linearGradient id="' + uid + 'g" x1="0" y1="1" x2="0.15" y2="0">' +
        '<stop offset="0%" stop-color="#0369a1"/><stop offset="55%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#7dd3fc"/></linearGradient>' +
        '<filter id="' + uid + 's"><feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0ea5e9" flood-opacity="0.35"/></filter>' +
        "</defs>" +
        '<ellipse cx="26" cy="10" rx="17" ry="5" fill="rgba(148,163,184,0.22)" stroke="rgba(148,163,184,0.35)" stroke-width="1"/>' +
        '<rect x="8" y="8" width="36" height="' + bodyH + '" rx="7" fill="rgba(15,23,42,0.65)" stroke="rgba(148,163,184,0.5)" stroke-width="1.5"/>' +
        '<g clip-path="url(#' + uid + 'c)">' +
        '<rect x="8" y="' + fillY + '" width="36" height="' + fillH + '" fill="url(#' + uid + 'g)" filter="url(#' + uid + 's)"/>' +
        '<rect x="8" y="' + fillY + '" width="36" height="3" fill="rgba(255,255,255,0.22)"/>' +
        "</g>" +
        '<ellipse cx="26" cy="' + (8 + bodyH) + '" rx="17" ry="4.5" fill="rgba(15,23,42,0.55)" stroke="rgba(148,163,184,0.35)" stroke-width="1"/>' +
        '<text x="26" y="74" text-anchor="middle" fill="#cbd5e1" font-size="8" font-weight="800" font-family="system-ui,sans-serif">' +
        Math.round(pct) +

      try {

    /** Ultimo report sul cloud: prima __latest, poi scan collection. */
    async function fetchLatestPublicDigital(appId) {
      const db = initRemoteDb("digital-remote-bootstrap");
      try {
        const latestSnap = await getDocFromServer(
          doc(db, "artifacts", appId, "publicDigital", "__latest")
        );
        if (latestSnap.exists()) {
          const sk = String((latestSnap.data() || {}).shareKey || "").trim();
          if (sk) {
            const dataSnap = await getDocFromServer(
              doc(db, "artifacts", appId, "publicDigital", sk)
            );
            if (dataSnap.exists()) {
              const d = dataSnap.data() || {};
              if (String(d.cardsHTML || "").trim().length >= 40) {
                return { shareKey: sk, data: d };
              }
            }
          }
        }
      } catch (err) {
        console.warn("[SvcRemote] read __latest:", err && err.message);
      }
      try {
        const snap = await getDocsFromServer(collection(db, "artifacts", appId, "publicDigital"));
        let best = null;
        snap.forEach(function (docSnap) {
          if (docSnap.id === "__latest") return;
          const d = docSnap.data() || {};
          const html = String(d.cardsHTML || "");
          if (html.length < 40) return;
          if (!best || String(d.updatedAt || "") > String(best.data.updatedAt || "")) {
            best = { shareKey: docSnap.id, data: d };
          }
        });
        return best;
      } catch (err) {
        console.warn("[SvcRemote] scan publicDigital:", err && err.message);
        return null;
      }
    }

    async function fetchLatestShareKeyFromCloud(appId) {
      const hit = await fetchLatestPublicDigital(appId);
      return hit && hit.shareKey ? String(hit.shareKey).trim() : "";
    }

    async function remoteBootstrap() {
      let activeKey = shareKey;
      let preloaded = null;

      rootEl.innerHTML = buildLoadingShell("Caricamento Digital Report…");

      /** Sempre __latest dal cloud: tablet PWA non deve restare su chiave locale vecchia. */
      const latest = await fetchLatestPublicDigital(appIdParam);
      if (latest && latest.shareKey && latest.data && String(latest.data.cardsHTML || "").trim().length >= 40) {
        activeKey = latest.shareKey;
        preloaded = latest.data;
        try {
          localStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
          sessionStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
          localStorage.setItem(REMOTE_APP_ID_KEY, appIdParam);
        } catch (_) {}
        try {
          if (!shareKey || shareKey !== activeKey) {
            history.replaceState(null, "", buildCanonicalRemoteUrl(activeKey, appIdParam).href);
          }
        } catch (_) {}
      } else if (activeKey) {
        try {
          const db = initRemoteDb("digital-remote-bootstrap-key");
          const snap = await getDocFromServer(
            doc(db, "artifacts", appIdParam, "publicDigital", activeKey)
          );
          if (snap.exists()) {
            const d = snap.data() || {};
            if (String(d.cardsHTML || "").trim().length >= 40) preloaded = d;
          }
        } catch (err) {
          console.warn("[SvcRemote] bootstrap fallback key:", err && err.message);
        }
      }

      if (!activeKey || !preloaded) {
        if (!latest && !activeKey) {
          rootEl.innerHTML = buildErrorShell(
            "<strong>Report non ancora pubblicato.</strong><p style=\"margin:12px 0 0;color:#fecaca;\">Da ServiceHub: apri Digital Report HD (con le card), poi LINK REMOTO.</p>" +
            "<p style=\"margin:10px 0 0;color:#fde047;font-size:12px;\">Su tablet/WhatsApp: tocca <strong>Apri link</strong> (non restare nell'anteprima).</p>"
          );
        } else {
          rootEl.innerHTML = buildErrorShell(
            "<strong>Report non trovato.</strong><p style=\"margin:12px 0 0;color:#fecaca;\">Ripeti LINK REMOTO da ServiceHub con il Digital Report aperto.</p>" +
            "<p style=\"margin:10px 0 0;color:#fde047;font-size:12px;\">Verifica che il link contenga <code>/r/</code> e un codice lungo.</p>"
          );
        }
        return;
      }

      (async function initRemoteDigital() {
        const isStandaloneApp =
          typeof window.__svcRemoteIsStandalone === "function" && window.__svcRemoteIsStandalone();
        let __remoteAutoRetryCount = 0;
        const MAX_AUTO_RETRY = 20;

        let app;
        try {
          app = getApp("digital-remote-viewer");
        } catch (_) {
          app = initializeApp(DEFAULT_FIREBASE_CONFIG, "digital-remote-viewer");
        }
        const db = (function initRemoteFirestore() {
          try {
            return initializeFirestore(app, {
              localCache: memoryLocalCache(),
              experimentalForceLongPolling: true
            });
          } catch (err) {
            console.warn("[Digital remoto] Firestore init:", err && err.message);
            return getFirestore(app);
          }
        })();
        prefRef = doc(db, "artifacts", appIdParam, "publicDigital", activeKey);

        function wireRetryFetchButton() {
          const retryBtn = document.getElementById("svc-remote-retry-fetch");
          if (!retryBtn) return;
          retryBtn.addEventListener("click", function () {
            retryBtn.disabled = true;
            retryBtn.textContent = "…";
            pullLatestFromCloud({ fullRefresh: true, userInitiated: true }).finally(function () {
              retryBtn.disabled = false;
              retryBtn.textContent = "Riprova";
            });
          });
        }

        /**
         * Legge l ultimo Digital Report pubblicato sul cloud (scan + chiave corrente).
         * @param {{ fullRefresh?: boolean, userInitiated?: boolean }} opts
         */
        async function pullLatestFromCloud(opts) {
          const o = opts || {};
          const forceFull = o.fullRefresh !== false;
          const userInitiated = !!o.userInitiated;
          clearRemoteSnapshotDebounce();

          let hit = await fetchLatestPublicDigital(appIdParam);

          if ((!hit || !hit.data) && prefRef) {
            try {
              const snap = await getDocFromServer(prefRef);
              if (snap.exists()) {
                const d = snap.data();
                if (String(d.cardsHTML || "").trim().length >= 40) {
                  hit = { shareKey: activeKey, data: d };
                }
              }
            } catch (err) {
              console.warn("[SvcRemote] pullLatest prefRef:", err && err.message);
            }
          }

          if (!hit || !hit.data || String(hit.data.cardsHTML || "").trim().length < 40) {
            if (!userInitiated && __remoteAutoRetryCount < MAX_AUTO_RETRY) {
              __remoteAutoRetryCount++;
              rootEl.innerHTML = buildLoadingShell(
                "Sincronizzazione cloud… (" + __remoteAutoRetryCount + "/" + MAX_AUTO_RETRY + ")"
              );
              await new Promise(function (resolve) {
                setTimeout(resolve, 1500);
              });
              return pullLatestFromCloud(opts);
            }
            __lastDigitalRemoteSig = "";
            __lastRenderedUpdatedAt = "";
            if (userInitiated) {
              updateRemoteSyncStatus();
              rootEl.innerHTML = buildErrorShell(
                "<strong>Nessun report sul cloud.</strong>" +
                  '<p style="margin:12px 0 0;color:#fecaca;">Da ServiceHub: Digital Report → <strong>AGGIORNA</strong> o <strong>LINK REMOTO</strong> (LED verde).</p>' +
                  '<button type="button" id="svc-remote-retry-fetch" style="cursor:pointer;margin-top:14px;padding:10px 16px;border-radius:10px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-weight:800;font-size:13px;">Riprova</button>'
              );
              wireButtons();
              wireRetryFetchButton();
            }
            return { ok: false, reason: "missing" };
          }

          const incomingSig = digitalRemoteSig(hit.data);
          const unchangedOnScreen = !!(__lastDigitalRemoteSig && incomingSig === __lastDigitalRemoteSig);

          if (hit.shareKey !== activeKey) {
            activeKey = hit.shareKey;
            prefRef = doc(db, "artifacts", appIdParam, "publicDigital", activeKey);
            try {
              localStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
              sessionStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
            } catch (_) {}
            if (typeof bindCloudPushListener === "function") bindCloudPushListener();
          }

          var curGridBefore = rootEl.querySelector("#digital-cards-grid");
          var curCardCount = curGridBefore ? curGridBefore.querySelectorAll(".digital-card[data-module-id]").length : 0;
          var newCardCount = countDigitalCards(hit.data.cardsHTML);
          if (userInitiated && curCardCount > 0 && newCardCount > 0 && newCardCount < curCardCount - 1) {
            console.warn("[SvcRemote] AGGIORNA: cloud incompleto (" + newCardCount + " moduli vs " + curCardCount + " a schermo)");
            return { ok: false, reason: "incomplete-cloud", updatedAt: hit.data.updatedAt };
          }

          if (!userInitiated && unchangedOnScreen) {
            return { ok: true, reason: "stale-skipped" };
          }

          __lastDigitalRemoteSig = "";
          renderFromData(hit.data, { fullRefresh: forceFull || userInitiated });
          markRemotePayloadRendered(hit.data);
          __lastDigitalRemoteSig = digitalRemoteSig(hit.data);
          wireButtons();
          bindCardZoomOnce();
          applyDigitalPhoneLayoutIfNeeded(document.getElementById("digital-preview-container"));

          var when = hit.data.updatedAt
            ? new Date(hit.data.updatedAt).toLocaleString("it-IT")
            : "—";
          if (userInitiated && unchangedOnScreen) {
            updateRemoteSyncStatus();
            return { ok: true, reason: "unchanged", updatedAt: hit.data.updatedAt };
          }
          updateRemoteSyncStatus();
          return { ok: true, reason: "rendered", updatedAt: hit.data.updatedAt };
        }

        async function fetchAndRenderPublicDigital(opts) {
          return pullLatestFromCloud(opts || {});
        }

        refreshHandler = async function () {
          if (__remoteRefreshInFlight) return;
          const btn = document.getElementById("btn-remote-refresh");
          if (btn) {
            btn.disabled = true;
            btn.textContent = "…";
          }
          __remoteRefreshInFlight = true;
          try {
            const result = await pullLatestFromCloud({
              fullRefresh: true,
              userInitiated: true
            });
            if (btn && result && result.ok) {
              btn.textContent = result.reason === "unchanged" ? "OK ✓" : "OK";
              setTimeout(function () {
                if (btn) btn.textContent = "AGGIORNA";
              }, 1100);
            } else if (btn && result && result.reason === "incomplete-cloud") {
              btn.textContent = "!";
              setTimeout(function () {
                if (btn) btn.textContent = "AGGIORNA";
              }, 1800);
            }
          } catch (err) {
            __lastDigitalRemoteSig = "";
            updateRemoteSyncStatus();
            rootEl.innerHTML = buildErrorShell(
              "Aggiornamento non riuscito: " +
                esc(err && err.message) +
                ". Controlla la connessione e riprova."
            );
            wireButtons();
          } finally {
            __remoteRefreshInFlight = false;
            const b = document.getElementById("btn-remote-refresh");
            if (b) {
              b.disabled = false;
              if (b.textContent === "…") b.textContent = "AGGIORNA";
            }
          }
        };

        function countDigitalCards(html) {
          return (String(html || "").match(/data-module-id="/g) || []).length;
        }

        let unsubPrefSnapshot = null;
        let __prefSnapServerTimer = null;

        function applyRemoteCloudPayload(d) {
          if (__remoteRefreshInFlight) return;
          if (!d || String(d.cardsHTML || "").trim().length < 40) return;
          var root = document.getElementById("digital-preview-container");
          if (root && root.classList.contains("digital-focus-active")) return;
          var sig = digitalRemoteSig(d);
          if (sig === __lastDigitalRemoteSig) return;
          renderFromData(d, { fullRefresh: false });
          markRemotePayloadRendered(d);
          __lastDigitalRemoteSig = sig;
          wireButtons();
          bindCardZoomOnce();
          applyDigitalPhoneLayoutIfNeeded(root);
        }

        function bindCloudPushListener() {
          if (typeof unsubPrefSnapshot === "function") {
            try {
              unsubPrefSnapshot();
            } catch (_) {}
          }
          if (__prefSnapServerTimer) {
            clearTimeout(__prefSnapServerTimer);
            __prefSnapServerTimer = null;
          }
          unsubPrefSnapshot = onSnapshot(
            prefRef,
            function () {
              if (__prefSnapServerTimer) clearTimeout(__prefSnapServerTimer);
              __prefSnapServerTimer = setTimeout(function () {
                __prefSnapServerTimer = null;
                if (!prefRef) return;
                getDocFromServer(prefRef)
                  .then(function (srv) {
                    if (srv.exists()) applyRemoteCloudPayload(srv.data() || {});
                  })
                  .catch(function () {
                    getDoc(prefRef)
                      .then(function (loc) {
                        if (loc.exists()) applyRemoteCloudPayload(loc.data() || {});
                      })
                      .catch(function () {});
                  });
              }, 60);
            },
            function (err) {
              console.warn("[SvcRemote] cloud listener:", err && err.message);
            }
          );
        }

        /** Caricamento iniziale + AGGIORNA manuale + sync quando ServiceHub pubblica sul cloud. */
        await pullLatestFromCloud({ fullRefresh: true, userInitiated: false }).catch(function () {});

        bindCloudPushListener();

        var latestPtrRef = doc(db, "artifacts", appIdParam, "publicDigital", "__latest");
        onSnapshot(
          latestPtrRef,
          function (snap) {
            if (__remoteRefreshInFlight || !snap.exists()) return;
            var root = document.getElementById("digital-preview-container");
            if (root && root.classList.contains("digital-focus-active")) return;
            var sk = String((snap.data() || {}).shareKey || "").trim();
            if (sk && sk !== activeKey) {
              activeKey = sk;
              prefRef = doc(db, "artifacts", appIdParam, "publicDigital", activeKey);
              try {
                localStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
                sessionStorage.setItem(REMOTE_SHARE_K_KEY, activeKey);
              } catch (_) {}
              bindCloudPushListener();
            }
            pullLatestFromCloud({ fullRefresh: false, userInitiated: false }).catch(function () {});
          },
          function (err) {
            console.warn("[SvcRemote] __latest listener:", err && err.message);
          }
        );
      })();
    }

    remoteBootstrap();
  </script>
  <script src="install-help.js?v=v23"></script>
  <script>
    if (window.__svcRemoteInstallHelp && !window.__svcRemoteExtractKeyFromUrl()) {
      var onInstall = /\/install\.html$/i.test(String(location.pathname || ""));
      if (onInstall) window.__svcRemoteInstallHelp.init({ timeoutMs: 2200 });
    }
  </script>
</body>
