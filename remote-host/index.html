  <script>
  (function () {
    var SK = "servicehub_remote_share_k";
    var SA = "servicehub_remote_app_id";
    var FB_ORIGIN = "https://servicehub-18309.web.app";
    window.SVCREMOTE_BUILD = "2026.06.08-pc";

    /** Da GitHub Pages → Firebase (dominio separato da ServiceHub operatore). */
    (function redirectGithubToFirebase() {
      var host = (location.hostname || "").toLowerCase();
      if (host.indexOf("github.io") === -1 && host.indexOf("github.dev") === -1) return;
      var rMatch = (location.pathname || "").match(/\/r\/[^/?#]+/i);
      var path = rMatch ? rMatch[0] : "/";
      location.replace(FB_ORIGIN + path + (location.search || "") + (location.hash || ""));
    })();

    function isStandalonePwa() {
      try {
        return (
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true
        );
      } catch (_) {
        return false;
      }
    }

    /** Chiave nel path /r/CHIAVE (meglio per condivisione web: WhatsApp non taglia il path). */
    function extractKeyFromPathname(pathname) {
      var p = String(pathname || location.pathname || "");
      var m = p.match(/\/r\/([^/?#]+)/i);
      if (m && m[1]) {
        try {
          return decodeURIComponent(String(m[1]).replace(/\+/g, " ")).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      return "";
    }

    function buildCanonicalRemoteUrl(k, a) {
      var u = new URL(location.origin + "/r/" + encodeURIComponent(k));
      if (a) u.searchParams.set("app", a);
      return u;
    }

    /** Chiave da qualsiasi URL (/r/KEY, ?k=, &k=, #...?k=, anche K maiuscolo). */
    function extractKeyFromHref(href) {
      var search = "";
      var hash = "";
      var pathname = "";
      var full = String(href || location.href || "");
      try {
        var u = new URL(full.indexOf("://") > -1 ? full : "https://local.invalid/" + full.replace(/^\//, ""));
        search = u.search;
        hash = u.hash;
        pathname = u.pathname;
        full = u.href;
      } catch (_) {}
      var fromPath = extractKeyFromPathname(pathname);
      if (fromPath) return fromPath;
      function trySearch(qs) {
        if (!qs) return "";
        var q = qs.charAt(0) === "?" ? qs.slice(1) : qs;
        var p = new URLSearchParams(q);
        return (p.get("k") || p.get("K") || "").trim();
      }
      var k = trySearch(search);
      if (k) return k;
      var m = full.match(/[?&#](?:k|K)=([^&#\s]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(String(m[1]).replace(/\+/g, " ")).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      if (hash && hash.indexOf("?") !== -1) {
        k = trySearch("?" + hash.split("?").slice(1).join("?"));
        if (k) return k;
      }
      return "";
    }

    function extractAppFromHref(href) {
      var search = "";
      var full = String(href || location.href || "");
      try {
        var u = new URL(full.indexOf("://") > -1 ? full : "https://local.invalid/" + full.replace(/^\//, ""));
        search = u.search;
        full = u.href;
      } catch (_) {}
      var p = new URLSearchParams(search);
      var a = (p.get("app") || p.get("APP") || "").trim();
      if (a) return a;
      var m = full.match(/[?&#](?:app|APP)=([^&#\s]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(m[1]).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      return "";
    }

    window.__svcRemoteExtractKeyFromUrl = function () {
      return extractKeyFromHref(location.href);
    };
    window.__svcRemoteExtractAppFromUrl = function () {
      return extractAppFromHref(location.href);
    };
    window.__svcRemoteIsStandalone = isStandalonePwa;
    window.__svcRemoteParseLink = function (input) {
      return {
        k: extractKeyFromHref(input),
        app: extractAppFromHref(input)
      };
    };
    window.__svcRemoteApplyPastedLink = function (input) {
      var parsed = window.__svcRemoteParseLink(input);
      if (!parsed.k) return false;
      try {
        localStorage.setItem(SK, parsed.k);
        sessionStorage.setItem(SK, parsed.k);
        if (parsed.app) {
          localStorage.setItem(SA, parsed.app);
          sessionStorage.setItem(SA, parsed.app);
        }
      } catch (_) {}
      var u = buildCanonicalRemoteUrl(parsed.k, parsed.app || "");
      location.replace(u.href);
      return true;
    };

    try {
      var k = extractKeyFromHref(location.href);
      var a = extractAppFromHref(location.href);
      if (k) {
        localStorage.setItem(SK, k);
        try {
          sessionStorage.setItem(SK, k);
        } catch (_) {}
        if (a) {
          localStorage.setItem(SA, a);
          try {
            sessionStorage.setItem(SA, a);
          } catch (_) {}
        }
        if (!extractKeyFromPathname(location.pathname)) {
          location.replace(buildCanonicalRemoteUrl(k, a).href);
          return;
        }
      } else {
        var sk = (localStorage.getItem(SK) || sessionStorage.getItem(SK) || "").trim();
        /** Solo nella PWA installata: ripristina l ultimo link. Nel browser normale non forzare una chiave vecchia. */
        if (sk && isStandalonePwa()) {
          var sa = (localStorage.getItem(SA) || sessionStorage.getItem(SA) || "").trim();
          location.replace(buildCanonicalRemoteUrl(sk, sa).href);
          return;
        }
      }
    } catch (_) {}
    if (isStandalonePwa()) {
      try {
        document.documentElement.classList.add("svc-remote-standalone");
      } catch (_) {}
    }
  })();
  </script>

    function extractShareKeyFromLocation() {
      let k = "";
      if (typeof window.__svcRemoteExtractKeyFromUrl === "function") {
        k = window.__svcRemoteExtractKeyFromUrl();
      } else {
        const trySearch = function (search) {
          if (!search) return "";

          const p = new URLSearchParams(q);
          return (p.get("k") || p.get("K") || "").trim();
        };
        k = trySearch(location.search);
        if (!k) {
          const href = location.href || "";
          const m = href.match(/[?&#](?:k|K)=([^&#]+)/);
          if (m && m[1]) {
            try {
              k = decodeURIComponent(m[1].replace(/\+/g, " ")).trim();

        if (!k && location.hash && location.hash.indexOf("?") !== -1) {
          k = trySearch("?" + location.hash.split("?").slice(1).join("?"));
        }
      }
      if (k) {
        try {
          localStorage.setItem(REMOTE_SHARE_K_KEY, k);
          sessionStorage.setItem(REMOTE_SHARE_K_KEY, k);
        } catch (_) {}
        return k;
      }
      var standalone = typeof window.__svcRemoteIsStandalone === "function" && window.__svcRemoteIsStandalone();
      if (standalone) {
        try {
          k = (localStorage.getItem(REMOTE_SHARE_K_KEY) || sessionStorage.getItem(REMOTE_SHARE_K_KEY) || "").trim();
          if (k) return k;

      }
      return "";

      const p = new URLSearchParams(location.search);
      let a = (p.get("app") || p.get("APP") || "").trim();
      if (a) return a;
      const m = (location.href || "").match(/[?&#](?:app|APP)=([^&#]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(m[1]).trim();
        } catch (_) {
          return String(m[1]).trim();

        "</g>" +
        '<ellipse cx="26" cy="' + (8 + bodyH) + '" rx="17" ry="4.5" fill="rgba(15,23,42,0.55)" stroke="rgba(148,163,184,0.35)" stroke-width="1"/>' +
        '<text x="26" y="74" text-anchor="middle" fill="#cbd5e1" font-size="8" font-weight="800" font-family="system-ui,sans-serif">' +
        Math.round(pct) +
        "%</text></svg>"
      );
    }

    function buildStoccaggioRowsHTML(rows) {
      if (!Array.isArray(rows) || !rows.length) return "";
      let html = '<div class="digital-rows digital-rows--stocc">';
      rows.forEach(function (r) {
        const label = esc(r.label || "");
        const val = r.val != null ? String(r.val) : "";
        const pct = getStoccaggioTankFillPct(r.tankDbKey, r.levelMm, r.fillPct);
        const gauge = buildDigitalTankGaugeSVG(pct);
        html +=
          '<div class="digital-stocc-row digital-row">' +
          '<span class="digital-stocc-sigla digital-row-label">' +
          label +
          '</span><div class="digital-stocc-mid"><span class="digital-stocc-value digital-row-value">' +
          val +
          '</span></div><div class="digital-tank-gauge-wrap">' +
          gauge +
          "</div></div>";
      });
      html += "</div>";
      return html;
    }

    function buildStoccaggioCardFromRows(title, rows, index) {
      if (!Array.isArray(rows) || !rows.length) return "";
      const cardTitle = esc(title || "STOCCAGGIO INTERNO");
      const contentHTML = buildStoccaggioRowsHTML(rows);
      const idx = index != null ? index : 0;
      return (
        '<div class="digital-card" data-module-id="sec-stoccaggio-interno" tabindex="0" role="button" aria-label="Apri anteprima ingrandita ' +
        cardTitle +
        '" style="background:transparent;border:none;border-radius:0;padding:0;box-shadow:none;min-height:0;height:auto;overflow:visible;position:relative;transform:translateY(0);transition:transform 0.3s ease,filter 0.3s ease;animation:slideInUp 0.6s ease-out ' +
        idx * 0.1 +
        's both;hyphens:none;cursor:pointer;outline:none;">' +
        '<div class="digital-card-surface" style="background:linear-gradient(155deg,#1e293b 0%,#273549 45%,#334155 100%);border:1px solid rgba(96,165,250,0.28);border-radius:16px;padding:14px 16px;backdrop-filter:blur(12px);box-shadow:0 10px 32px rgba(0,0,0,0.28);height:auto;min-height:0;overflow:auto;">' +
        '<div class="digital-card-zoom-cols"><div class="digital-card-title-col">' +
        '<div class="digital-card-title" style="font-size:17px;font-weight:800;color:#60a5fa;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid rgba(96,165,250,0.35);padding-bottom:8px;white-space:nowrap;hyphens:none;word-break:keep-all;overflow:visible;">' +
        cardTitle +
        '</div></div><div class="digital-card-body-col" style="font-size:14px;line-height:1.45;color:#e2e8f0;font-weight:500;">' +
        contentHTML +
        "</div></div></div></div>"
      );
    }

    function patchStoccaggioInGrid(grid, d) {
      if (!grid || !d) return;
      const rows = Array.isArray(d.stoccaggioRows) ? d.stoccaggioRows : [];
      if (!rows.length) return;
      const title = d.stoccaggioTitle || "STOCCAGGIO INTERNO";
      const existing = grid.querySelector('.digital-card[data-module-id="sec-stoccaggio-interno"]');
      const cardHtml = buildStoccaggioCardFromRows(title, rows, 0);
      if (!cardHtml) return;
      if (existing) {
        const tmp = document.createElement("div");
        tmp.innerHTML = cardHtml;
        if (tmp.firstElementChild) existing.replaceWith(tmp.firstElementChild);
      } else {
        grid.insertAdjacentHTML("beforeend", cardHtml);
      }
    }

    function applyDigitalGridContent(grid, d) {
      grid.innerHTML = d.cardsHTML || "";
      patchStoccaggioInGrid(grid, d);
    }

    function digitalRemoteSig(d) {
      return (
        String((d && d.updatedAt) || "") +
        "\u0001" +
        String((d && d.cardsHTML) || "") +
        "\u0001" +
        stoccaggioRowsSignature(d && d.stoccaggioRows)
      );
    }

    function buildMainMarkup(d) {
      const when = d.updatedAt ? new Date(d.updatedAt).toLocaleString("it-IT") : "—";
      const turnoLine = esc(turnoLabel(d));
      const whenEsc = esc(when);
      return (
        '<div class="digital-remote-top">' +
        '<div class="digital-remote-top__main">' +
        '<div class="digital-remote-top__title">DIGITAL REPORT HD</div>' +
        '<div class="digital-remote-top__meta">' +
        turnoLine +
        "</div>" +
        '<div class="digital-remote-top__meta2">Ultimo aggiornamento: ' +
        whenEsc +
        "</div></div>" +
        '<div class="digital-remote-top__actions">' +
        '<button type="button" id="btn-remote-refresh" style="' +
        "background: linear-gradient(135deg, #22c55e, #16a34a);" +
        "border: 1px solid rgba(34, 197, 94, 0.3);" +
        "color: white;" +
        "padding: 6px 12px;" +
        "border-radius: 10px;" +
        "font-size: 11px;" +
        "font-weight: 900;" +
        "box-shadow: 0 4px 8px rgba(34, 197, 94, 0.4);" +
        "cursor: pointer;" +
        '">AGGIORNA</button>' +
        '<button type="button" id="btn-remote-exit" style="' +
        "background: linear-gradient(135deg, #ef4444, #dc2626);" +
        "border: 1px solid rgba(239, 68, 68, 0.3);" +
        "color: white;" +
        "padding: 6px 12px;" +
        "border-radius: 10px;" +
        "font-size: 11px;" +
        "font-weight: 900;" +
        "box-shadow: 0 4px 8px rgba(239, 68, 68, 0.4);" +
        "cursor: pointer;" +
        '">ESCI</button>' +
        "</div>" +
        "</div>" +
        '<div id="digital-module-focus-bar" class="digital-module-focus-bar">' +
        '<button type="button" class="digital-focus-close-btn" onclick="window.closeDigitalModuleFocus()">CHIUDI</button>' +
        '<span id="digital-focus-title" class="digital-focus-title"></span>' +
        '<span class="digital-focus-bar-spacer" aria-hidden="true"></span>' +
        "</div>" +
        '<div id="digital-cards-grid" class="digital-cards-wrap" style="' +
        "display: grid;" +
        "grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));" +
        "gap: 25px;" +
        "width: 100%;" +
        "align-items: start;" +
        "padding: 25px;" +
        "background: rgba(255,255,255,0.02);" +
        "border-radius: 24px;" +
        "backdrop-filter: blur(10px);" +
        '">' +
        (d.cardsHTML || "") +
        "</div>"
      );
    }

    let prefRef = null;
    let refreshHandler = null;

    function wireButtons() {
      const r = document.getElementById("btn-remote-refresh");
      const x = document.getElementById("btn-remote-exit");
      if (r && typeof refreshHandler === "function") {
        r.onclick = refreshHandler;
      }
      if (x) {
        x.onclick = exitRemote;
      }
    }

    let containerDelegateBound = false;
    function bindCardZoomOnce() {
      const root = document.getElementById("digital-preview-container");
      if (!root || containerDelegateBound) return;
      containerDelegateBound = true;
      root.addEventListener("click", function (e) {
        const grid = root.querySelector("#digital-cards-grid");
        if (!grid || !grid.contains(e.target)) return;
        const card = e.target.closest(".digital-card");
        if (!card || !grid.contains(card)) return;
        if (root.classList.contains("digital-focus-active") && card.classList.contains("digital-card--expanded")) return;
        window.expandDigitalModule(card);
      });
      root.addEventListener("keydown", function (e) {
        if (e.key !== "Escape") return;
        if (!root.classList.contains("digital-focus-active")) return;
        e.preventDefault();
        window.closeDigitalModuleFocus();
      });
    }

    function showDigitalInstallHint() {}
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (reg) { reg.unregister(); });
      });
    }

    /** Evita re-render identici (onSnapshot / metadata). */
    let __lastDigitalRemoteSig = "";
    let __lastRenderedUpdatedAt = "";
    let __remoteSnapshotDebounce = null;
    let __lastPublicDigitalPullMs = 0;
    let __remoteRefreshInFlight = false;

    function clearRemoteSnapshotDebounce() {
      if (__remoteSnapshotDebounce) {
        clearTimeout(__remoteSnapshotDebounce);
        __remoteSnapshotDebounce = null;
      }
    }

    function markRemotePayloadRendered(d) {
      if (d && d.updatedAt) {
        __lastRenderedUpdatedAt = String(d.updatedAt);
      }
    }

    function isRemotePayloadNewer(d) {
      if (!d) return false;
      const ts = String(d.updatedAt || "");
      if (!ts) return true;
      if (!__lastRenderedUpdatedAt) return true;
      return ts >= __lastRenderedUpdatedAt;
    }

    function updateRemoteMetaStrip(d) {
      const meta1 = bodyEl.querySelector(".digital-remote-top__meta");
      const meta2 = bodyEl.querySelector(".digital-remote-top__meta2");
      if (meta1) meta1.textContent = turnoLabel(d);
      if (meta2) {
        const when = d.updatedAt ? new Date(d.updatedAt).toLocaleString("it-IT") : "—";
        meta2.textContent = "Ultimo aggiornamento: " + when;
      }
    }

    /**
     * @param {object} d dati publicDigital
     * @param {{ fullRefresh?: boolean }} opts fullRefresh=true solo da pulsante AGGIORNA (animazione / DOM completo)
     */
    function renderFromData(d, opts) {
      const o = opts || {};
      const forceFull = o.fullRefresh === true;
      const root = document.getElementById("digital-preview-container");
      const existingGrid = bodyEl.querySelector("#digital-cards-grid");
      const canSilent =
        !forceFull &&
        existingGrid &&
        d &&
        typeof d.cardsHTML === "string" &&
        !String(bodyEl.innerHTML || "").includes("remote-error-banner");

      if (canSilent) {
        const sig = digitalRemoteSig(d);
        if (sig === __lastDigitalRemoteSig) return;
        __lastDigitalRemoteSig = sig;

        const inFocus = root.classList.contains("digital-focus-active");
        let expandedTitle = "";
        if (inFocus) {
          const tt = root.querySelector("#digital-focus-title");
          if (tt) expandedTitle = String(tt.textContent || "").replace(/\s+/g, " ").trim();
        }

        updateRemoteMetaStrip(d);
        applyDigitalGridContent(existingGrid, d);
        applyDigitalPhoneLayoutIfNeeded(root);

        if (inFocus && expandedTitle) {
          root.classList.add("digital-remote--silent-patch");
          const cards = existingGrid.querySelectorAll(".digital-card");
          let matched = null;
          cards.forEach(function (c) {
            const titleNode = c.querySelector(".digital-card-title");
            const t = titleNode ? String(titleNode.textContent || "").replace(/\s+/g, " ").trim() : "";
            if (t === expandedTitle) matched = c;
          });
          if (matched) window.expandDigitalModule(matched);
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              root.classList.remove("digital-remote--silent-patch");
            });
          });
        }
        return;
      }

      __lastDigitalRemoteSig = digitalRemoteSig(d || {});
      root.classList.remove("digital-focus-active");
      bodyEl.innerHTML = buildMainMarkup(d || {});
      const freshGrid = bodyEl.querySelector("#digital-cards-grid");
      if (freshGrid) patchStoccaggioInGrid(freshGrid, d || {});
      wireButtons();
      bindCardZoomOnce();
      applyDigitalPhoneLayoutIfNeeded(root);
    }

    if (!shareKey) {
      const urlHint = esc(String(location.href || "").split("#")[0]).slice(0, 120);
      bodyEl.innerHTML = buildRemoteShell(
        "<h2>Digital remoto (PC)</h2>" +
          "<p>In <strong>ServiceHub su questo PC</strong>: Digital Report → <strong>LINK REMOTO</strong> → pulsante verde <strong>Apri su questo PC</strong>.</p>" +
          "<p>Oppure incolla qui sotto il link con <code>/r/...</code>:</p>" +
          remotePasteLinkBlockHtml() +
          (urlHint
            ? '<p style="font-size:11px;opacity:0.75;margin-top:14px;word-break:break-all;">Indirizzo attuale: <code>' +
              urlHint +
              "</code></p>"
            : ""),
        "In attesa del link"
      );
      wireRemotePasteLink();
    } else {
      bodyEl.innerHTML = buildRemoteShell(
        '<div class="remote-loading-pulse">Caricamento Digital Report…</div>',
        "Connessione al cloud"
      );
      (async function initRemoteDigital() {

        let app;
        try {
          app = getApp("digital-remote-viewer");
        } catch (_) {
          app = initializeApp(DEFAULT_FIREBASE_CONFIG, "digital-remote-viewer");
        }
        const db = (function initRemoteFirestore() {
          try {
            return initializeFirestore(app, {
              localCache: memoryLocalCache(),
              experimentalForceLongPolling: true
            });
          } catch (err) {
            console.warn("[Digital remoto] Firestore init:", err && err.message);
            return getFirestore(app);
          }
        })();
        prefRef = doc(db, "artifacts", appIdParam, "publicDigital", shareKey);

        /**
         * Lettura sempre dal server Firestore (non dalla cache locale del listener).
         * @param {{ fullRefresh?: boolean, userInitiated?: boolean }} opts
         */
        async function fetchAndRenderPublicDigital(opts) {
          const o = opts || {};
          const forceFull = o.fullRefresh !== false;
          const userInitiated = !!o.userInitiated;
          clearRemoteSnapshotDebounce();
          const snap = await getDocFromServer(prefRef);
          if (!snap.exists()) {
            __lastDigitalRemoteSig = "";
            __lastRenderedUpdatedAt = "";
            const kShort =
              shareKey.length > 12 ? esc(shareKey.slice(0, 8) + "…" + shareKey.slice(-4)) : esc(shareKey);
            bodyEl.innerHTML = buildRemoteShell(
              '<div class="remote-error-banner">' +
                "<strong>Report non ancora sul cloud</strong>" +
                "<p style=\"margin:12px 0 0;color:#fecaca;line-height:1.55;\">I dati non sono ancora sul cloud. Torna su <strong>ServiceHub (questo PC)</strong>, Digital Report → <strong>LINK REMOTO</strong>, attendi <strong>Pubblicazione cloud completata</strong>, poi <strong>Riprova</strong>.</p>" +
                '<p style="margin:10px 0 0;font-size:11px;opacity:0.85;">Chiave: <code>' +
                kShort +
                "</code></p>" +
                '<button type="button" id="svc-remote-retry-fetch" style="cursor:pointer;margin-top:14px;padding:10px 16px;border-radius:10px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-weight:800;font-size:13px;">Riprova</button>' +
                "</div>" +
                remotePasteLinkBlockHtml(),
              "In attesa dei dati"
            );
            wireRemotePasteLink();
            const retryBtn = document.getElementById("svc-remote-retry-fetch");
            if (retryBtn) {
              retryBtn.addEventListener("click", function () {
                retryBtn.disabled = true;
                retryBtn.textContent = "…";
                fetchAndRenderPublicDigital({ fullRefresh: true, userInitiated: true }).finally(function () {
                  retryBtn.disabled = false;
                  retryBtn.textContent = "Riprova lettura";
                });
              });
            }
            return { ok: false, reason: "missing" };
          }
          const d = snap.data();
          if (!userInitiated && !isRemotePayloadNewer(d)) {
            return { ok: true, reason: "stale-skipped" };
          }
          __lastDigitalRemoteSig = "";
          renderFromData(d, { fullRefresh: forceFull });
          markRemotePayloadRendered(d);
          return { ok: true, reason: "rendered" };
        }

        refreshHandler = async function () {
          if (__remoteRefreshInFlight) return;
          const btn = document.getElementById("btn-remote-refresh");
          if (btn) {
            btn.disabled = true;
            btn.textContent = "…";
          }
          __remoteRefreshInFlight = true;
          try {
            const result = await fetchAndRenderPublicDigital({
              fullRefresh: true,
              userInitiated: true
            });
            if (result && result.ok && result.reason === "rendered" && btn) {
              const prev = btn.textContent;
              btn.textContent = "OK";
              setTimeout(function () {
                if (btn) btn.textContent = prev === "OK" ? "AGGIORNA" : prev;
              }, 900);
            }
          } catch (err) {
            __lastDigitalRemoteSig = "";
            bodyEl.innerHTML =
              '<div class="remote-error-banner">Aggiornamento non riuscito: ' +
              esc(err && err.message) +
              ". Controlla la connessione e riprova.</div>";
          } finally {
            __remoteRefreshInFlight = false;
            const b = document.getElementById("btn-remote-refresh");
            if (b) {
              b.disabled = false;
              if (b.textContent === "…") b.textContent = "AGGIORNA";
            }
          }
        };

        function applySnapshot(snap) {
          if (__remoteRefreshInFlight) return;

          const flush = function () {
            __remoteSnapshotDebounce = null;
            if (__remoteRefreshInFlight) return;
            if (!snap.exists()) {
              __lastDigitalRemoteSig = "";
              __lastRenderedUpdatedAt = "";
              bodyEl.innerHTML =
                '<div class="remote-error-banner">In attesa del primo salvataggio o pubblicazione Digital…</div>';
              return;
            }
            const d = snap.data();
            if (!isRemotePayloadNewer(d)) {
              return;
            }
            const isFirst = !bodyEl.querySelector("#digital-cards-grid");
            renderFromData(d, { fullRefresh: isFirst });
            markRemotePayloadRendered(d);
            try {
              if (snap.metadata && snap.metadata.fromCache) {
                setTimeout(function () {
                  pullFromServer("snapshot-from-cache");
                }, 300);
              }
            } catch (_) {}
          };

          if (!snap.exists()) {
            clearRemoteSnapshotDebounce();
            flush();
            return;
          }

          const isFirstNow = !bodyEl.querySelector("#digital-cards-grid");
          if (isFirstNow) {
            clearRemoteSnapshotDebounce();
            flush();
            return;
          }

          if (__remoteSnapshotDebounce) clearTimeout(__remoteSnapshotDebounce);
          __remoteSnapshotDebounce = setTimeout(flush, 120);
        }

        onSnapshot(
          prefRef,
          function (snap) {
            applySnapshot(snap);
          },
          (err) => {
            __lastDigitalRemoteSig = "";
            bodyEl.innerHTML =
              '<div class="remote-error-banner">Errore Firestore: ' +
              esc(err && err.message) +
              " · Controlla le regole publicDigital.</div>";
          }
        );

        /** Lettura forzata da server (pulsante AGGIORNA, tab visibile, ecc.). */
        async function pullFromServer(reason) {
          if (__remoteRefreshInFlight) return;
          const now = Date.now();
          if (reason !== "btn" && now - __lastPublicDigitalPullMs < 450) return;
          __lastPublicDigitalPullMs = now;
          try {
            await fetchAndRenderPublicDigital({
              fullRefresh: reason === "btn",
              userInitiated: reason === "btn" || reason === "visibility" || reason === "focus"
            });
          } catch (err) {
            console.warn("[Digital remoto] pull server:", reason, err && err.message);
          }
        }

        setTimeout(function () {
          pullFromServer("init");
        }, 400);

        document.addEventListener("visibilitychange", function () {
          if (document.visibilityState === "visible") {
            pullFromServer("visibility");
          }
        });
        window.addEventListener("pageshow", function (ev) {
          if (ev.persisted) pullFromServer("bfcache");
        });
        window.addEventListener("focus", function () {
          pullFromServer("focus");
        });
        setInterval(function () {
          if (document.visibilityState === "visible") {
            pullFromServer("interval");
          }
        }, 300000);
      })();
    }
  </script>
</body>
</html>
