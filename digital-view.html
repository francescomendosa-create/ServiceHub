<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital Report remoto – ServiceHub</title>
  <link rel="stylesheet" href="digital-remote.css" />
  <style>
    html, body { margin: 0; min-height: 100%; }
    #digital-preview-container { box-sizing: border-box; }
    .remote-meta {
      padding: 10px 16px;
      margin-bottom: 14px;
      background: rgba(15, 23, 42, 0.85);
      border-radius: 12px;
      border: 1px solid rgba(96, 165, 250, 0.35);
      font: 600 13px system-ui, sans-serif;
      color: #e2e8f0;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div
    id="digital-preview-container"
    style="display:flex;flex-direction:column;overflow:auto;padding:24px;min-height:100vh;background:radial-gradient(circle at 30% 20%, #0f172a 0%, #1e293b 40%, #020617 100%);color:#fff;"
  >
    <div class="remote-meta" id="remote-meta">Caricamento…</div>
    <div id="digital-inner-mount"></div>
  </div>
  <script type="module">
    import { initializeApp, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const DEFAULT_FIREBASE_CONFIG = {
      apiKey: "AIzaSyASdslVw8q_1Bz9RbN7Q_Fg_PEsbPOSkjM",
      authDomain: "servicehub-18309.firebaseapp.com",
      projectId: "servicehub-18309",
      storageBucket: "servicehub-18309.firebasestorage.app",
      messagingSenderId: "844169156848",
      appId: "1:844169156848:web:91b6c4e08900a350078a35"
    };

    const metaEl = document.getElementById("remote-meta");
    const mount = document.getElementById("digital-inner-mount");
    const params = new URLSearchParams(location.search);
    const shareKey = params.get("k");
    const appIdParam = params.get("app") || "stabile-2026-v4";

    if (!shareKey) {
      metaEl.textContent =
        "Parametro ?k= mancante nell URL. In ServiceHub apri Digital e premi LINK REMOTO per generare il link.";
    } else {
      let app;
      try {
        app = getApp("digital-remote-viewer");
      } catch (_) {
        app = initializeApp(DEFAULT_FIREBASE_CONFIG, "digital-remote-viewer");
      }
      const db = getFirestore(app);
      const pref = doc(db, "artifacts", appIdParam, "publicDigital", shareKey);
      onSnapshot(
        pref,
        (snap) => {
          if (!snap.exists()) {
            metaEl.textContent =
              "Nessun report pubblicato per questo link. Verifica il link o pubblica di nuovo dall app operatore.";
            mount.innerHTML = "";
            return;
          }
          const d = snap.data();
          const when = d.updatedAt
            ? new Date(d.updatedAt).toLocaleString("it-IT")
            : "—";
          metaEl.textContent =
            "Sola lettura · Turno: " +
            (d.shiftLabel || "—") +
            " · Ultimo aggiornamento: " +
            when;
          mount.innerHTML =
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding:8px 15px;background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));border-radius:12px;border:1px solid rgba(255,255,255,0.2);">' +
            '<div style="font-size:16px;font-weight:700;letter-spacing:0.5px;background:linear-gradient(45deg,#3b82f6,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">DIGITAL REPORT HD</div>' +
            "</div>" +
            '<div id="digital-cards-grid" class="digital-cards-wrap" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px;width:100%;align-items:start;padding:25px;background:rgba(255,255,255,0.02);border-radius:24px;backdrop-filter:blur(10px);">' +
            (d.cardsHTML || "") +
            "</div>";
        },
        (err) => {
          metaEl.textContent =
            "Errore Firestore: " +
            (err && err.message) +
            " · Controlla le regole di sicurezza (file firestore-public-digital.rules.txt).";
          mount.innerHTML = "";
        }
      );
    }
  </script>
</body>
</html>
