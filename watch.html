<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Service Watch</title>
  <meta name="theme-color" content="#307eb4" />
  <meta name="application-name" content="Service Watch" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Service Watch" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="watch-manifest.json?v=sw1" />
  <link rel="icon" type="image/png" sizes="192x192" href="sh-icon-192.png?v=sw1" id="sw-favicon" />
  <link rel="apple-touch-icon" href="sh-touch.png?v=sw1" id="sw-touch-icon" />
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e5a82;
      -webkit-text-size-adjust: 100%;
    }
    .sw-stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      background: #1e5a82;
    }
    #sw-icon-canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      touch-action: manipulation;
    }
    .sw-fallback {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #3d8fc4 0%, #1e5a82 55%, #123d5c 100%);
      color: #fff;
      font: 900 clamp(18px, 9vmin, 28px) system-ui, -apple-system, sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      padding: 12px;
    }
    .sw-fallback.show { display: flex; }
  </style>
</head>
<body>
  <main class="sw-stage" aria-label="Service Watch">
    <canvas id="sw-icon-canvas" aria-hidden="true"></canvas>
    <div id="sw-fallback" class="sw-fallback" aria-label="Service Watch">Service<br>Watch</div>
  </main>
  <script>
    (function () {
      var BASE_ICON = 'sh-icon-512.png?v=sw1';
      var BASE_FALLBACK = 'sh-icon-192.png?v=sw1';

      function loadImage(src) {
        return new Promise(function (resolve, reject) {
          var im = new Image();
          im.decoding = 'async';
          im.onload = function () { resolve(im); };
          im.onerror = function () { reject(new Error('icon')); };
          im.src = src;
        });
      }

      function drawServiceWatchIcon(ctx, img, size) {
        ctx.drawImage(img, 0, 0, size, size);
        var bandTop = Math.round(size * 0.70);
        var grad = ctx.createLinearGradient(0, bandTop, 0, size);
        grad.addColorStop(0, 'rgba(42, 122, 176, 0.98)');
        grad.addColorStop(1, 'rgba(28, 88, 132, 1)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, bandTop, size, size - bandTop);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur = Math.max(2, size * 0.01);
        var line1 = Math.round(size * 0.082);
        var line2 = Math.round(size * 0.074);
        ctx.font = '900 ' + line1 + 'px system-ui, -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillText('Service', size / 2, size * 0.835);
        ctx.font = '900 ' + line2 + 'px system-ui, -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillText('Watch', size / 2, size * 0.925);
        ctx.shadowBlur = 0;
      }

      function setHeadIconFromCanvas(canvas) {
        try {
          var dataUrl = canvas.toDataURL('image/png');
          var fav = document.getElementById('sw-favicon');
          var touch = document.getElementById('sw-touch-icon');
          if (fav) fav.href = dataUrl;
          if (touch) touch.href = dataUrl;
        } catch (_) {}
      }

      function paintFullscreen() {
        var canvas = document.getElementById('sw-icon-canvas');
        var fallback = document.getElementById('sw-fallback');
        if (!canvas) return;
        var dpr = Math.min(window.devicePixelRatio || 1, 3);
        var w = window.innerWidth || 320;
        var h = window.innerHeight || 320;
        canvas.width = Math.round(w * dpr);
        canvas.height = Math.round(h * dpr);
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        var ctx = canvas.getContext('2d');
        if (!ctx) {
          if (fallback) fallback.classList.add('show');
          canvas.style.display = 'none';
          return;
        }
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        var size = Math.max(w, h);
        var off = document.createElement('canvas');
        off.width = size;
        off.height = size;
        var octx = off.getContext('2d');
        if (!octx) return;
        loadImage(new URL(BASE_ICON, location.href).href)
          .catch(function () { return loadImage(new URL(BASE_FALLBACK, location.href).href); })
          .then(function (img) {
            drawServiceWatchIcon(octx, img, size);
            var ox = (w - size) / 2;
            var oy = (h - size) / 2;
            ctx.fillStyle = '#1e5a82';
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(off, ox, oy, size, size);
            var iconCanvas = document.createElement('canvas');
            iconCanvas.width = 512;
            iconCanvas.height = 512;
            var ictx = iconCanvas.getContext('2d');
            if (ictx) {
              drawServiceWatchIcon(ictx, img, 512);
              setHeadIconFromCanvas(iconCanvas);
            }
          })
          .catch(function () {
            canvas.style.display = 'none';
            if (fallback) fallback.classList.add('show');
          });
      }

      paintFullscreen();
      window.addEventListener('resize', paintFullscreen);
      window.addEventListener('orientationchange', function () {
        setTimeout(paintFullscreen, 120);
      });
    })();
  </script>
</body>
</html>
