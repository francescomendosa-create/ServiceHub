<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>STABILE 2026 · Digital remoto</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="application-name" content="STABILE Digital" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="STABILE Digital" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="sh-touch.png?v=shpc4" />
  <link rel="stylesheet" href="digital-remote.css?v=dig10" />
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, sans-serif;
    }
    #digital-preview-container { box-sizing: border-box; }
    .remote-error-banner {
      margin-bottom: 12px;
      padding: 12px 14px;
      background: rgba(127, 29, 29, 0.35);
      border: 1px solid rgba(248, 113, 113, 0.45);
      border-radius: 12px;
      font: 600 13px inherit;
      color: #fecaca;
      line-height: 1.45;
    }
    .digital-remote-top {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 15px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      border-radius: 12px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }
    .digital-remote-top__row1 {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px 16px;
    }
    .digital-remote-top__title {
      font-size: clamp(15px, 4.2vw, 18px);
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(45deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }
    .digital-remote-top__meta {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #cbd5e1;
      line-height: 1.35;
    }
    .digital-remote-top__meta2 {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
    }
    .digital-remote-top__actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      align-self: center;
      flex-wrap: wrap;
    }
    .digital-remote-link-row {
      width: 100%;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(148, 163, 184, 0.35);
    }
    .digital-remote-link-row label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: #94a3b8;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .digital-remote-link-row__wrap {
      display: flex;
      gap: 8px;
      align-items: stretch;
      flex-wrap: wrap;
    }
    .digital-remote-link-row input {
      flex: 1 1 180px;
      min-width: 0;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(15, 23, 42, 0.85);
      color: #e2e8f0;
      font: 600 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .digital-remote-link-hint {
      margin-top: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #86efac;
      min-height: 1.35em;
    }
    .digital-remote-link-hint--warn {
      color: #fde047;
    }
  </style>
</head>
<body>
  <div
    id="digital-preview-container"
    style="display:flex;flex-direction:column;overflow:auto;padding:24px;min-height:100vh;background:radial-gradient(circle at 30% 20%, #0f172a 0%, #1e293b 40%, #020617 100%);color:#fff;"
  >
    <div id="digital-remote-body"></div>
  </div>
  <script type="module">
    import { initializeApp, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      onSnapshot,
      getDoc,
      getDocFromServer
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const DEFAULT_FIREBASE_CONFIG = {
      apiKey: "AIzaSyASdslVw8q_1Bz9RbN7Q_Fg_PEsbPOSkjM",
      authDomain: "servicehub-18309.firebaseapp.com",
      projectId: "servicehub-18309",
      storageBucket: "servicehub-18309.firebasestorage.app",
      messagingSenderId: "844169156848",
      appId: "1:844169156848:web:91b6c4e08900a350078a35"
    };

    /** Alcuni browser / condivisioni usano ?K= invece di ?k=; la query può anche stare dopo # */
    function extractShareKeyFromLocation() {
      const trySearch = function (search) {
        if (!search) return "";
        const q = search.startsWith("?") ? search.slice(1) : search;
        const p = new URLSearchParams(q);
        const v = (p.get("k") || p.get("K") || "").trim();
        return v;
      };
      let k = trySearch(location.search);
      if (k) return k;
      const href = location.href || "";
      const m = href.match(/[?&#](?:k|K)=([^&#]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(m[1].replace(/\+/g, " ")).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      if (location.hash && location.hash.indexOf("?") !== -1) {
        k = trySearch("?" + location.hash.split("?").slice(1).join("?"));
        if (k) return k;
      }
      return "";
    }

    function extractAppIdFromLocation() {
      const p = new URLSearchParams(location.search);
      let a = (p.get("app") || p.get("APP") || "").trim();
      if (a) return a;
      const m = (location.href || "").match(/[?&#](?:app|APP)=([^&#]+)/);
      if (m && m[1]) {
        try {
          return decodeURIComponent(m[1]).trim();
        } catch (_) {
          return String(m[1]).trim();
        }
      }
      return "stabile-2026-v4";
    }

    const shareKey = extractShareKeyFromLocation();
    const appIdParam = extractAppIdFromLocation();

    const bodyEl = document.getElementById("digital-remote-body");

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    window.closeDigitalModuleFocus = function () {
      const root = document.getElementById("digital-preview-container");
      if (!root) return;
      root.classList.remove("digital-focus-active");
      root.querySelectorAll(".digital-card").forEach(function (c) {
        c.classList.remove("digital-card--expanded");
      });
    };

    window.expandDigitalModule = function (cardEl) {
      const root = document.getElementById("digital-preview-container");
      if (!root || !cardEl) return;
      const titleSpan = root.querySelector("#digital-focus-title");
      const titleNode = cardEl.querySelector(".digital-card-title");
      if (titleSpan && titleNode) {
        titleSpan.textContent = titleNode.textContent.replace(/\s+/g, " ").trim();
      }
      root.classList.add("digital-focus-active");
      root.querySelectorAll(".digital-card").forEach(function (c) {
        if (c === cardEl) c.classList.add("digital-card--expanded");
        else c.classList.remove("digital-card--expanded");
      });
      try {
        cardEl.focus({ preventScroll: true });
      } catch (e) {}
    };

    function exitRemote() {
      window.closeDigitalModuleFocus();
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      window.close();
      setTimeout(function () {
        alert("Chiudi questa scheda dal browser (icona X) per uscire.");
      }, 150);
    }

    window.exitRemoteDigital = exitRemote;

    function turnoLabel(d) {
      const raw = (d && (d.shiftLabel || d.shift)) ? String(d.shiftLabel || d.shift).trim() : "";
      if (!raw) return "Turno —";
      if (/turno/i.test(raw)) return raw;
      return "Turno " + raw;
    }

    function buildMainMarkup(d) {
      const when = d.updatedAt ? new Date(d.updatedAt).toLocaleString("it-IT") : "—";
      const turnoLine = esc(turnoLabel(d));
      const whenEsc = esc(when);
      const pageUrl = esc(location.href);
      return (
        '<div class="digital-remote-top">' +
        '<div class="digital-remote-top__row1">' +
        '<div style="min-width:0;flex:1 1 200px;">' +
        '<div class="digital-remote-top__title">DIGITAL REPORT HD</div>' +
        '<div class="digital-remote-top__meta">' +
        turnoLine +
        "</div>" +
        '<div class="digital-remote-top__meta2">Ultimo aggiornamento: ' +
        whenEsc +
        "</div></div>" +
        '<div class="digital-remote-top__actions">' +
        '<button type="button" id="btn-remote-refresh" style="' +
        "background: linear-gradient(135deg, #22c55e, #16a34a);" +
        "border: 1px solid rgba(34, 197, 94, 0.3);" +
        "color: white;" +
        "padding: 6px 12px;" +
        "border-radius: 10px;" +
        "font-size: 11px;" +
        "font-weight: 900;" +
        "box-shadow: 0 4px 8px rgba(34, 197, 94, 0.4);" +
        "cursor: pointer;" +
        '">AGGIORNA</button>' +
        '<button type="button" id="btn-remote-exit" style="' +
        "background: linear-gradient(135deg, #ef4444, #dc2626);" +
        "border: 1px solid rgba(239, 68, 68, 0.3);" +
        "color: white;" +
        "padding: 6px 12px;" +
        "border-radius: 10px;" +
        "font-size: 11px;" +
        "font-weight: 900;" +
        "box-shadow: 0 4px 8px rgba(239, 68, 68, 0.4);" +
        "cursor: pointer;" +
        '">ESCI</button>' +
        '<button type="button" id="btn-remote-copy-link" style="' +
        "background: linear-gradient(135deg, #6366f1, #4f46e5);" +
        "border: 1px solid rgba(99, 102, 241, 0.45);" +
        "color: white;" +
        "padding: 6px 12px;" +
        "border-radius: 10px;" +
        "font-size: 11px;" +
        "font-weight: 900;" +
        "box-shadow: 0 4px 8px rgba(79, 70, 229, 0.35);" +
        "cursor: pointer;" +
        '">COPIA LINK</button>' +
        "</div></div>" +
        '<div class="digital-remote-link-row">' +
        '<label for="digital-remote-url-field">Link da inviare ad altri tablet / TV (stesso indirizzo che hai aperto)</label>' +
        '<div class="digital-remote-link-row__wrap">' +
        '<input type="text" id="digital-remote-url-field" readonly value="' +
        pageUrl +
        '" spellcheck="false" autocomplete="off" />' +
        "</div>" +
        '<div id="digital-remote-copy-hint" class="digital-remote-link-hint" aria-live="polite"></div>' +
        "</div>" +
        "</div>" +
        '<div id="digital-module-focus-bar" class="digital-module-focus-bar">' +
        '<button type="button" class="digital-focus-close-btn" onclick="window.closeDigitalModuleFocus()">CHIUDI</button>' +
        '<span id="digital-focus-title" class="digital-focus-title"></span>' +
        "</div>" +
        '<div id="digital-cards-grid" class="digital-cards-wrap" style="' +
        "display: grid;" +
        "grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));" +
        "gap: 25px;" +
        "width: 100%;" +
        "align-items: start;" +
        "padding: 25px;" +
        "background: rgba(255,255,255,0.02);" +
        "border-radius: 24px;" +
        "backdrop-filter: blur(10px);" +
        '">' +
        (d.cardsHTML || "") +
        "</div>"
      );
    }

    let prefRef = null;
    let refreshHandler = null;

    async function copyPageUrlToClipboard() {
      const href = location.href || "";
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(href);
          return true;
        }
      } catch (_) {}
      try {
        const ta = document.createElement("textarea");
        ta.value = href;
        ta.setAttribute("readonly", "");
        ta.style.cssText = "position:fixed;left:-9999px;top:0;opacity:0;";
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, href.length);
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      } catch (_) {
        return false;
      }
    }

    function wireButtons() {
      const r = document.getElementById("btn-remote-refresh");
      const x = document.getElementById("btn-remote-exit");
      const c = document.getElementById("btn-remote-copy-link");
      const field = document.getElementById("digital-remote-url-field");
      const hint = document.getElementById("digital-remote-copy-hint");
      if (r && typeof refreshHandler === "function") {
        r.onclick = refreshHandler;
      }
      if (x) {
        x.onclick = exitRemote;
      }
      if (c && field) {
        c.onclick = async function () {
          try {
            field.focus();
            field.select();
            field.setSelectionRange(0, field.value.length);
          } catch (_) {}
          const ok = await copyPageUrlToClipboard();
          if (hint) {
            hint.classList.toggle("digital-remote-link-hint--warn", !ok);
            hint.textContent = ok
              ? "Grazie: link copiato negli appunti. Incollalo dove ti serve."
              : "Copia non automatica: tieni premuto sul campo sopra e scegli «Copia».";
          }
        };
      }
    }

    let containerDelegateBound = false;
    function bindCardZoomOnce() {
      const root = document.getElementById("digital-preview-container");
      if (!root || containerDelegateBound) return;
      containerDelegateBound = true;
      root.addEventListener("click", function (e) {
        const grid = root.querySelector("#digital-cards-grid");
        if (!grid || !grid.contains(e.target)) return;
        const card = e.target.closest(".digital-card");
        if (!card || !grid.contains(card)) return;
        if (root.classList.contains("digital-focus-active") && card.classList.contains("digital-card--expanded")) return;
        window.expandDigitalModule(card);
      });
      root.addEventListener("keydown", function (e) {
        if (e.key !== "Escape") return;
        if (!root.classList.contains("digital-focus-active")) return;
        e.preventDefault();
        window.closeDigitalModuleFocus();
      });
    }

    function loadImageLegacy(src) {
      return new Promise(function (resolve, reject) {
        var im = new Image();
        im.decoding = "async";
        im.onload = function () {
          resolve(im);
        };
        im.onerror = function () {
          reject(new Error("Icona base non caricata"));
        };
        im.src = src;
      });
    }

    async function loadSourceForIcon(src) {
      if (typeof fetch === "function" && typeof createImageBitmap === "function") {
        try {
          var res = await fetch(src, { cache: "reload" });
          if (!res.ok) throw new Error("fetch icon");
          var blob = await res.blob();
          return await createImageBitmap(blob);
        } catch (e) {
          return loadImageLegacy(src);
        }
      }
      return loadImageLegacy(src);
    }

    function canvasToBlobUrl(canvas) {
      return new Promise(function (resolve, reject) {
        canvas.toBlob(
          function (blob) {
            if (!blob) {
              reject(new Error("toBlob"));
              return;
            }
            resolve(URL.createObjectURL(blob));
          },
          "image/png",
          0.92
        );
      });
    }

    function drawClientBadgeOnCanvas(ctx, src, size) {
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(src, 0, 0, size, size);
      var cx = size / 2;
      var cy = size / 2;
      var r = size * 0.36;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(234, 88, 12, 0.94)";
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.95)";
      ctx.lineWidth = Math.max(2, size / 48);
      ctx.stroke();
      var fontPx = Math.max(12, Math.round(size * 0.15));
      ctx.save();
      ctx.fillStyle = "#0f172a";
      ctx.font = "900 " + fontPx + "px system-ui,Segoe UI,sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("CLIENT", cx, cy + Math.round(size * 0.01));
      ctx.restore();
    }

    async function renderClientIconFromImage(src, size) {
      var c = document.createElement("canvas");
      c.width = size;
      c.height = size;
      var ctx = c.getContext("2d");
      if (!ctx) throw new Error("Canvas 2D");
      drawClientBadgeOnCanvas(ctx, src, size);
      return canvasToBlobUrl(c);
    }

    async function buildDigitalClientIcons() {
      var base512 = new URL("sh-icon-512.png?v=shpc4", location.href).href;
      var base192 = new URL("sh-icon-192.png?v=shpc4", location.href).href;
      var src;
      try {
        src = await loadSourceForIcon(base512);
      } catch (e1) {
        src = await loadSourceForIcon(base192);
      }
      var icon180 = await renderClientIconFromImage(src, 180);
      var icon192 = await renderClientIconFromImage(src, 192);
      var icon512 = await renderClientIconFromImage(src, 512);
      if (typeof src.close === "function") src.close();
      return { icon180: icon180, icon192: icon192, icon512: icon512 };
    }

    function applyDigitalClientIconLinks(urls) {
      document.querySelectorAll('link[data-digital-client-favicon="1"]').forEach(function (n) {
        n.remove();
      });
      var touch = document.querySelector('link[rel="apple-touch-icon"]');
      if (touch) touch.href = urls.icon180;
      var mk = function (rel, href, sizes) {
        var l = document.createElement("link");
        l.rel = rel;
        l.type = "image/png";
        if (sizes) l.sizes = sizes;
        l.href = href;
        l.setAttribute("data-digital-client-favicon", "1");
        document.head.insertBefore(l, document.head.firstChild);
      };
      mk("icon", urls.icon512, "512x512");
      mk("icon", urls.icon192, "192x192");
      mk("shortcut icon", urls.icon192, "");
    }

    function injectStabilePwaManifest(icon192Href, icon512Href) {
      if (!shareKey) return;
      const prev = document.querySelector('link[rel="manifest"][data-stabile-digital]');
      if (prev) prev.remove();
      var icon192 = icon192Href || new URL("sh-icon-192.png?v=shpc4", location.href).href;
      var icon512 = icon512Href || new URL("sh-icon-512.png?v=shpc4", location.href).href;
      const scopeBase = new URL("./", location.href).href;
      const start = location.href.split("#")[0];
      const manifest = {
        name: "STABILE 2026 · Digital remoto",
        short_name: "STABILE Digital",
        description: "Digital Report HD — sola lettura",
        start_url: start,
        scope: scopeBase,
        display: "standalone",
        orientation: "any",
        theme_color: "#0f172a",
        background_color: "#020617",
        lang: "it",
        icons: [
          { src: icon192, sizes: "192x192", type: "image/png", purpose: "any" },
          { src: icon512, sizes: "512x512", type: "image/png", purpose: "any" }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
      const mhref = URL.createObjectURL(blob);
      const l = document.createElement("link");
      l.rel = "manifest";
      l.href = mhref;
      l.setAttribute("data-stabile-digital", "1");
      document.head.appendChild(l);
    }

    function renderFromData(d) {
      document.getElementById("digital-preview-container").classList.remove("digital-focus-active");
      bodyEl.innerHTML = buildMainMarkup(d || {});
      wireButtons();
      bindCardZoomOnce();
    }

    if (!shareKey) {
      bodyEl.innerHTML =
        '<div class="remote-error-banner">Nella URL non risulta la chiave di accesso (<code>k</code>). Controlla che l indirizzo contenga ad esempio <code>?k=...</code> o <code>&amp;k=...</code> (anche <code>K</code> maiuscolo). Se hai aggiunto la pagina alla schermata Home, riapri il link completo dal messaggio «LINK REMOTO».</div>';
    } else {
      (async function initRemoteDigital() {
        var fb192 = new URL("sh-icon-192.png?v=shpc4", location.href).href;
        var fb512 = new URL("sh-icon-512.png?v=shpc4", location.href).href;
        var icon192 = fb192;
        var icon512 = fb512;
        try {
          var branded = await buildDigitalClientIcons();
          icon192 = branded.icon192;
          icon512 = branded.icon512;
          applyDigitalClientIconLinks(branded);
        } catch (err) {
          console.warn("Icone Digital:", err);
        }
        injectStabilePwaManifest(icon192, icon512);

        let app;
        try {
          app = getApp("digital-remote-viewer");
        } catch (_) {
          app = initializeApp(DEFAULT_FIREBASE_CONFIG, "digital-remote-viewer");
        }
        const db = getFirestore(app);
        prefRef = doc(db, "artifacts", appIdParam, "publicDigital", shareKey);

        refreshHandler = async function () {
          const btn = document.getElementById("btn-remote-refresh");
          if (btn) btn.textContent = "…";
          try {
            const snap = await getDocFromServer(prefRef);
            if (!snap.exists()) {
              bodyEl.innerHTML =
                '<div class="remote-error-banner">Nessun report su questo link. Salva dall app operatore o premi LINK REMOTO una volta.</div>';
              return;
            }
            renderFromData(snap.data());
          } catch (err) {
            bodyEl.innerHTML =
              '<div class="remote-error-banner">Aggiornamento non riuscito: ' +
              esc(err && err.message) +
              "</div>";
          } finally {
            const b = document.getElementById("btn-remote-refresh");
            if (b) b.textContent = "AGGIORNA";
          }
        };

        function applySnapshot(snap) {
          if (!snap.exists()) {
            bodyEl.innerHTML =
              '<div class="remote-error-banner">In attesa del primo salvataggio o pubblicazione Digital…</div>';
            return;
          }
          renderFromData(snap.data());
        }

        onSnapshot(
          prefRef,
          { includeMetadataChanges: true },
          (snap) => {
            applySnapshot(snap);
          },
          (err) => {
            bodyEl.innerHTML =
              '<div class="remote-error-banner">Errore Firestore: ' +
              esc(err && err.message) +
              " · Controlla le regole publicDigital.</div>";
          }
        );

        /** Lettura forzata da server (evita cache SDK / tab in background). */
        async function pullFromServer(reason) {
          try {
            const snap = await getDocFromServer(prefRef);
            applySnapshot(snap);
          } catch (err) {
            console.warn("[Digital remoto] pull server:", reason, err && err.message);
          }
        }

        document.addEventListener("visibilitychange", function () {
          if (document.visibilityState === "visible") {
            pullFromServer("visibility");
          }
        });
        window.addEventListener("pageshow", function (ev) {
          if (ev.persisted) pullFromServer("bfcache");
        });
        window.addEventListener("focus", function () {
          pullFromServer("focus");
        });
        setInterval(function () {
          if (document.visibilityState === "visible") {
            pullFromServer("interval");
          }
        }, 40000);
      })();
    }
  </script>
</body>
</html>
