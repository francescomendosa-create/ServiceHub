<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Service Watch</title>
  <meta name="theme-color" content="#307eb4" />
  <meta name="application-name" content="Service Watch" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Service Watch" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/png" sizes="192x192" href="sh-icon-192.png?v=shpc4" />
  <link rel="apple-touch-icon" href="sh-touch.png?v=shpc4" />
  <style>
    :root {
      --sh-blue: #307eb4;
      --sh-blue-dark: #1e5a82;
      --sh-bg: #0b1220;
      --sh-text: #f8fafc;
      --sh-muted: #94a3b8;
    }
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(ellipse 120% 80% at 50% -10%, rgba(48, 126, 180, 0.45), transparent 55%),
        linear-gradient(180deg, var(--sh-bg) 0%, #020617 100%);
      color: var(--sh-text);
      -webkit-text-size-adjust: 100%;
    }
    .sw-root {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(10px, env(safe-area-inset-top, 0px))
               max(12px, env(safe-area-inset-right, 0px))
               max(10px, env(safe-area-inset-bottom, 0px))
               max(12px, env(safe-area-inset-left, 0px));
      text-align: center;
      gap: clamp(8px, 3vmin, 16px);
    }
    .sw-icon-wrap {
      width: clamp(56px, 34vmin, 120px);
      height: clamp(56px, 34vmin, 120px);
      border-radius: clamp(14px, 7vmin, 28px);
      overflow: hidden;
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.45),
        0 0 0 2px rgba(255, 255, 255, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      flex-shrink: 0;
    }
    .sw-icon-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sw-title {
      margin: 0;
      font-size: clamp(15px, 6.5vmin, 22px);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.15;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    }
    .sw-sub {
      margin: 0;
      max-width: 22em;
      font-size: clamp(9px, 3.6vmin, 12px);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--sh-muted);
      line-height: 1.4;
    }
    .sw-badge {
      margin-top: clamp(4px, 1.5vmin, 10px);
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(48, 126, 180, 0.22);
      border: 1px solid rgba(96, 165, 250, 0.35);
      color: #bfdbfe;
      font-size: clamp(8px, 3vmin, 10px);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    /* Apple Watch e schermi molto piccoli (es. Series 6 in browser) */
    @media (max-width: 220px), (max-height: 260px) {
      .sw-root {
        gap: 8px;
        padding: 8px;
      }
      .sw-icon-wrap {
        width: 64px;
        height: 64px;
        border-radius: 16px;
      }
      .sw-title {
        font-size: 14px;
        letter-spacing: 0.06em;
      }
      .sw-sub {
        font-size: 8px;
      }
      .sw-badge {
        font-size: 7px;
        padding: 4px 8px;
      }
    }
  </style>
</head>
<body>
  <main class="sw-root" aria-label="Service Watch">
    <div class="sw-icon-wrap">
      <img src="sh-touch.png?v=shpc4" width="180" height="180" alt="Icona Service Watch" decoding="async" />
    </div>
    <h1 class="sw-title">Service Watch</h1>
    <p class="sw-sub">Estensione ServiceHub per Apple Watch e Wear OS</p>
    <span class="sw-badge">Anteprima collegamento</span>
  </main>
</body>
</html>
